    console.error("Firebase Init Fehler:", err);
    return false;
  }
}

function attachFirebaseListeners() {
  fbReady = true;
  fbDb.ref("leads_data").once("value")
    .then(snapshot => {
      const val = snapshot.val();
      const arr = val ? Object.values(val) : [];
      if (!arr.length) {
        showSyncWarning("⚠️ Keine Leads-Daten in Firebase gefunden — wurden sie schon hochgeladen?");
      }
      initAppData(arr);
    })
    .catch(err => {
      console.error("Leads-Daten Ladefehler:", err);
      showSyncWarning("⚠️ Firmendaten konnten nicht geladen werden.");
    });
  fbDb.ref("leads_state").on("value", snapshot => {
    state = snapshot.val() || {};
    saveState(state);
    refreshCurrentView();
  }, err => { console.error(err); showSyncWarning("⚠️ Sync-Verbindung verloren."); });
  fbDb.ref("route").on("value", snapshot => {
    const remote = snapshot.val();
    if (remote) {
      routeState = { start: remote.start || routeState.start, stopIds: remote.stopIds || [] };
      document.getElementById("route-start").value = routeState.start;
    }
    renderRoute();
    refreshRouteBadges();
  });
}

function unlockApp() {
  document.getElementById("lock-screen").style.display = "none";
  document.getElementById("app-root").style.display = "flex";
  if (!appDataInitialized && !document.getElementById("data-loading")) {
    const el = document.createElement("div");
    el.id = "data-loading";
    el.style.cssText = "background:#1d4ed8;color:#fff;font-size:12px;padding:6px 10px;text-align:center;";
    el.textContent = "⏳ Lade Firmendaten …";
    document.getElementById("app-root").prepend(el);
  }
  setTimeout(() => { if (typeof map !== "undefined") map.invalidateSize(); }, 60);
}

function tryUnlock() {
  const val = document.getElementById("lock-password").value;
  const errEl = document.getElementById("lock-error");
  const btn = document.getElementById("lock-submit");
  errEl.textContent = "";
  if (!fbAuthObj) {
    if (!initFirebaseApp()) {
      errEl.textContent = "Keine Verbindung — bitte Internet prüfen und neu laden.";
      return;
    }
  }
  btn.disabled = true;
  btn.textContent = "Prüfe …";
  fbAuthObj.signInWithEmailAndPassword(FIREBASE_LOGIN_EMAIL, val)
    .then(() => {
      localStorage.setItem(UNLOCK_KEY, "1");
      unlockApp();
    })
    .catch(err => {
      console.error("Login-Fehler:", err);
      errEl.textContent = "Falsches Passwort.";
    })
    .finally(() => { btn.disabled = false; btn.textContent = "Entsperren"; });
}
document.getElementById("lock-submit").addEventListener("click", tryUnlock);
document.getElementById("lock-password").addEventListener("keydown", e => { if (e.key === "Enter") tryUnlock(); });

// silent re-auth on return visits (Firebase persists the session; this just re-attaches listeners + shows the app)
initFirebaseApp();
if (fbAuthObj) {
  fbAuthObj.onAuthStateChanged(user => {
    if (user) {
      attachFirebaseListeners();
      if (localStorage.getItem(UNLOCK_KEY) === "1") unlockApp();
    }
  });
}

function refreshCurrentView() {
  if (tabMapBtn.classList.contains("active")) buildMarkers();

  else if (tabRouteBtn.classList.contains("active")) renderRoute();
}

const markersLayer = L.layerGroup().addTo(map);
const markerById = {};

function escapeHtml(s) {
  if (!s) return "";
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

function websiteHtml(w) {
  if (!w || w === "nein") return "nein";
  const url = w.replace(/^ja:\s*/, "").trim();
  if (!url) return "nein";
  const href = url.startsWith("http") ? url : "https://" + url;
  return `<a href="${escapeHtml(href)}" target="_blank" rel="noopener">${escapeHtml(url)}</a>`;
}

function marketingHtml(m) {
  if (!m) return "";
  const parts = m.split(" | ").map(seg => {
    return seg.replace(/(https?:\/\/[^\s]+)/g, url => `<a href="${url}" target="_blank" rel="noopener">Link</a>`);
  });
  return parts.join("<br>");
}

function statusSelectHtml(id, cssClass) {

}

      ${item.gf ? `<div class="row">GF/Inh.: ${escapeHtml(item.gf)}</div>` : ""}
      <div class="row">Tel: ${telHref}</div>
      <div class="row">Web: ${websiteHtml(item.website)}</div>
      ${item.fb_ads_link ? `<div class="row">📘 <a href="${escapeHtml(item.fb_ads_link)}" target="_blank" rel="noopener">Facebook Ads Library</a></div>` : ""}
      ${item.email ? `<div class="row">E-Mail: <a href="mailto:${escapeHtml(item.email)}">${escapeHtml(item.email)}</a></div>` : ""}
      ${item.beschreibung ? `<div class="row">${escapeHtml(item.beschreibung)}</div>` : ""}
      ${item.oeffnungszeiten ? `<div class="row">Öffnungszeiten: ${escapeHtml(item.oeffnungszeiten)}</div>` : ""}
      ${branchInfoHtml(item.kategorie)}
      ${item.marketing ? `<div class="row marketing">${marketingHtml(item.marketing)}</div>` : ""}
      ${item.notizen ? `<div class="row"><b>Hinweis:</b> ${escapeHtml(item.notizen)}</div>` : ""}
      <div class="row"><b>Status:</b> ${statusSelectHtml(item.id, "status-select-popup")}</div>
      <div class="row">
        <textarea class="note-field" placeholder="Notiz...">${escapeHtml(st.notiz)}</textarea>
        <button class="save-note">Speichern</button>
      </div>
      <div class="row">${routeButtonHtml(item.id)}</div>
    </div>
  `;
}

function routeButtonHtml(id) {
  const idx = routeState.stopIds.indexOf(id);
  if (idx === -1) {
    return `<button class="route-toggle-btn" data-route-toggle="${id}">🚗 Zur Route hinzufügen</button>`;
  }
  return `<button class="route-toggle-btn in-route" data-route-toggle="${id}">✓ Route-Station ${idx + 1} — entfernen</button>`;
}

function colorFor(item) {
  const st = getEntry(item.id);
  if (st.status === "nicht_relevant" || st.status === "besucht_kein_interesse" || st.status === "angebot_abgelehnt") {
    return "#9ca3af";
  }
  return CATEGORY_COLORS[item.kategorie] || DEFAULT_COLOR;
}

// ✗ für nicht relevant, ✓ für alles, wo schon ein Besuch stattgefunden hat
function statusIconFor(status) {
  if (status === "nicht_relevant") return { symbol: "✕", bg: "#dc2626" };
  if (status === "besucht_gf_nicht_da") return { symbol: "!", bg: "#2563eb" };
  if (status && status !== "offen") return { symbol: "✓", bg: "#16a34a" };
  return null;
}

let statusIconMarkers = {};
function updateStatusIcon(item) {
  if (statusIconMarkers[item.id]) {
    markersLayer.removeLayer(statusIconMarkers[item.id]);
    delete statusIconMarkers[item.id];
  }
  if (!item.lat || !item.lng) return;
  const st = getEntry(item.id);
  const iconInfo = statusIconFor(st.status);
  if (!iconInfo) return;
  const icon = L.divIcon({
    html: `<div class="status-icon-badge" style="background:${iconInfo.bg}">${iconInfo.symbol}</div>`,
    className: "", iconSize: [17, 17], iconAnchor: [8, 8],
  });
  const m = L.marker([item.lat, item.lng], { icon, interactive: false, zIndexOffset: 1000 });
  m.addTo(markersLayer);
  statusIconMarkers[item.id] = m;
}

function buildMarkers() {
  markersLayer.clearLayers();
  statusIconMarkers = {};
  const filtered = applyFilters(DATA);
  let skippedNoCoords = 0;
  filtered.forEach(item => {
    if (!item.lat || !item.lng) { skippedNoCoords++; return; }
    const isA = item.ab === "A";
    const st = getEntry(item.id);
    const isClosed = st.status === "closed";
    const marker = L.circleMarker([item.lat, item.lng], {
      radius: isA ? 9 : 6,
      fillColor: colorFor(item),
      color: isClosed ? "#16a34a" : (isA ? "#FFD700" : "#1f2937"),
      weight: isA || isClosed ? 3 : 1,
      fillOpacity: 0.9,
    });
    marker.bindPopup(popupHtml(item), {
      maxWidth: 320, minWidth: 260,
      maxHeight: Math.round(Math.min(420, window.innerHeight * 0.65)),
      autoPanPadding: [20, 20],
    });
    marker.on("popupopen", (e) => wirePopup(e.popup, item));
    marker.addTo(markersLayer);
    markerById[item.id] = marker;
    updateStatusIcon(item);
  });
  const shownCount = filtered.length - skippedNoCoords;
  document.getElementById("stats").textContent = skippedNoCoords
    ? `${shownCount} / ${DATA.length} Leads sichtbar (${skippedNoCoords} ohne Kartenkoordinaten)`
    : `${filtered.length} / ${DATA.length} Leads sichtbar`;
  refreshRouteBadges();
}

function refreshRouteBadges() {
  Object.entries(markerById).forEach(([id, marker]) => {
    if (marker.getTooltip()) marker.unbindTooltip();
    const idx = routeState.stopIds.indexOf(id);
    if (idx !== -1) {
      marker.bindTooltip(`<div class="route-num-badge">${idx + 1}</div>`, {
        permanent: true, direction: "top", offset: [0, -6], className: "route-badge-tooltip", opacity: 1,
      });
    }
  });
}

function toggleRouteStop(id) {
  const idx = routeState.stopIds.indexOf(id);
  if (idx === -1) routeState.stopIds.push(id);
  else routeState.stopIds.splice(idx, 1);
  saveRoute();
}

function wirePopup(popup, item) {
  const el = popup.getElement();
  if (!el) return;
  const statusSel = el.querySelector(".status-select-popup");
  const noteField = el.querySelector(".note-field");
  const saveBtn = el.querySelector(".save-note");
  statusSel.addEventListener("change", () => {
    setStatus(item.id, statusSel.value);
    const marker = markerById[item.id];
    if (marker) marker.setStyle({ fillColor: colorFor(item) });
    updateStatusIcon(item);
    if (currentFilter("f-status")) buildMarkers();
  });
  saveBtn.addEventListener("click", () => {
    const st = getEntry(item.id);
    st.notiz = noteField.value;
    saveState(state);
    fbWriteLeadState(item.id, st);
    saveBtn.textContent = "Gespeichert ✓";
    setTimeout(() => saveBtn.textContent = "Speichern", 1200);
  });
  const routeBtn = el.querySelector(".route-toggle-btn");
  if (routeBtn) {
    routeBtn.addEventListener("click", () => {
      toggleRouteStop(item.id);
      popup.setContent(popupHtml(item));
      wirePopup(popup, item);
    });
  }
}

function currentFilter(id) {
  return document.getElementById(id).value;
}

function applyFilters(data) {
  const gebiet = currentFilter("f-gebiet");
  const kategorie = currentFilter("f-kategorie");
  const b2c = currentFilter("f-b2c");
  const ab = currentFilter("f-ab");
  const status = currentFilter("f-status");
  const search = document.getElementById("f-search").value.trim().toLowerCase();

  return data.filter(item => {
    if (gebiet && item.gebiet !== gebiet) return false;
    if (kategorie && item.kategorie !== kategorie) return false;
    if (hiddenCategories.has(item.kategorie)) return false;
    if (b2c && item.b2c_b2b !== b2c) return false;
    if (ab && item.ab !== ab) return false;
    if (status && getEntry(item.id).status !== status) return false;
    if (search) {
      const hay = (item.name + " " + item.adresse).toLowerCase();
      if (!hay.includes(search)) return false;
    }
    return true;
  });
}

["f-gebiet", "f-kategorie", "f-b2c", "f-ab", "f-status"].forEach(id => {
  document.getElementById(id).addEventListener("change", buildMarkers);
});
document.getElementById("f-search").addEventListener("input", buildMarkers);

// ---------- Pipeline / Kanban ----------
function applyPipelineFilters(data) {
  const gebiet = currentFilter("p-gebiet");
  const kategorie = currentFilter("p-kategorie");
  const search = document.getElementById("p-search").value.trim().toLowerCase();
  return data.filter(item => {
    if (gebiet && item.gebiet !== gebiet) return false;
    if (kategorie && item.kategorie !== kategorie) return false;
    if (search) {
      const hay = (item.name + " " + item.adresse).toLowerCase();
      if (!hay.includes(search)) return false;
    }
    return true;
  });
}

function kcardHtml(item) {
  const telHref = item.telefon ? `<a href="tel:${item.telefon.replace(/[^\d+]/g, "")}">${escapeHtml(item.telefon)}</a>` : "";
  return `
    <div class="kcard" draggable="true" data-id="${item.id}" style="border-left-color:${CATEGORY_COLORS[item.kategorie] || DEFAULT_COLOR}">
      <b>${escapeHtml(item.name)} ${item.ab === "A" ? "⭐" : ""}</b>
      <div class="meta">${escapeHtml(item.kategorie)} · ${escapeHtml(item.gebiet)}</div>
      <div class="meta">${escapeHtml(item.adresse)}</div>
      <div class="meta">${telHref}</div>
      ${statusSelectHtml(item.id, "status-select")}
    </div>
  `;
}

function buildKanban() {
  const kanban = document.getElementById("kanban");
  kanban.innerHTML = "";
  const filtered = applyPipelineFilters(DATA);
  const byStatus = {};
  STATUS_OPTIONS.forEach(s => byStatus[s.value] = []);
  filtered.forEach(item => {
    const st = getEntry(item.id);
    (byStatus[st.status] || byStatus["offen"]).push(item);
  });

  STATUS_OPTIONS.forEach(s => {
    const col = document.createElement("div");
    col.className = "kanban-col";
    col.dataset.status = s.value;
    const items = byStatus[s.value];
    col.innerHTML = `
      <div class="kanban-col-head" style="background:${s.color}">
        <span>${s.label}</span><span>${items.length}</span>
      </div>
      <div class="kanban-col-body"></div>
    `;
    const body = col.querySelector(".kanban-col-body");
    items.forEach(item => body.insertAdjacentHTML("beforeend", kcardHtml(item)));
    kanban.appendChild(col);
  });

  // wire status-selects inside cards
  kanban.querySelectorAll(".kcard .status-select").forEach(sel => {
    sel.addEventListener("change", (e) => {
      const card = e.target.closest(".kcard");
      setStatus(card.dataset.id, sel.value);
      buildKanban();
      buildMarkers();
    });
  });

  // drag & drop between columns
  kanban.querySelectorAll(".kcard").forEach(card => {
    card.addEventListener("dragstart", () => card.classList.add("dragging"));
    card.addEventListener("dragend", () => card.classList.remove("dragging"));
  });
  kanban.querySelectorAll(".kanban-col-body").forEach(body => {
    body.addEventListener("dragover", (e) => {
      e.preventDefault();
      body.classList.add("dragover");
    });
    body.addEventListener("dragleave", () => body.classList.remove("dragover"));
    body.addEventListener("drop", (e) => {
      e.preventDefault();
      body.classList.remove("dragover");
      const dragging = kanban.querySelector(".kcard.dragging");
      if (!dragging) return;
      const newStatus = body.closest(".kanban-col").dataset.status;
      setStatus(dragging.dataset.id, newStatus);
      buildKanban();
      buildMarkers();
    });
  });

  document.getElementById("p-stats").textContent = `${filtered.length} / ${DATA.length} Leads`;
}

["p-gebiet", "p-kategorie"].forEach(id => document.getElementById(id).addEventListener("change", buildKanban));
document.getElementById("p-search").addEventListener("input", buildKanban);

// ---------- Export ----------
function currentExportData() {
  return DATA.map(item => {
    const st = getEntry(item.id);
    const statusLabel = (STATUS_BY_VALUE[st.status] || STATUS_BY_VALUE.offen).label;
    return { ...item, status: st.status, status_label: statusLabel, notiz_lokal: st.notiz };
  });
}

document.getElementById("btn-export-json").addEventListener("click", () => {
  const blob = new Blob([JSON.stringify(currentExportData(), null, 2)], { type: "application/json" });
  triggerDownload(blob, "leads_export.json");
});

document.getElementById("btn-export-csv").addEventListener("click", () => {
  const rows = currentExportData();
  const cols = ["name","rechtsform","ab","kategorie","b2c_b2b","gf","adresse","gebiet","telefon","website","email","oeffnungszeiten","beschreibung","roi","fb_page","fb_ads_link","marketing","status_label","notiz_lokal"];
  const csvEscape = v => `"${String(v ?? "").replace(/"/g, '""')}"`;
  const lines = [cols.join(",")];
  rows.forEach(r => lines.push(cols.map(c => csvEscape(r[c])).join(",")));
  const blob = new Blob(["﻿" + lines.join("\r\n")], { type: "text/csv;charset=utf-8" });
  triggerDownload(blob, "leads_export.csv");
});

function triggerDownload(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

 "E-Ladestationen/Wallbox", "auftragswert": "1.000–4.000€", "auftragswert_kontext": "Komplettinstallation (Gerät 500-2.500€ je nach 11/22kW + Montage 500-3.000€ je nach Kabelweg/Zählerkasten) für ein Einfamilienhaus in Österreich; Installation darf nur durch konzessionierten Elektrobetrieb erfolgen. Förderungen bis 600€ (EFH) bzw. 900€/Ladepunkt (MFH) reduzieren Nettokosten für Kunden, nicht den Auftragswert des Betriebs.", "marge": "25-35%", "marge_kontext": "Keine kategorie-spezifische Quelle gefunden; Gerätemarge (Handelsspanne auf Wallbox-Hardware) plus Elektromonteur-Stundensatzmarge, angenähert an allgemeinen Elektro-Handwerk-Rohertrag.", "gewinn": "250–1.400€", "gewinn_hinweis": "berechnet aus Auftragswert 1.000–4.000€ × Marge 25–35% (grobe Schätzung, erste genannte Preisspanne)", "konfidenz": "niedrig", "vorbilder": [{"Firma": "Elektro-Czigler (Wien) – Spezialist für E-Ladestationen", "Warum": "Positioniert sich explizit als 'Spezialist für E-Ladestationen und E-Mobilität' mit über 300 5-Sterne-Google-Bewertungen und dediziertem Content-Marketing (eigene Ratgeberseiten zu Wallbox-Förderung, Installation, Großprojekten) – zeigt, wie ein Elektrobetrieb sich über SEO/Content auf das Wallbox-Nischenthema aufbaut. Kein dokumentierter Ads-Kampagnen-Case mit Zahlen gefunden.", "Website": "https://elektro-czigler.at/"}]}, {"kategorie": "Einrichtungsstudio/Möbel", "auftragswert": "8.000–30.000€", "auftragswert_kontext": "Hochwertige Maßmöbel/Objekteinrichtung nach Maß: 200–500€/m² Möbelfläche bzw. 800–1.500€/Laufmeter für Tischler-Einbaumöbel; typisches Projekt umfasst mehrere Einbaumöbel oder eine komplette Zimmerausstattung für Privatkunden.", "marge": "30–45%", "marge_kontext": "Hochwertige Maßanfertigungen/Designmöbel gelten als margenstärkeres Segment (Gewährleistungsrisiko, Individualisierung, geringer Preisvergleich); allgemeiner Tischler-Materialaufschlag liegt bei 20–35% auf Material, Gesamtmarge auf Endprodukt geschätzt höher. Keine exakte AT-Quelle für Einrichtungsstudios gefunden.", "gewinn": "2.400–13.500€", "gewinn_hinweis": "berechnet aus Auftragswert 8.000–30.000€ × Marge 30–45% (grobe Schätzung, erste genannte Preisspanne)", "konfidenz": "niedrig", "vorbilder": [{"Firma": "Kawentsmann Möbelmanufaktur", "Warum": "Deutsche Möbelmanufaktur (Münsterland, gegründet 2016) für handgefertigte Massivholzmöbel, die laut Fachpresse (Handwerksblatt) mit rund 18.000 Instagram-Followern über Behind-the-Scenes-Content und aktive Community-Einbindung zum Vorzeigebeispiel für erfolgreiches Social-Media-Marketing im Handwerk wurde.", "Website": "https://kawentsmann.de/"}]}, {"kategorie": "Elektrotechnik", "auftragswert": "500–3.000€ (Einzelaufträge/Teilinstallation); 10.000–20.000€ (Komplettinstallation EFH)", "auftragswert_kontext": "Typische Elektroinstallationsarbeiten im Privathaushalt kosten 80-150€/m² Wohnfläche (EFH ca. 130m² → 10.000-20.000€ Komplettsanierung), kleinere Einzelaufträge (Steckdose versetzen etc.) 80-180€; Stundensätze 55-115€/Std.", "marge": "25-35%", "marge_kontext": "Keine elektro-spezifische Quelle gefunden; allgemeiner Handwerk-Rohertrag (Material-Aufschlag 15-30%, Arbeitsleistung-Marge oft höher) als Näherung verwendet.", "gewinn": "125–1.050€", "gewinn_hinweis": "berechnet aus Auftragswert 500–3.000€ × Marge 25–35% (grobe Schätzung, erste genannte Preisspanne)", "konfidenz": "niedrig", "vorbilder": [{"Firma": "Elektro-Czigler (Wien)", "Warum": "Wiener Elektro-Meisterbetrieb, der mit über 300 5-Sterne-Google-Bewertungen und der offen kommunizierten USP 'einziger Elektro-Fachbetrieb in und um Wien, der Preise auf der Website veröffentlicht' sichtbar auf digitale Sichtbarkeit/Vertrauensaufbau statt klassischer Mundpropaganda setzt – gute Vorlage für 'so sieht digitale Differenzierung beim Elektriker aus'. Kein harter Ads-ROI-Case dokumentiert, daher als Sichtbarkeits-/Bewertungs-Beispiel zu verstehen.", "Website": "https://elektro-czigler.at/"}, {"Firma": "ADA Elektro (Wien)", "Warum": "Wiener Elektro-Meisterbetrieb mit klarer Marken- und Preistransparenz-Positionierung ('Festpreise ab 80€'), 4,9/5 Sterne bei 120+ Bewertungen und breiter Google-Sichtbarkeit für 'Elektriker Notdienst Wien' – Beispiel für konsequenten Aufbau von Vertrauen/SEO-Sichtbarkeit im lokalen Notdienstgeschäft. Schwächer belegt als andere Beispiele (keine öffentlichen Kampagnen-Kennzahlen).", "Website": "https://www.ada-elektro.at/"}]}, {"kategorie": "Estrich/Betonbau", "auftragswert": "2.000–8.000€", "auftragswert_kontext": "Estrichverlegung für ein Einfamilienhaus (~80–120m²): Zementestrich 18–30€/m², Fließestrich 25–55€/m², Trockenestrich 45–75€/m²; für strukturellen Betonbau (Fundamente, Stützmauern etc.) wurde keine separate AT-Marktquelle gefunden – hier ist mit deutlich höheren, projektabhängigen Werten zu rechnen.", "marge": "15–25%", "marge_kontext": "Estrich-/Betonarbeiten gelten als materialintensives, margenärmeres Gewerk im Vergleich zu Ausbaugewerken; keine kategoriespezifische AT-Quelle gefunden, Einordnung am unteren Ende der allgemeinen Bau-Spanne (20–35%).", "gewinn": "300–2.000€", "gewinn_hinweis": "berechnet aus Auftragswert 2.000–8.000€ × Marge 15–25% (grobe Schätzung, erste genannte Preisspanne)", "konfidenz": "niedrig", "vorbilder": []}, {"kategorie": "Fassade/Maler", "auftragswert": "5.000–30.000€", "auftragswert_kontext": "Reine Malerarbeiten/Fassadenanstrich am unteren Ende (~4.000–10.000€ für EFH), komplette Fassadendämmung/Vollwärmeschutz für ein Einfamilienhaus (~150m² Fassadenfläche, 80–150€/m²) am oberen Ende (15.000–30.000€).", "marge": "20–30%", "marge_kontext": "Deckungsbeitrag im österreichischen Baugewerbe liegt laut Branchenquellen im Schnitt bei ca. 20–35% der Angebotssumme (Mittelwert ~25%); kategoriespezifische AT-Daten für Maler/Fassade nicht separat gefunden, daher allgemeiner Bau-Richtwert verwendet.", "gewinn": "1.000–9.000€", "gewinn_hinweis": "berechnet aus Auftragswert 5.000–30.000€ × Marge 20–30% (grobe Schätzung, erste genannte Preisspanne)", "konfidenz": "mittel", "vorbilder": [{"Firma": "malerwerkstatt hinze GmbH", "Warum": "Traditioneller Malerbetrieb (60 Jahre, Wunstorf bei Hannover) mit dokumentiertem Google-Ads-Case-Study auf handwerk.com: gezielte Kampagnen zu Fassadengestaltung, Innenputz & Bodendesign brachten spürbar mehr echte Kundenanfragen statt reiner Angebotssammler. Das Unternehmen ist so erfolgreich, dass es 2023 vom norwegischen Handwerkskonzern Håndverksgruppen übernommen wurde.", "Website": "https://www.hinze-maler.de/"}]}, {"kategorie": "Fenster & Türen", "auftragswert": "450–1.200€ pro Fenster inkl. Einbau; 6.000–12.000€ für kompletten Fenstertausch EFH (ca. 10-12 Fenster)", "auftragswert_kontext": "Kunststofffenster 450-850€, Holzfenster 600-1.000€, Aluminium ab ca. 500-600€/m² jeweils inkl. Einbau in Österreich 2025/26; Bundesförderung für energieeffiziente Fenster bis 6.000€ (30% der Kosten, max. 200€/m²) reduziert Kundenkosten, nicht Auftragswert.", "marge": "20-30%", "marge_kontext": "Bei Fenstereinbau macht Material bis zu 70% der Gesamtkosten aus, wobei bei teuren Einzelteilen wie Fenstern der Aufschlag typischerweise nur 10-15% beträgt (vs. 15-30% bei sonstigem Handwerksmaterial); Gesamtmarge inkl. Montageleistung geschätzt.", "gewinn": "90–360€", "gewinn_hinweis": "berechnet aus Auftragswert 450–1.200€ × Marge 20–30% (grobe Schätzung, erste genannte Preisspanne)", "konfidenz": "niedrig", "vorbilder": [{"Firma": "REKORD Fenster (österreichweit, 17 Standorte)", "Warum": "Österreichischer Fenster-/Türenhersteller mit eigener Produktion an 10 von 17 Standorten, der mit der Kreativagentur ghost.company eine breit angelegte, medienübergreifende Markenkampagne ('Das Fenster von hier. Wie wir.') über Print, Digital und Social Media fährt – dokumentiertes, aktuelles Beispiel für professionelle, kampagnengetriebene Vermarktung im Fenster-Handwerk.", "Website": "https://www.rekord-fenster.com/"}]}, {"kategorie": "Fertighaus/Holzbau", "auftragswert": "250.000–450.000€", "auftragswert_kontext": "Schlüsselfertige Fertighäuser kosten 2025 in Österreich meist 2.200–3.000€/m² Wohnfläche; bei einem typischen Einfamilienhaus (100–150m²) ergibt sich daraus die Spanne, Ausbauhäuser sind mit 1.800–2.200€/m² günstiger.", "marge": "20–30%", "marge_kontext": "Keine trade-spezifische Quelle gefunden; hier wird der allgemeine Deckungsbeitrag im Baugewerbe (ca. 20–35%, Bauprofessor/Fachliteratur) als Näherung verwendet, da Fertighausbau materialintensiv und wettbewerbsstark ist.", "gewinn": "50.000–135.000€", "gewinn_hinweis": "berechnet aus Auftragswert 250.000–450.000€ × Marge 20–30% (grobe Schätzung, erste genannte Preisspanne)", "konfidenz": "niedrig", "vorbilder": [{"Firma": "ELK Fertighaus GmbH", "Warum": "Österreichischer Fertighaus-Marktführer, der seine Position über Jahrzehnte durch permanente Radio-/Werbekampagnen ('Endlich zuhause') und einen umfassenden Marken-Relaunch ausgebaut hat – historisch bis zu 99% Markenbekanntheit in Österreich.", "Website": "https://www.elk.at/"}, {"Firma": "HARTL HAUS Holzindustrie GmbH", "Warum": "Ältestes Fertighausunternehmen Österreichs, das aktuell mit einer von einer Top-Werbeagentur (Demner, Merlicek & Bergmann) produzierten, breit ausgespielten Kampagne ('Dein Meisterwerk aus Meisterhand') seine Marktführerschaft untermauert.", "Website": "https://www.hartlhaus.at/"}]}, {"kategorie": "Garten-/Landschaftsbau", "auftragswert": "5.000–20.000€ (Neu-/Umgestaltung Privatgarten)", "auftragswert_kontext": "Einfache Gartenanlagen (Rasen, Bepflanzung, einfacher Wegebau) ca. 30-80€/m², mittlere Ausstattung 80-150€/m², hochwertige Gestaltung mit Terrasse/Pflaster/Teich ab 150€/m² bis 400-800€/m²; Gesamtprojekte für Privatgärten meist 5.000-20.000€.", "marge": "45-65%", "marge_kontext": "BMF-Richtsatzsammlung (D) für GaLaBau-Betriebe bis 250.000€ Jahresumsatz weist Rohgewinn II (Umsatz abzüglich Wareneinsatz/Material, vor Lohn- und sonstigen Gemeinkosten) von 44-82% aus (Median ~64%); als branchennaher Referenzwert auch für AT-Betriebe verwendet, da keine eigene österreichische Quelle mit vergleichbarer Detailtiefe gefunden wurde.", "gewinn": "2.250–13.000€", "gewinn_hinweis": "berechnet aus Auftragswert 5.000–20.000€ × Marge 45–65% (grobe Schätzung, erste genannte Preisspanne)", "konfidenz": "mittel", "vorbilder": [{"Firma": "gartendesign.at GmbH", "Warum": "Meisterbetrieb in St. Georgen im Attergau (OÖ/Salzburg), der sich bewusst den generischen Suchbegriff 'Gartendesign' als Domain gesichert hat und darüber bei Google für die Kernsuche in seiner Region dominiert – ein klassisches Beispiel für konsequente SEO-/Sichtbarkeitsstrategie statt Zufallserfolg. Ergänzend aktive Facebook-Präsenz.", "Website": "https://gartendesign.at/"}]}, {"kategorie": "Gerüstbau", "auftragswert": "900–3.500€", "auftragswert_kontext": "Für ein Fassadengerüst an einem Einfamilienhaus (ca. 150m²) inkl. Lieferung, Montage, Demontage über 1–2 Wochen sind in Österreich grob 900–3.000€ realistisch (5–20€/m²/Woche je nach Gerüsttyp). Kunde ist meist eine Baufirma, Maler- oder Fassadenbetrieb, seltener der Privatkunde direkt.", "marge": "30–45%", "marge_kontext": "Keine direkte Quelle gefunden; da Gerüstmaterial mehrfach wiederverwendet wird (geringe variable Materialkosten pro Einsatz, hoher Lohn-/Logistikanteil), wird ein höherer Deckungsbeitrag als im klassischen Baugewerbe angenommen — als grobe, unsichere Schätzung zu verstehen.", "gewinn": "270–1.575€", "gewinn_hinweis": "berechnet aus Auftragswert 900–3.500€ × Marge 30–45% (grobe Schätzung, erste genannte Preisspanne)", "konfidenz": "niedrig", "vorbilder": [{"Firma": "XERVON Austria GmbH", "Warum": "Einer der österreichweit führenden Gerüstbaubetriebe (60+ Jahre am Markt, Teil des internationalen REMONDIS-Konzerns) mit eigener Konzern-Marketingabteilung und aktivem LinkedIn-Auftritt – gutes B2B-Beispiel, da klassische Endkunden-Werbung in dieser Branche kaum vorkommt.", "Website": "https://www.xervon.at/"}]}, {"kategorie": "Glaserei/Glasbau", "auftragswert": "1.500–8.000€", "auftragswert_kontext": "Typisches Privatkundenprojekt (z.B. Ganzglasdusche 900–1.400€, Glastür 450–1.200€, Glasschiebetür ~600€/Stück, oder Fensterglasaustausch 160–290€/m²); mehrere Positionen in einem Auftrag ergeben realistisch 1.500–8.000€.", "marge": "20–30%", "marge_kontext": "Keine glaserei-spezifische AT-Margenquelle gefunden; allgemeiner Handwerks-Materialaufschlag von 15–30%, bei Maßanfertigungen (Fenster/Türen) eher 20–35%, als Orientierung übernommen.", "gewinn": "300–2.400€", "gewinn_hinweis": "berechnet aus Auftragswert 1.500–8.000€ × Marge 20–30% (grobe Schätzung, erste genannte Preisspanne)", "konfidenz": "niedrig", "vorbilder": [{"Firma": "Glas Marte", "Warum": "Vorarlberger Glasbau-Spezialist (Bregenz, seit 1930, ca. 270 Mitarbeiter, mittlerweile in dritter Generation bzw. Teil der Glas Trösch Gruppe) mit internationalen Referenzprojekten in Deutschland, Frankreich, Russland und der Schweiz sowie mehrfach 'red dot'-Design-Award-prämiert. Beschäftigt einen eigenen Digital Marketing Manager für gezielte Sichtbarkeit bei Architekten und Bauherren – zeigt, wie ein regionaler Glasereibetrieb durch konsequentes digitales Marketing internationale Strahlkraft erreichte.", "Website": "https://www.glasmarte.at/"}]}, {"kategorie": "Installateur (Heizung/Sanitär/Klima)", "auftragswert": "3.000–6.000€ (Klimaanlage Split); 8.000–25.000€ (Badsanierung); 16.000–28.000€ (Wärmepumpen-Nachrüstung Luft-Wasser Altbau, vor Förderung)", "auftragswert_kontext": "Breite Kategorie mit sehr unterschiedlichen Auftragsgrößen in Österreich 2025/26: Split-Klimaanlage inkl. Montage 3.000-6.000€ (Wien tendenziell teurer), Standard-Badsanierung 15.000-25.000€, Luft-Wasser-Wärmepumpen-Nachrüstung im Altbau 16.000-28.000€ (Erdwärmepumpe 22.000-40.000€), jeweils vor Förderungen (Wärmepumpe bis zu 7.500€ + Bohrbonus 5.000€ 2025/26). Installateur-Stundensätze offiziell 60,96-91,28€ netto (Regiestundensätze 2026).", "marge": "20-40% (Material), 20-40% (Arbeitsleistung), ca. 30% im Schnitt", "marge_kontext": "Rohertrag vor Fixkosten; Branchenartikel zu SHK-Betrieben nennt Materialmargen von 10-50% (Kessel/Rohre/Pumpen im Schnitt ~30%) und Arbeitsleistungsmargen von 20-40%; ein Beispielbetrieb erzielte über Jahre eine Umsatzrendite (Nettogewinn) von über 10%.", "gewinn": "600–2.400€", "gewinn_hinweis": "berechnet aus Auftragswert 3.000–6.000€ × Marge 20–40% (grobe Schätzung, erste genannte Preisspanne)", "konfidenz": "mittel", "vorbilder": [{"Firma": "1a-Installateure (Genossenschaft, österreichweit)", "Warum": "Größte und bekannteste Kooperative der Sanitär-/Heizungsbranche in Österreich (seit 1982), die seit Jahren große, professionell produzierte nationale Werbekampagnen fährt (u.a. 'Die hohe Kunst der Installation', mehrjährige Kampagnenserie mit eigenem künstlerischem Key-Visual) – ein Betrieb/Verbund, der sich sichtbar über Marke und Werbung statt nur über Mundpropaganda positioniert.", "Website": "https://www.1a-installateure.at/"}, {"Firma": "Badshop Austria", "Warum": "Österreichischer Online-Shop für Sanitärprodukte (Bad/Heizung-nahes Segment), der laut Case Study einer Wiener Agentur (otago) durch KI-gestützte Google-Ads-Automatisierung ein Umsatzplus von +280% erzielte – starker, konkret belegter Zahlen-Case, wenn auch Handel und nicht klassisches Installationsgewerbe.", "Website": "https://www.badshop-austria.at/"}]}, {"kategorie": "Kaminbau/Rauchfangkehrer", "auftragswert": "500–1.500€ (einfache Kaminsanierung); 1.500–5.000€ (umfassende Kaminsanierung/Edelstahlsystem); 40–150€ pro Rauchfangkehrer-Termin", "auftragswert_kontext": "Kaminsanierung in Österreich je nach Zustand/Höhe/Methode 500-5.000€ (Edelstahlsysteme ca. 110-150€/lfm inkl. Material); laufende Rauchfangkehrer-Dienstleistungen (Kehrung, Abnahme neuer Öfen) deutlich kleinere Auftragswerte von 40-250€ je Termin, keine klassischen Neukundenprojekte im PV/Fenster-Sinn.", "marge": "25-35%", "marge_kontext": "Keine kategorie-spezifische Quelle gefunden; grobe Schätzung basierend auf allgemeinen Bau-/Handwerksgewerbe-Margen (Rohertrag), da Rauchfangkehrer zudem gesetzlich reglementierte Kehrgebühren (kein freier Preis) haben, was die Vergleichbarkeit mit anderen Gewerken einschränkt.", "gewinn": "125–525€", "gewinn_hinweis": "berechnet aus Auftragswert 500–1.500€ × Marge 25–35% (grobe Schätzung, erste genannte Preisspanne)", "konfidenz": "niedrig", "vorbilder": []}, {"kategorie": "Kanal-/Rohrsanierung", "auftragswert": "2.000–6.000€", "auftragswert_kontext": "Grabenlose Inliner-Sanierung kostet ca. 150–450€ pro Laufmeter; bei einem typischen Einfamilienhaus mit 10–15m Grundleitung ergeben sich Gesamtkosten von rund 2.000–4.500€, größere/komplexere Sanierungen können mehr kosten.", "marge": "30–45%", "marge_kontext": "Keine direkte Quelle; grabenlose Sanierungsverfahren sind technologie-/spezialgeräteintensiv aber personalarm pro Einsatz, was tendenziell höhere Margen als klassische Grabenbauweise erwarten lässt — als grobe Schätzung zu verstehen.", "gewinn": "600–2.700€", "gewinn_hinweis": "berechnet aus Auftragswert 2.000–6.000€ × Marge 30–45% (grobe Schätzung, erste genannte Preisspanne)", "konfidenz": "niedrig", "vorbilder": [{"Firma": "ROHRMAX Rohrreinigungs- und Kanalsanierungsgesellschaft m.b.H.", "Warum": "Größter österreichweiter Player der Branche (45+ Jahre, 10 Standorte, 500+ Mitarbeiter, 24/7-Erreichbarkeit) und dominiert die Google-Suchergebnisse für 'Kanal-/Rohrsanierung Österreich' klar über SEO/Ads-getriebene Sichtbarkeit – zeigt, dass Sichtbarkeit in dieser Nische direkt zu Marktführerschaft führt.", "Website": "https://www.rohrmax.at/"}]}, {"kategorie": "Küchenstudio", "auftragswert": "7.000–15.000€", "auftragswert_kontext": "Durchschnittlicher Küchenkauf in Österreich liegt bei 7.000–8.000€; Gesamtmarkt reicht von 2.000€ (Einsteiger) bis 30.000€+ (Premium/Luxus bis 70.000€), Mittelklasse ca. 1.800–2.500€/Laufmeter.", "marge": "25–40%", "marge_kontext": "Küchenstudios kombinieren Möbel- und Gerätehandel; Möbelhandel erzielt klassischerweise höhere Handelsspannen (30–45%), Elektrogeräte niedrigere (~15–20%) – Mischkalkulation ergibt geschätzt 25–40%. Keine küchenstudio-spezifische AT-Quelle mit exakter Prozentzahl gefunden.", "gewinn": "1.750–6.000€", "gewinn_hinweis": "berechnet aus Auftragswert 7.000–15.000€ × Marge 25–40% (grobe Schätzung, erste genannte Preisspanne)", "konfidenz": "niedrig", "vorbilder": [{"Firma": "DANKÜCHEN", "Warum": "Österreichs meistverkaufte Küchenmarke (gegründet 1963, Produktion in Oberösterreich, über 450 Mitarbeiter) mit einem Netz von mehr als 120 Küchenstudios österreichweit. Bewirbt sich aktiv als 'Nr. 1 in Österreich' und unterhält ein zentrales Marketingteam, das lokale Studio-Partner bei Social Media, Google- und Online-Kampagnen unterstützt – zeigt, wie ein Franchise-Küchenstudio-Netzwerk durch koordiniertes Marketing zur bekanntesten Marke der Branche wurde.", "Website": "https://dan.at/"}]}, {"kategorie": "Ofenbau/Kachelöfen", "auftragswert": "6.000-18.000€", "auftragswert_kontext": "Kachelofen/Grundofen mit Einbau durch Hafner, je nach Ausführung (Warmluftofen bis handgesetzter Grundofen)", "marge": "20-30%", "marge_kontext": "keine kategorie-spezifische Quelle gefunden, allgemeiner Handwerk/Bau-Richtwert (Rohertrag nach Material)", "gewinn": "1.200–5.400€", "gewinn_hinweis": "berechnet aus Auftragswert 6.000–18.000€ × Marge 20–30% (grobe Schätzung, erste genannte Preisspanne)", "konfidenz": "niedrig", "vorbilder": [{"Firma": "Ofenbau Csida (Tirol)", "Warum": "Tiroler Hafnermeisterbetrieb mit aktiv gepflegten Facebook- und Instagram-Kanälen für Neuigkeiten rund um Kachelöfen – ehrlich gesagt eher moderates, aber das sichtbarste verfügbare Beispiel für digitales Marketing in einer generell sehr traditionell/offline geprägten Branche.", "Website": "https://www.csida.at/"}]}, {"kategorie": "Pflasterer/Steinmetz", "auftragswert": "3.000–15.000€ (Pflasterarbeiten Einfahrt/Terrasse, ca. 30-100m²)", "auftragswert_kontext": "Pflasterarbeiten inkl. Unterbau bis 50cm Tiefe kosten in Österreich typischerweise 100-140€/m² (günstige Varianten ab ca. 70€/m²); Naturstein/Granit 70-180€/m², Betonpflaster 40-75€/m², Waschbetonplatten ab ca. 40€/m²; reine Arbeitskosten 50-80€/m².", "marge": "25-40%", "marge_kontext": "Keine pflasterer-spezifische Margen-Quelle gefunden; BMF-Richtsatz für Bauunternehmen mit Materiallieferung (D, Rohgewinn II 17-62%, Median ca. 41% bei kleinen Betrieben) als Orientierung für materialintensive Außenanlagen-Gewerke.", "gewinn": "750–6.000€", "gewinn_hinweis": "berechnet aus Auftragswert 3.000–15.000€ × Marge 25–40% (grobe Schätzung, erste genannte Preisspanne)", "konfidenz": "mittel", "vorbilder": [{"Firma": "Steinmetzbetrieb Magera (Andreas Magera, Ahlen/Deutschland)", "Warum": "In einem Fachmagazin-Artikel dokumentierter Fall: Der Steinmetz baute über konsequente Instagram-Präsenz (Einblicke in den kreativen Entstehungsprozess, persönliches Auftreten) eine Nischenstrategie für individuelle Unikat-Grabsteine auf, die mittlerweile rund 60% des Gesamtumsatzes ausmacht und Kunden aus ganz Deutschland anzieht – ein konkret belegter Social-Media-Erfolgsfall im Steinmetz-Handwerk. Für 'Pflasterer' konnte kein vergleichbar dokumentierter Fall gefunden werden; DACH-Fallback (Deutschland).", "Website": "https://www.steinmetzbetrieb-magera.de/"}]}, {"kategorie": "Pool-Überdachung", "auftragswert": "5.000–20.000€ (maßgefertigte Alu-/Polycarbonat-Überdachung)", "auftragswert_kontext": "Günstige Bausätze/Selbstmontage ab 3.300-5.900€, Standard-Überdachungen mit Montage typischerweise 5.000-20.000€, höherwertige Ausführungen mit Schienen/verschiebbaren Modulen im oberen Bereich; Preis hängt stark von Poolgröße, Material und Bauform (flach/halbrund/hochgewölbt) ab.", "marge": "25-35%", "marge_kontext": "Keine kategorie-spezifische Quelle gefunden; da es sich meist um vorkonfektionierte Produkte mit Montage handelt (ähnlich Fenster-/Fassadenbau), wird ein allgemeiner Handwerks-/Handelsmarge-Richtwert (Materialaufschlag 15-30% plus Montageleistung) angesetzt.", "gewinn": "1.250–7.000€", "gewinn_hinweis": "berechnet aus Auftragswert 5.000–20.000€ × Marge 25–35% (grobe Schätzung, erste genannte Preisspanne)", "konfidenz": "niedrig", "vorbilder": [{"Firma": "SIGMA Schwimmbadüberdachungen GmbH (Klagenfurt, Kärnten)", "Warum": "Seit 2006 spezialisierter Hersteller/Anbieter von Poolüberdachungen 'Made in Austria' mit Produktion in Kärnten und einem flächendeckenden Händlernetz in allen österreichischen Bundesländern sowie in Deutschland – ein Beispiel für eine österreichische Nischenfirma, die sich durch klare Positionierung und Distributionsaufbau zum überregionalen Player entwickelt hat.", "Website": "https://www.sigma-gmbh.at/"}]}, {"kategorie": "Poolbau", "auftragswert": "15.000–50.000€ (Standard-Einbaupool); Edelstahl-/Designpools 35.000-90.000€+", "auftragswert_kontext": "Einbaupools ab ca. 15.000€, GFK-Schwimmbecken inkl. Pooltechnik, Aushub, Einbau 300-500€/m², Polypropylen-Komplettpools 17.000-24.000€, Edelstahlpools 35.000-70.000€ (Designer-/Überlaufpools über 90.000€); günstige Aufstellpools ab ca. 3.000€ liegen außerhalb des typischen Profi-Auftragswerts.", "marge": "20-35%", "marge_kontext": "Keine poolbau-spezifische Margen-Quelle gefunden; als materialintensives Bauunternehmen mit Materiallieferung wird der BMF-Richtsatz für Bauunternehmen (D, Rohgewinn II 17-62%, Median ca. 41% bei kleinen Betrieben) als Orientierung genutzt, eingeengt auf einen plausiblen mittleren Bereich wegen hohem Technik-/Materialanteil (Becken, Pooltechnik).", "gewinn": "3.000–17.500€", "gewinn_hinweis": "berechnet aus Auftragswert 15.000–50.000€ × Marge 20–35% (grobe Schätzung, erste genannte Preisspanne)", "konfidenz": "niedrig-mittel", "vorbilder": [{"Firma": "Poolkaiser (Hermann Kaiser, Linz/Oberösterreich)", "Warum": "Aus einem Gartengestaltungsbetrieb gewachsenes Poolbau-Unternehmen mit bewusst markanter, einprägsamer Marke ('Poolkaiser'), das laut eigenen Angaben jährlich rund 200 neue Pools baut und ca. 1.500 Stammkunden betreut; aktiver, professionell produzierter Instagram-Reels-Auftritt für Neukundengewinnung. Gutes, real verifizierbares österreichisches Beispiel, auch wenn die Social-Media-Reichweite (aktuell ca. 370 Follower) noch moderat ist.", "Website": "https://www.poolkaiser.at/"}]}, {"kategorie": "Saunabau/Wellness", "auftragswert": "5.000–15.000€ (Gartensauna/Außensauna Standard); Premium-Ausführungen bis 20.000€+", "auftragswert_kontext": "Außensaunas kosten typischerweise ab ca. 5.000€ bis über 20.000€ für Luxusvarianten, kleine Indoor-Saunas ab ca. 3.000€; Aufbaukosten allein 1.000€ (Indoor, 2-3 Tage) bis 2.000€ (Garten, 3-5 Tage); zusätzlich oft Betonplatte/Drainage/Genehmigung 500-2.000€ und ggf. Starkstromanschluss.", "marge": "25-40%", "marge_kontext": "Keine saunabau-spezifische Margen-Quelle gefunden; da meist Hersteller-/Handelsware (Saunakabinen-Bausätze) mit Montage verkauft wird, wird ein allgemeiner Handels-/Handwerksmarge-Richtwert (Produktmarge plus Montageleistung) als Näherung angesetzt.", "gewinn": "1.250–6.000€", "gewinn_hinweis": "berechnet aus Auftragswert 5.000–15.000€ × Marge 25–40% (grobe Schätzung, erste genannte Preisspanne)", "konfidenz": "niedrig", "vorbilder": [{"Firma": "KLAFS GmbH & Co. KG (auch in Österreich: klafs.at)", "Warum": "Weltweit bekannter Sauna-/Wellnesshersteller (1952 erste vorgefertigte Sauna); dokumentierter Beratungs-Case mit der Digitalagentur OMMAX zur gezielten Digitalisierung von Leadgenerierung und Vertrieb (Umstellung von reinem Offline- auf digitalen Vertrieb) – ein konkret öffentlich dokumentierter Case für digitale Kundengewinnung im Saunabau/Wellness-Segment. DACH-Marke mit starker Präsenz auch in Österreich.", "Website": "https://www.klafs.at/"}]}, {"kategorie": "Schimmelsanierung/Brandschadensanierung", "auftragswert": "1.000–10.000€ (Schimmel); Brandschadensanierung meist deutlich höher, oft 10.000–50.000€+", "auftragswert_kontext": "Schimmelsanierung typischerweise 100–420€/m² je nach Befallsgrad (kleines Bad 5m² ≈ 600–800€, Wohnzimmer 15m² ≈ 1.800–2.400€, insgesamt meist 1.000–5.000€, bei schwerem/großflächigem Befall bis ~10.000€); für Brandschadensanierung wurde keine belastbare österreichische Quelle gefunden – die genannte Spanne ist eine grobe Schätzung basierend auf Analogie zu Wasser-/Sanierungsschäden, nicht auf einer direkten Quelle.", "marge": "25–35%", "marge_kontext": "Spezialsanierung/Notdienstleistungen erzielen tendenziell höhere Margen als Standardgewerke; kategoriespezifische AT-Quelle nicht gefunden, Range ist eine plausible Einordnung oberhalb des allgemeinen Bau-Durchschnitts (20–35%).", "gewinn": "250–3.500€", "gewinn_hinweis": "berechnet aus Auftragswert 1.000–10.000€ × Marge 25–35% (grobe Schätzung, erste genannte Preisspanne)", "konfidenz": "niedrig", "vorbilder": [{"Firma": "BELFOR Austria", "Warum": "Marktführer für Brand-, Wasser- und Schimmelschadensanierung in Österreich, mit eigener Marketingabteilung und österreichweitem Filialnetz. Wuchs 2023 durch Übernahme von TEAM RED GmbH (Spezialist für Brand-, Wasser- und Schimmelsanierung) weiter und baute damit die Marktführerschaft aus – sichtbares Ergebnis konsequenter Sichtbarkeits- und Wachstumsstrategie.", "Website": "https://www.belfor.com/at/de/"}]}, {"kategorie": "Schlosserei/Metallbau", "auftragswert": "1.500–8.000€", "auftragswert_kontext": "Geländer/Zäune kosten je nach Material 60–300€ pro Laufmeter (Stahl 60–120€, Edelstahl 120–300€, Aluminium ca. 250€); ein typisches Privatprojekt (Balkon-/Treppengeländer, kleines Tor, 5–15 lfm) liegt in dieser Spanne, größere Stahlkonstruktionen/Vordächer können mehr kosten.", "marge": "35–50%", "marge_kontext": "Wie bei der Tischlerei handelt es sich um lohnintensive Maßanfertigung mit vergleichsweise geringem Materialkostenanteil; kategorie-spezifische Margendaten wurden nicht gefunden, daher analog zu anderen handwerklichen Fertigungsbetrieben geschätzt.", "gewinn": "525–4.000€", "gewinn_ const BRANCHEN_BY_KATEGORIE = Object.fromEntries(BRANCHEN_DATA.map(b => [b.kategorie, b]));

function branchInfoHtml(kategorie) {
  const b = BRANCHEN_BY_KATEGORIE[kategorie];
  if (!b) return "";
  const vb = (b.vorbilder && b.vorbilder[0]) || null;
  const vbHtml = vb
    ? `<div class="roi-vorbild">🏆 <b>Vorbild erwähnen:</b> ${escapeHtml(vb.Firma)} — ${escapeHtml(vb.Warum)}</div>`
    : "";
  return `
    <div class="row roi">
      <div class="roi-stats">
        <span><b>Auftragswert</b> ${escapeHtml(b.auftragswert || "–")}</span>
        <span><b>Marge</b> ${escapeHtml(b.marge || "–")}</span>
        <span class="roi-gewinn"><b>Gewinn/Auftrag</b> ${escapeHtml(b.gewinn || "–")}</span>
      </div>
      ${vbHtml}
    </div>
  `;
}

function confClassB(k) {
  const v = (k || "").toLowerCase();
  if (v.includes("hoch")) return "bconf-hoch";
  if (v.includes("mittel")) return "bconf-mittel";
  return "bconf-niedrig";
}

function bVorbildHtml(v) {
  const site = v.Website ? `<a href="${escapeHtml(v.Website)}" target="_blank" rel="noopener">${escapeHtml(v.Website.replace(/^https?:\/\//, "").replace(/\/$/, ""))}</a>` : "";
  return `<div class="bvb"><b>${escapeHtml(v.Firma)}</b>${site ? " · " + site : ""}<div class="bvb-why">${escapeHtml(v.Warum)}</div></div>`;
}

function bCardHtml(item) {
  const vbs = item.vorbilder && item.vorbilder.length
    ? item.vorbilder.map(bVorbildHtml).join("")
    : `<div class="bno-vb">Kein belegtes Beispiel gefunden.</div>`;
  return `
    <div class="bcard">
      <div class="bcard-head">
        <span class="bcard-name">${escapeHtml(item.kategorie)}</span>
        <span class="bcard-conf ${confClassB(item.konfidenz)}">${escapeHtml(item.konfidenz || "?")}</span>
      </div>
      <div class="bstat-row">
        <div class="bstat">
          <div class="bstat-label">Auftragswert</div>
          <div class="bstat-value">${escapeHtml(item.auftragswert || "–")}</div>
          <div class="bstat-ctx">${escapeHtml(item.auftragswert_kontext || "")}</div>
        </div>
        <div class="bstat">
          <div class="bstat-label">Marge</div>
          <div class="bstat-value">${escapeHtml(item.marge || "–")}</div>
          <div class="bstat-ctx">${escapeHtml(item.marge_kontext || "")}</div>
        </div>
        <div class="bstat gewinn">
          <div class="bstat-label">Gewinn/Auftrag</div>
          <div class="bstat-value">${escapeHtml(item.gewinn || "–")}</div>
          <div class="bstat-ctx">${escapeHtml(item.gewinn_hinweis || "")}</div>
        </div>
      </div>
      <div class="bvorbilder">
        <div class="bvorbilder-label">Vorbilder in der Branche</div>
        ${vbs}
      </div>
    </div>
  `;
}

function buildBranchen(filter) {
  const q = (filter !== undefined ? filter : document.getElementById("b-search").value).trim().toLowerCase();
  const filtered = BRANCHEN_DATA.filter(d => !q || d.kategorie.toLowerCase().includes(q));
  document.getElementById("branchen-grid").innerHTML = filtered.map(bCardHtml).join("");
  document.getElementById("branchen-count").textContent = `${filtered.length} / ${BRANCHEN_DATA.length}`;
}
document.getElementById("b-search").addEventListener("input", () => buildBranchen());

// ---------- Route planner ----------
const HOME_COORDS = [48.2435290, 16.4872532]; // Karl-Bednarik-Gasse 36, 1220 Wien
let routeState = { start: "Karl-Bednarik-Gasse 36, 1220 Wien", stopIds: [] };

const routeMap = L.map("route-map", { zoomControl: true }).setView(HOME_COORDS, 12);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  maxZoom: 19,
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(routeMap);
const routeLayer = L.layerGroup().addTo(routeMap);

function routeStopHtml(item, index, total) {
  return `
    <div class="route-stop" draggable="true" data-id="${item.id}">
      <span class="rs-num">${index + 1}</span>
      <div class="rs-info">
        <div class="rs-name">${escapeHtml(item.name)}</div>
        <div class="rs-addr">${escapeHtml(item.adresse)}</div>
      </div>
      <div class="rs-move">
        <button class="rs-up" data-up="${item.id}" title="Nach oben" ${index === 0 ? "disabled" : ""}>▲</button>
        <button class="rs-down" data-down="${item.id}" title="Nach unten" ${index === total - 1 ? "disabled" : ""}>▼</button>
      </div>
      <button class="rs-remove" data-remove="${item.id}" title="Entfernen">✕</button>
    </div>
  `;
}

function renderRoute() {
  const listEl = document.getElementById("route-list");
  const stops = routeState.stopIds.map(id => DATA_BY_ID[id]).filter(Boolean);

  const homeHtml = `<div class="route-home"><span class="rs-num">🏠</span><div class="rs-info"><div class="rs-name">Start</div><div class="rs-addr">${escapeHtml(routeState.start || "")}</div></div></div>`;
  listEl.innerHTML = homeHtml + (stops.length
    ? stops.map((item, index) => routeStopHtml(item, index, stops.length)).join("")
    : `<div id="route-empty">Noch keine Stationen. Firma oben suchen und mit + hinzufügen.</div>`);

  // drag & drop reorder
  listEl.querySelectorAll(".route-stop").forEach(el => {
    el.addEventListener("dragstart", () => el.classList.add("dragging"));
    el.addEventListener("dragend", () => el.classList.remove("dragging"));
    el.addEventListener("dragover", e => e.preventDefault());
    el.addEventListener("drop", e => {
      e.preventDefault();
      const draggingEl = listEl.querySelector(".route-stop.dragging");
      if (!draggingEl || draggingEl === el) return;
      const draggingId = draggingEl.dataset.id;
      const targetId = el.dataset.id;
      const ids = routeState.stopIds.filter(id => id !== draggingId);
      const targetIdx = ids.indexOf(targetId);
      ids.splice(targetIdx, 0, draggingId);
      routeState.stopIds = ids;
      saveRoute();
    });
  });
  listEl.querySelectorAll(".rs-remove").forEach(btn => {
    btn.addEventListener("click", () => {
      routeState.stopIds = routeState.stopIds.filter(id => id !== btn.dataset.remove);
      saveRoute();
    });
  });
  listEl.querySelectorAll(".rs-up").forEach(btn => {
    btn.addEventListener("click", () => {
      const id = btn.dataset.up;
      const idx = routeState.stopIds.indexOf(id);
      if (idx > 0) {
        [routeState.stopIds[idx - 1], routeState.stopIds[idx]] = [routeState.stopIds[idx], routeState.stopIds[idx - 1]];
        saveRoute();
      }
    });
  });
  listEl.querySelectorAll(".rs-down").forEach(btn => {
    btn.addEventListener("click", () => {
      const id = btn.dataset.down;
      const idx = routeState.stopIds.indexOf(id);
      if (idx !== -1 && idx < routeState.stopIds.length - 1) {
        [routeState.stopIds[idx], routeState.stopIds[idx + 1]] = [routeState.stopIds[idx + 1], routeState.stopIds[idx]];
        saveRoute();
      }
    });
  });

  // map: home marker + numbered stop markers + connecting line
  routeLayer.clearLayers();
  const homeIcon = L.divIcon({
    html: `<div style="background:#2563eb;color:#fff;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:14px;box-shadow:0 1px 4px rgba(0,0,0,.4);">🏠</div>`,
    className: "", iconSize: [26, 26], iconAnchor: [13, 13],
  });
  L.marker(HOME_COORDS, { icon: homeIcon }).addTo(routeLayer).bindTooltip("Start: " + (routeState.start || ""));
  const latlngs = [HOME_COORDS];
  stops.forEach((item, i) => {
    const icon = L.divIcon({
      html: `<div style="background:#ef7a44;color:#0f1c28;border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;box-shadow:0 1px 4px rgba(0,0,0,.4);">${i + 1}</div>`,
      className: "", iconSize: [24, 24], iconAnchor: [12, 12],
    });
    if (item.lat && item.lng) {
      L.marker([item.lat, item.lng], { icon }).addTo(routeLayer).bindTooltip(`${i + 1}. ${item.name}`);
      latlngs.push([item.lat, item.lng]);
    }
  });
  if (latlngs.length > 1) {
    L.polyline(latlngs, { color: "#ef7a44", weight: 3, dashArray: "6 6" }).addTo(routeLayer);
    routeMap.fitBounds(L.latLngBounds(latlngs), { padding: [30, 30] });
  }
}

function saveRoute() {
  renderRoute();
  refreshRouteBadges();
  fbWriteRoute();
}

document.getElementById("route-start").addEventListener("change", (e) => {
  routeState.start = e.target.value;
  saveRoute();
});

const routeSearchInput = document.getElementById("route-search");
const routeSearchResults = document.getElementById("route-search-results");
routeSearchInput.addEventListener("input", () => {
  const q = routeSearchInput.value.trim().toLowerCase();
  if (!q) { routeSearchResults.classList.remove("show"); return; }
  const matches = DATA.filter(d => !routeState.stopIds.includes(d.id) &&
    (d.name.toLowerCase().includes(q) || d.adresse.toLowerCase().includes(q) || d.gebiet.toLowerCase().includes(q))
  ).slice(0, 12);
  routeSearchResults.innerHTML = matches.map(m => `
    <div class="rsr-item">
      <span>${escapeHtml(m.name)} <span style="color:#6b7280">— ${escapeHtml(m.gebiet)}</span></span>
      <button class="rsr-add" data-add="${m.id}">+ Route</button>
    </div>
  `).join("") || `<div class="rsr-item">Keine Treffer</div>`;
  routeSearchResults.classList.add("show");
});
routeSearchResults.addEventListener("click", (e) => {
  const btn = e.target.closest(".rsr-add");
  if (!btn) return;
  routeState.stopIds.push(btn.dataset.add);
  saveRoute();
  routeSearchInput.value = "";
  routeSearchResults.classList.remove("show");
});
document.addEventListener("click", (e) => {
  if (!e.target.closest("#route-toolbar")) routeSearchResults.classList.remove("show");
});

document.getElementById("btn-route-clear").addEventListener("click", () => {
  if (confirm("Route wirklich leeren?")) {
    routeState.stopIds = [];
    saveRoute();
  }
});
document.getElementById("btn-route-maps").addEventListener("click", () => {
  const stops = routeState.stopIds.map(id => DATA_BY_ID[id]).filter(Boolean);
  if (!stops.length) { alert("Route ist leer — erst Stationen hinzufügen."); return; }
  const points = [routeState.start, ...stops.map(s => s.adresse)].map(encodeURIComponent);
  const url = "https://www.google.com/maps/dir/" + points.join("/");
  window.open(url, "_blank");
});

buildMarkers();
</script>
