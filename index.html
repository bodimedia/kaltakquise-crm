  return `<div class="d-section"><h3>Konkurrenz-Werbestatus</h3>${warn}${table}${editRow}</div>`;
}

function dossierReichweiteHtml(item) {
  const gebietKey = normalizeGebiet(item.gebiet);
  const area = gebietKey ? AREA_REACH_BY_GEBIET[gebietKey] : null;
  if (!area) {
    return `<div class="d-section"><h3>Gebiets-Reichweite</h3><div class="d-empty-note">Für „${escapeHtml(item.gebiet || "")}" liegen noch keine Gebietsdaten vor.</div></div>`;
  }
  const reachEst = Math.round(area.einwohner * 0.65);
  return `
    <div class="d-section">
      <h3>Gebiets-Reichweite</h3>
      <div class="d-reach-stats">
        <div class="d-reach-stat"><div class="d-r-label">Einwohner ${escapeHtml(area.gebiet)}</div><div class="d-r-value">${area.einwohner.toLocaleString("de-AT")}</div></div>
        <div class="d-reach-stat"><div class="d-r-label">Potenzielle Online-Reichweite</div><div class="d-r-value">~${reachEst.toLocaleString("de-AT")}</div></div>
      </div>
      <p class="d-reach-note">${escapeHtml(area.charakter || "")}</p>
      <p class="d-empty-note">Reichweite = grober Richtwert (ca. 60–70% Social-Media-Nutzung in der Region), keine exakte Prognose.</p>
    </div>
  `;
}

function dossierIstZustandHtml(item, dossier) {
  const dz = dossier.digitaler_ist_zustand || {};
  const rows = [];
  const marketingText = item.marketing || "";
  const pixelMatch = marketingText.match(/Pixel:\s*([^|]+)/);
  const pixelText = pixelMatch ? pixelMatch[1].trim() : null;
  if (pixelText) {
    const isWeak = /nicht (gefunden|installiert|aktiv|prüfbar)/i.test(pixelText);
    const isGood = !isWeak && /gefunden|aktiv|installiert/i.test(pixelText);
    const dot = isGood ? "mittel" : (isWeak ? "schwach" : "unklar");
    rows.push(`<div class="d-ist-row"><span class="d-ist-dot ${dot}"></span> Tracking-Pixel: ${escapeHtml(pixelText)}</div>`);
  }
  if (item.website && /^ja:/i.test(item.website)) {
    rows.push(`<div class="d-ist-row"><span class="d-ist-dot mittel"></span> Website vorhanden</div>`);
  } else {
    rows.push(`<div class="d-ist-row"><span class="d-ist-dot schwach"></span> Keine Website hinterlegt</div>`);
  }
  if (item.fb_ads_link) {
    rows.push(`<div class="d-ist-row"><span class="d-ist-dot unklar"></span> Meta Ads Library-Check verfügbar (manuell geprüft werden)</div>`);
  }
  if (dz.zusammenfassung) {
    rows.push(`<div class="d-ist-row"><span class="d-ist-dot ${dz.status || "unklar"}"></span> ${escapeHtml(dz.zusammenfassung)}</div>`);
  }
  const editArea = `
    <div data-crm-only style="margin-top:10px;">
      <label style="font-size:11.5px;color:#6b8494;">Eigene Einschätzung / Recherche-Notiz:</label>
      <textarea class="d-textarea" id="d-istzustand-text" placeholder="z.B. Website veraltet, kein Impressum, keine Ads gefunden ...">${escapeHtml(dz.zusammenfassung || "")}</textarea>
    </div>
  `;
  return `<div class="d-section"><h3>Digitaler Ist-Zustand</h3>${rows.join("")}${editArea}</div>`;
}

function dossierStepsHtml(item, dossier) {
  const steps = (dossier.empfehlung_schritte && dossier.empfehlung_schritte.length) ? dossier.empfehlung_schritte : defaultSteps(item);
  return `<div class="d-section"><h3>Empfohlenes Vorgehen</h3><ol class="d-steps">${steps.map(s => `<li>${escapeHtml(s)}</li>`).join("")}</ol></div>`;
}

function roiDefaults(item) {
  const b = BRANCHEN_BY_KATEGORIE[item.kategorie];
  let auftragswert = 500, marge = 25;
  if (b) {
    const m = (b.auftragswert || "").match(/([\d.,]+)\s*€/);
    if (m) auftragswert = Math.round(parseFloat(m[1].replace(/\./g, "").replace(",", ".")));
    const mg = (b.marge || "").match(/(\d+)/);
    if (mg) marge = parseInt(mg[1], 10);
  }
  return { auftragswert, marge };
}

function roiCalcHtml(item) {
  const d = roiDefaults(item);
  return `
    <div class="roi-calc d-section">
      <h3>ROI-Rechner</h3>
      <div class="roi-field"><label>Monatliches Werbebudget</label>
        <div class="roi-input-wrap"><input type="number" inputmode="decimal" id="roi-budget" value="800"><span class="roi-unit">€</span></div></div>
      <div class="roi-field"><label>Ø Kosten pro Lead (Richtwert)</label>
        <div class="roi-input-wrap"><input type="number" inputmode="decimal" id="roi-cpl" value="30"><span class="roi-unit">€</span></div></div>
      <div class="roi-field"><label>Abschlussquote der Leads</label>
        <div class="roi-input-wrap"><input type="number" inputmode="decimal" id="roi-quote" value="20"><span class="roi-unit">%</span></div></div>
      <div class="roi-field"><label>Ø Auftragswert</label>
        <div class="roi-input-wrap"><input type="number" inputmode="decimal" id="roi-auftragswert" value="${d.auftragswert}"><span class="roi-unit">€</span></div></div>
      <div class="roi-field"><label>Marge auf den Auftrag</label>
        <div class="roi-input-wrap"><input type="number" inputmode="decimal" id="roi-marge" value="${d.marge}"><span class="roi-unit">%</span></div></div>
      <div class="roi-out-grid">
        <div class="roi-out"><div class="roi-out-label">Leads / Monat</div><div class="roi-out-value" id="roi-out-leads">–</div></div>
        <div class="roi-out"><div class="roi-out-label">Neukunden / Monat</div><div class="roi-out-value" id="roi-out-kunden">–</div></div>
        <div class="roi-out"><div class="roi-out-label">Zusatzumsatz / Monat</div><div class="roi-out-value" id="roi-out-umsatz">–</div></div>
        <div class="roi-out hero"><div class="roi-out-label">Geschätzter Gewinn / Monat</div><div class="roi-out-value" id="roi-out-gewinn">–</div><div style="font-size:12px;color:#a8b4bd;margin-top:2px;" id="roi-out-faktor"></div></div>
      </div>
    </div>
  `;
}
function wireRoiCalc() {
  const ids = ["roi-budget", "roi-cpl", "roi-quote", "roi-auftragswert", "roi-marge"];
  const fmt = n => Math.round(n).toLocaleString("de-AT");
  function recalc() {
    const budget = parseFloat(document.getElementById("roi-budget").value) || 0;
    const cpl = parseFloat(document.getElementById("roi-cpl").value) || 0;
    const quote = parseFloat(document.getElementById("roi-quote").value) || 0;
    const auftragswert = parseFloat(document.getElementById("roi-auftragswert").value) || 0;
    const marge = parseFloat(document.getElementById("roi-marge").value) || 0;
    const leads = cpl > 0 ? budget / cpl : 0;
    const kunden = leads * (quote / 100);
    const umsatz = kunden * auftragswert;
    const gewinn = umsatz * (marge / 100);
    const roiFactor = budget > 0 ? gewinn / budget : 0;
    document.getElementById("roi-out-leads").textContent = fmt(leads);
    document.getElementById("roi-out-kunden").textContent = kunden.toFixed(1).replace(".", ",");
    document.getElementById("roi-out-umsatz").textContent = fmt(umsatz) + " €";
    document.getElementById("roi-out-gewinn").textContent = fmt(gewinn) + " €";
    document.getElementById("roi-out-faktor").textContent = roiFactor > 0 ? `entspricht ca. ${roiFactor.toFixed(1).replace(".", ",")}x dem Werbebudget` : "";
  }
  ids.forEach(id => document.getElementById(id).addEventListener("input", recalc));
  recalc();
}

function dossierCrmExtrasHtml(item) {
  const st = getEntry(item.id);
  const tagsHtml = OBJECTION_TAGS.map(t =>
    `<button type="button" class="d-tag ${st.einwand_tags.indexOf(t) !== -1 ? "active" : ""}" data-tag="${escapeHtml(t)}">${escapeHtml(t)}</button>`
  ).join("");
  const skala = st.skala_wert == null ? 5 : st.skala_wert;
  const ft = st.folgetermin || {};
  return `
    <div class="d-section" data-crm-only>
      <h3>Status &amp; interne Notizen</h3>
      <div class="row" style="margin-bottom:10px;"><b>Status:</b> ${statusSelectHtml(item.id, "status-select-dossier")}</div>
      <textarea class="d-textarea" id="d-notiz-text" placeholder="Notiz ...">${escapeHtml(st.notiz)}</textarea>
      <button class="d-mini-btn" type="button" id="d-notiz-save" style="margin-top:8px;">Notiz speichern</button>
    </div>
    <div class="d-section" data-crm-only>
      <h3>Einwände</h3>
      <div class="d-tags">${tagsHtml}</div>
    </div>
    <div class="d-section" data-crm-only>
      <h3>Interesse-Skala</h3>
      <div class="d-skala-row">
        <input type="range" min="0" max="10" id="d-skala-range" value="${skala}">
        <span class="d-skala-val" id="d-skala-val">${skala}</span>
      </div>
    </div>
    <div class="d-section" data-crm-only>
      <h3>Folgetermin</h3>
      <div class="d-follow-row">
        <input type="date" id="d-follow-date" value="${escapeHtml(ft.datum || "")}">
        <input type="time" id="d-follow-time" value="${escapeHtml(ft.uhrzeit || "")}">
      </div>
      <textarea class="d-textarea" id="d-follow-note" placeholder="Notiz zum Termin ..." style="margin-top:8px;">${escapeHtml(ft.notiz || "")}</textarea>
    </div>
  `;
}

function renderDossier() {
  const item = currentDossierItem, dossier = currentDossierData;
  if (!item || !dossier) return;
  const html = [
    dossierHeadHtml(item),
    dossierKonkurrenzHtml(item, dossier),
    dossierReichweiteHtml(item),
    dossierIstZustandHtml(item, dossier),
    dossierStepsHtml(item, dossier),
    roiCalcHtml(item),
    dossierCrmExtrasHtml(item),
  ].join("");
  document.getElementById("dossier-content").innerHTML = html;
  wireDossierEvents(item, dossier);
  wireRoiCalc();
}

function saveDossierPatch(patch) {
  currentDossierData = Object.assign({}, currentDossierData, patch);
  fbWriteDossier(currentDossierItem.id, currentDossierData);
}

function wireDossierEvents(item, dossier) {
  const root = document.getElementById("dossier-content");

  const addBtn = root.querySelector("#d-konk-add");
  if (addBtn) {
    addBtn.addEventListener("click", () => {
      const name = root.querySelector('[data-f="name"]').value.trim();
      const werbestatus = root.querySelector('[data-f="werbestatus"]').value;
      const hinweis = root.querySelector('[data-f="hinweis"]').value.trim();
      if (!name) return;
      const konkurrenten = (dossier.konkurrenten || []).concat([{ name, werbestatus, hinweis }]);
      saveDossierPatch({ konkurrenten });
      renderDossier();
    });
  }
  root.querySelectorAll("[data-konk-remove]").forEach(btn => {
    btn.addEventListener("click", () => {
      const idx = parseInt(btn.dataset.konkRemove, 10);
      const konkurrenten = (dossier.konkurrenten || []).filter((_, i) => i !== idx);
      saveDossierPatch({ konkurrenten });
      renderDossier();
    });
  });
  const rechercheSel = root.querySelector("#d-recherche-status-select");
  if (rechercheSel) {
    rechercheSel.addEventListener("change", () => {
      saveDossierPatch({ recherche_status: rechercheSel.value, recherche_datum: new Date().toISOString().slice(0, 10) });
    });
  }
  const istzustandText = root.querySelector("#d-istzustand-text");
  if (istzustandText) {
    istzustandText.addEventListener("change", () => {
      const dz = Object.assign({}, dossier.digitaler_ist_zustand, { zusammenfassung: istzustandText.value.trim() });
      saveDossierPatch({ digitaler_ist_zustand: dz });
    });
  }

  const statusSel = root.querySelector(".status-select-dossier");
  if (statusSel) {
    statusSel.addEventListener("change", () => {
      setStatus(item.id, statusSel.value);
      const marker = markerById[item.id];
      if (marker) marker.setStyle({ fillColor: colorFor(item) });
      updateStatusIcon(item);
    });
  }
  const notizSave = root.querySelector("#d-notiz-save");
  if (notizSave) {
    notizSave.addEventListener("click", () => {
      const st = getEntry(item.id);
      st.notiz = root.querySelector("#d-notiz-text").value;
      saveState(state);
      fbWriteLeadState(item.id, st);
      notizSave.textContent = "Gespeichert ✓";
      setTimeout(() => notizSave.textContent = "Notiz speichern", 1200);
    });
  }
  root.querySelectorAll("[data-tag]").forEach(btn => {
    btn.addEventListener("click", () => {
      const st = getEntry(item.id);
      const tag = btn.dataset.tag;
      const i = st.einwand_tags.indexOf(tag);
      if (i === -1) st.einwand_tags.push(tag); else st.einwand_tags.splice(i, 1);
      saveState(state);
      fbWriteLeadState(item.id, st);
      btn.classList.toggle("active");
    });
  });
  const skalaRange = root.querySelector("#d-skala-range");
  if (skalaRange) {
    skalaRange.addEventListener("input", () => {
      root.querySelector("#d-skala-val").textContent = skalaRange.value;
    });
    skalaRange.addEventListener("change", () => {
      const st = getEntry(item.id);
      st.skala_wert = parseInt(skalaRange.value, 10);
      saveState(state);
      fbWriteLeadState(item.id, st);
    });
  }
  const followDate = root.querySelector("#d-follow-date");
  const followTime = root.querySelector("#d-follow-time");
  const followNote = root.querySelector("#d-follow-note");
  function saveFollow() {
    const st = getEntry(item.id);
    const datum = followDate.value, uhrzeit = followTime.value, notiz = followNote.value;
    st.folgetermin = (datum || uhrzeit || notiz) ? { datum, uhrzeit, notiz } : null;
    saveState(state);
    fbWriteLeadState(item.id, st);
  }
  [followDate, followTime].forEach(el => el && el.addEventListener("change", saveFollow));
  if (followNote) followNote.addEventListener("change", saveFollow);
}

// ---------- Route planner ----------
const HOME_COORDS = [48.2435290, 16.4872532]; // Karl-Bednarik-Gasse 36, 1220 Wien
let routeState = { start: "Karl-Bednarik-Gasse 36, 1220 Wien", stopIds: [] };

const routeMap = L.map("route-map", { zoomControl: true }).setView(HOME_COORDS, 12);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  maxZoom: 19,
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(routeMap);
const routeLayer = L.layerGroup().addTo(routeMap);

function routeStopHtml(item, index, total) {
  return `
    <div class="route-stop" draggable="true" data-id="${item.id}">
      <span class="rs-num">${index + 1}</span>
      <div class="rs-info">
        <div class="rs-name">${escapeHtml(item.name)}</div>
        <div class="rs-addr">${escapeHtml(item.adresse)}</div>
      </div>
      <div class="rs-move">
        <button class="rs-up" data-up="${item.id}" title="Nach oben" ${index === 0 ? "disabled" : ""}>▲</button>
        <button class="rs-down" data-down="${item.id}" title="Nach unten" ${index === total - 1 ? "disabled" : ""}>▼</button>
      </div>
      <button class="rs-remove" data-remove="${item.id}" title="Entfernen">✕</button>
    </div>
  `;
}

function renderRoute() {
  const listEl = document.getElementById("route-list");
  const stops = routeState.stopIds.map(id => DATA_BY_ID[id]).filter(Boolean);

  const homeHtml = `<div class="route-home"><span class="rs-num">🏠</span><div class="rs-info"><div class="rs-name">Start</div><div class="rs-addr">${escapeHtml(routeState.start || "")}</div></div></div>`;
  listEl.innerHTML = homeHtml + (stops.length
    ? stops.map((item, index) => routeStopHtml(item, index, stops.length)).join("")
    : `<div id="route-empty">Noch keine Stationen. Firma oben suchen und mit + hinzufügen.</div>`);

  // drag & drop reorder
  listEl.querySelectorAll(".route-stop").forEach(el => {
    el.addEventListener("dragstart", () => el.classList.add("dragging"));
    el.addEventListener("dragend", () => el.classList.remove("dragging"));
    el.addEventListener("dragover", e => e.preventDefault());
    el.addEventListener("drop", e => {
      e.preventDefault();
      const draggingEl = listEl.querySelector(".route-stop.dragging");
      if (!draggingEl || draggingEl === el) return;
      const draggingId = draggingEl.dataset.id;
      const targetId = el.dataset.id;
      const ids = routeState.stopIds.filter(id => id !== draggingId);
      const targetIdx = ids.indexOf(targetId);
      ids.splice(targetIdx, 0, draggingId);
      routeState.stopIds = ids;
      saveRoute();
    });
  });
  listEl.querySelectorAll(".rs-remove").forEach(btn => {
    btn.addEventListener("click", () => {
      routeState.stopIds = routeState.stopIds.filter(id => id !== btn.dataset.remove);
      saveRoute();
    });
  });
  listEl.querySelectorAll(".rs-up").forEach(btn => {
    btn.addEventListener("click", () => {
      const id = btn.dataset.up;
      const idx = routeState.stopIds.indexOf(id);
      if (idx > 0) {
        [routeState.stopIds[idx - 1], routeState.stopIds[idx]] = [routeState.stopIds[idx], routeState.stopIds[idx - 1]];
        saveRoute();
      }
    });
  });
  listEl.querySelectorAll(".rs-down").forEach(btn => {
    btn.addEventListener("click", () => {
      const id = btn.dataset.down;
      const idx = routeState.stopIds.indexOf(id);
      if (idx !== -1 && idx < routeState.stopIds.length - 1) {
        [routeState.stopIds[idx], routeState.stopIds[idx + 1]] = [routeState.stopIds[idx + 1], routeState.stopIds[idx]];
        saveRoute();
      }
    });
  });

  // map: home marker + numbered stop markers + connecting line
  routeLayer.clearLayers();
  const homeIcon = L.divIcon({
    html: `<div style="background:#2563eb;color:#fff;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:14px;box-shadow:0 1px 4px rgba(0,0,0,.4);">🏠</div>`,
    className: "", iconSize: [26, 26], iconAnchor: [13, 13],
  });
  L.marker(HOME_COORDS, { icon: homeIcon }).addTo(routeLayer).bindTooltip("Start: " + (routeState.start || ""));
  const latlngs = [HOME_COORDS];
  stops.forEach((item, i) => {
    const icon = L.divIcon({
      html: `<div style="background:#ef7a44;color:#0f1c28;border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;box-shadow:0 1px 4px rgba(0,0,0,.4);">${i + 1}</div>`,
      className: "", iconSize: [24, 24], iconAnchor: [12, 12],
    });
    if (item.lat && item.lng) {
      L.marker([item.lat, item.lng], { icon }).addTo(routeLayer).bindTooltip(`${i + 1}. ${item.name}`);
      latlngs.push([item.lat, item.lng]);
    }
  });
  if (latlngs.length > 1) {
    L.polyline(latlngs, { color: "#ef7a44", weight: 3, dashArray: "6 6" }).addTo(routeLayer);
    routeMap.fitBounds(L.latLngBounds(latlngs), { padding: [30, 30] });
  }
}

function saveRoute() {
  renderRoute();
  refreshRouteBadges();
  fbWriteRoute();
}

document.getElementById("route-start").addEventListener("change", (e) => {
  routeState.start = e.target.value;
  saveRoute();
});

const routeSearchInput = document.getElementById("route-search");
const routeSearchResults = document.getElementById("route-search-results");
routeSearchInput.addEventListener("input", () => {
  const q = routeSearchInput.value.trim().toLowerCase();
  if (!q) { routeSearchResults.classList.remove("show"); return; }
  const matches = DATA.filter(d => !routeState.stopIds.includes(d.id) &&
    (d.name.toLowerCase().includes(q) || d.adresse.toLowerCase().includes(q) || d.gebiet.toLowerCase().includes(q))
  ).slice(0, 12);
  routeSearchResults.innerHTML = matches.map(m => `
    <div class="rsr-item">
      <span>${escapeHtml(m.name)} <span style="color:#6b7280">— ${escapeHtml(m.gebiet)}</span></span>
      <button class="rsr-add" data-add="${m.id}">+ Route</button>
    </div>
  `).join("") || `<div class="rsr-item">Keine Treffer</div>`;
  routeSearchResults.classList.add("show");
});
routeSearchResults.addEventListener("click", (e) => {
  const btn = e.target.closest(".rsr-add");
  if (!btn) return;
  routeState.stopIds.push(btn.dataset.add);
  saveRoute();
  routeSearchInput.value = "";
  routeSearchResults.classList.remove("show");
});
document.addEventListener("click", (e) => {
  if (!e.target.closest("#route-toolbar")) routeSearchResults.classList.remove("show");
});

document.getElementById("btn-route-clear").addEventListener("click", () => {
  if (confirm("Route wirklich leeren?")) {
    routeState.stopIds = [];
    saveRoute();
  }
});
document.getElementById("btn-route-maps").addEventListener("click", () => {
  const stops = routeState.stopIds.map(id => DATA_BY_ID[id]).filter(Boolean);
  if (!stops.length) { alert("Route ist leer — erst Stationen hinzufügen."); return; }
  const points = [routeState.start, ...stops.map(s => s.adresse)].map(encodeURIComponent);
  const url = "https://www.google.com/maps/dir/" + points.join("/");
  window.open(url, "_blank");
});

buildMarkers();
