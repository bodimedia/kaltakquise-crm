<!DOCTYPE html>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Kaltakquise Leads – Wien 22 &amp; Marchfeld</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet">
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  body { display: flex; flex-direction: column; height: 100vh; overflow: hidden; background: #fff; color: #111; }
  @media (prefers-color-scheme: dark) { body { background: #15181c; color: #e8e8e8; } }

  #topbar {
    display: flex; flex-wrap: wrap; gap: 6px; align-items: center;
    padding: 8px 10px; background: #1f2937; color: #fff; z-index: 1000;
    box-shadow: 0 2px 6px rgba(0,0,0,.25);
  }
  #topbar h1 { font-size: 14px; margin: 0 10px 0 0; font-weight: 700; white-space: nowrap; }
  #topbar select, #topbar input[type=text] {
    font-size: 13px; padding: 5px 6px; border-radius: 6px; border: 1px solid #4b5563;
    background: #111827; color: #fff; max-width: 150px;
  }
  #topbar button {
    font-size: 13px; padding: 6px 10px; border-radius: 6px; border: none;
    background: #2563eb; color: #fff; cursor: pointer; white-space: nowrap;
  }
  #topbar button:hover { background: #1d4ed8; }
  #topbar button.secondary { background: #374151; }
  #topbar button.secondary:hover { background: #4b5563; }
  #topbar button.tab-btn { background: #374151; }
  #topbar button.tab-btn.active { background: #2563eb; }
  #stats { font-size: 12px; color: #cbd5e1; margin-left: auto; white-space: nowrap; }

  #view-map { flex: 1; display: flex; min-height: 0; }
  #view-map.hidden { display: none; }
  #map { flex: 1; width: 100%; }

  #view-pipeline { flex: 1; display: none; min-height: 0; overflow: hidden; flex-direction: column; background: #f3f4f6; }
  #view-pipeline.active { display: flex; }
  @media (prefers-color-scheme: dark) { #view-pipeline { background: #0f1115; } }
  #pipeline-toolbar { display: flex; gap: 6px; padding: 8px; flex-wrap: wrap; align-items: center; background: #e5e7eb; }
  @media (prefers-color-scheme: dark) { #pipeline-toolbar { background: #1a1d23; } }
  #pipeline-toolbar select, #pipeline-toolbar input[type=text] {
    font-size: 13px; padding: 5px 6px; border-radius: 6px; border: 1px solid #9ca3af;
  }
  #kanban { flex: 1; overflow-x: auto; overflow-y: hidden; display: flex; gap: 8px; padding: 8px; }
  .kanban-col {
    flex: 0 0 220px; display: flex; flex-direction: column; background: rgba(0,0,0,.04);
    border-radius: 8px; overflow: hidden;
  }
  @media (prefers-color-scheme: dark) { .kanban-col { background: rgba(255,255,255,.05); } }
  .kanban-col-head {
    padding: 8px; font-size: 12px; font-weight: 700; color: #fff; display: flex;
    justify-content: space-between; align-items: center;
  }
  .kanban-col-body { flex: 1; overflow-y: auto; padding: 6px; display: flex; flex-direction: column; gap: 6px; }
  .kanban-col-body.dragover { background: rgba(37,99,235,.15); }
  .kcard {
    background: #fff; border-radius: 6px; padding: 7px 8px; font-size: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.15);
    cursor: grab; border-left: 4px solid #999;
  }
  @media (prefers-color-scheme: dark) { .kcard { background: #262a33; color: #eee; } }
  .kcard.dragging { opacity: .4; }
  .kcard b { display: block; font-size: 12.5px; margin-bottom: 2px; }
  .kcard .meta { font-size: 10.5px; color: #6b7280; margin-bottom: 4px; }
  .kcard select.status-select { width: 100%; font-size: 11px; padding: 2px; margin-top: 4px; }
  .kcard a { color: #2563eb; }

  .legend {
    background: rgba(255,255,255,.95); padding: 8px 10px; border-radius: 8px;
    font-size: 11px; line-height: 1.5; box-shadow: 0 1px 4px rgba(0,0,0,.3); max-width: 200px;
    max-height: min(80vh, 600px); display: flex; flex-direction: column;
  }
  @media (prefers-color-scheme: dark) { .legend { background: rgba(30,33,38,.95); color: #eee; } }
  .legend .dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 5px; vertical-align: middle; }
  .legend .a-ring { display:inline-block; width:10px; height:10px; border-radius:50%; border:2px solid gold; vertical-align:middle; margin-right:5px; }
  .legend-cat-controls { display: flex; gap: 6px; margin: 4px 0 6px; flex: 0 0 auto; }
  .legend-cat-controls button {
    font-size: 10px; padding: 3px 8px; border-radius: 10px; border: none; background: #2563eb; color: #fff; cursor: pointer;
  }
  .legend-cat-controls button:hover { background: #1d4ed8; }
  .legend-cat-row { display: flex; align-items: center; gap: 4px; cursor: pointer; padding: 1px 0; }
  .legend-cat-row input { margin: 0; cursor: pointer; }
  .legend-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; cursor: pointer; font-weight: 700; flex: 0 0 auto; }
  .legend-arrow { transition: transform .15s; }
  .legend.collapsed .legend-arrow { transform: rotate(-90deg); }
  .legend-body { margin-top: 6px; display: flex; flex-direction: column; flex: 1 1 auto; min-height: 0; overflow: hidden; }
  .legend-cat-list { overflow-y: auto; flex: 1 1 auto; min-height: 40px; }
  .legend.collapsed .legend-body { display: none; }
  .legend.collapsed { padding-bottom: 8px; max-height: none; }

  .popup-box { font-size: 13px; width: 300px; max-width: 80vw; line-height: 1.45; }
  .leaflet-popup-content { margin: 12px 14px; }
  .leaflet-popup-content-wrapper { border-radius: 10px; }
  .popup-box h3 { margin: 0 0 4px; font-size: 14px; }
  .popup-box .badge { display: inline-block; font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 10px; margin-right: 4px; }
  .badge.A { background: gold; color: #333; }
  .badge.B { background: #ddd; color: #333; }
  .popup-box .row { margin: 3px 0; }
  .popup-box a { color: #2563eb; }
  .popup-box .edit-website-btn {
    background: none; border: none; cursor: pointer; font-size: 12px; padding: 0 3px; vertical-align: middle;
  }
  .popup-box .website-edit-box { display: inline-flex; gap: 4px; margin-top: 4px; width: 100%; }
  .popup-box .website-edit-input {
    flex: 1; font-size: 12px; padding: 4px 6px; border-radius: 4px; border: 1px solid #ccc; min-width: 0;
  }
  .popup-box .website-save-btn {
    font-size: 11px; padding: 4px 8px; border-radius: 4px; border: none; background: #2563eb; color: #fff; cursor: pointer; white-space: nowrap;
  }
  .popup-box textarea {
    width: 100%; font-size: 12px; padding: 4px; border-radius: 4px; border: 1px solid #ccc;
    resize: vertical; min-height: 40px; font-family: inherit;
  }
  .popup-box select.status-select-popup { width: 100%; font-size: 12px; padding: 4px; margin-top: 6px; border-radius: 4px; }
  .popup-box button.save-note { margin-top: 4px; font-size: 11px; padding: 3px 8px; border-radius: 4px; border: none; background: #2563eb; color: #fff; cursor: pointer; }
  .popup-box .marketing { font-size: 11px; color: #555; }
  .popup-box .marketing a { word-break: break-all; }
  .popup-box .roi { font-size: 11px; background: #ecfdf5; border-left: 3px solid #10b981; padding: 5px 7px; border-radius: 3px; }
  @media (prefers-color-scheme: dark) { .popup-box .roi { background: #052e21; } }
  .popup-box .roi-stats { display: flex; flex-direction: column; gap: 2px; }
  .popup-box .roi-stats span { display: block; }
  .popup-box .roi-gewinn { color: #b8560f; }
  @media (prefers-color-scheme: dark) { .popup-box .roi-gewinn { color: #ef7a44; } }
  .popup-box .roi-vorbild { margin-top: 5px; padding-top: 5px; border-top: 1px dashed rgba(0,0,0,.15); }
  @media (prefers-color-scheme: dark) { .popup-box .roi-vorbild { border-top-color: rgba(255,255,255,.15); } }
  .route-toggle-btn {
    width: 100%; font-size: 12px; padding: 7px; border-radius: 6px; border: none; cursor: pointer;
    background: #2563eb; color: #fff; font-weight: 600;
  }
  .route-toggle-btn.in-route { background: #ef7a44; color: #0f1c28; }
  .route-num-badge {
    background: #ef7a44; color: #0f1c28; border-radius: 50%; width: 22px; height: 22px;
    display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 11px;
    box-shadow: 0 1px 4px rgba(0,0,0,.5); border: 2px solid #fff;
  }
  .status-icon-badge {
    width: 17px; height: 17px; border-radius: 50%; color: #fff; font-weight: 900; font-size: 11px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 1px 3px rgba(0,0,0,.6); border: 1.5px solid #fff;
  }
  .muster-crown-badge, .traumkunde-badge {
    width: 16px; height: 16px; font-size: 15px; line-height: 1;
    display: flex; align-items: center; justify-content: center;
    filter: drop-shadow(0 1px 2px rgba(0,0,0,.7));
  }
  .route-badge-tooltip { background: transparent; border: none; box-shadow: none; padding: 0; }
  .route-badge-tooltip::before { display: none; }

  /* --- Branchen-Referenz tab --- */
  #view-branchen { flex: 1; display: none; min-height: 0; overflow: hidden; flex-direction: column; background: #eef1f3; }
  #view-branchen.active { display: flex; }
  @media (prefers-color-scheme: dark) { #view-branchen { background: #0f1c28; } }
  #branchen-toolbar { display: flex; gap: 8px; padding: 8px; flex-wrap: wrap; align-items: center; background: #e5e7eb; }
  @media (prefers-color-scheme: dark) { #branchen-toolbar { background: #16273a; } }
  #branchen-toolbar input[type=text] { font-size: 14px; padding: 8px 12px; border-radius: 8px; border: 1px solid #9ca3af; flex: 1 1 220px; }
  #branchen-count { font-size: 11px; color: #6b7280; font-family: ui-monospace, "SF Mono", monospace; }
  #branchen-grid {
    flex: 1; overflow-y: auto; padding: 10px;
    display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 12px; align-content: start;
  }
  .bcard {
    background: #fff; border: 1px solid #d7dde3; border-radius: 10px; padding: 14px 16px 16px;
    display: flex; flex-direction: column; gap: 9px;
  }
  @media (prefers-color-scheme: dark) { .bcard { background: #16273a; border-color: rgba(223,231,238,.14); color: #e3ebf1; } }
  .bcard-head { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; }
  .bcard-name { font-size: 15px; font-weight: 700; }
  .bcard-conf {
    font-family: ui-monospace, "SF Mono", monospace; font-size: 9.5px; letter-spacing: .04em; text-transform: uppercase;
    padding: 2px 7px; border-radius: 20px; white-space: nowrap; border: 1px solid currentColor;
  }
  .bconf-hoch { color: #2f8f5b; } .bconf-mittel { color: #c98a1a; } .bconf-niedrig { color: #b0492e; }
  @media (prefers-color-scheme: dark) { .bconf-hoch { color: #4fbd85; } .bconf-mittel { color: #e0ac3f; } .bconf-niedrig { color: #e2775a; } }
  .bstat-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .bstat { flex: 1 1 90px; }
  .bstat-label { font-family: ui-monospace, "SF Mono", monospace; font-size: 9.5px; letter-spacing: .05em; text-transform: uppercase; color: #2f7d94; }
  @media (prefers-color-scheme: dark) { .bstat-label { color: #6bb9d1; } }
  .bstat-value { font-family: ui-monospace, "SF Mono", monospace; font-size: 14.5px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .bstat-ctx { font-size: 11px; color: #6b7280; margin-top: 1px; line-height: 1.35; }
  .bstat.gewinn .bstat-value { color: #b8560f; }
  @media (prefers-color-scheme: dark) { .bstat.gewinn .bstat-value { color: #ef7a44; } }
  .bvorbilder { border-top: 1px dashed #d7dde3; padding-top: 8px; display: flex; flex-direction: column; gap: 6px; }
  @media (prefers-color-scheme: dark) { .bvorbilder { border-color: rgba(223,231,238,.14); } }
  .bvorbilder-label { font-family: ui-monospace, "SF Mono", monospace; font-size: 9.5px; letter-spacing: .05em; text-transform: uppercase; color: #6b7280; }
  .bvb { font-size: 12.5px; line-height: 1.4; }
  .bvb b { font-weight: 700; }
  .bvb a { color: #2f7d94; }
  @media (prefers-color-scheme: dark) { .bvb a { color: #6bb9d1; } }
  .bvb-why { color: #6b7280; }
  .bno-vb { font-size: 11.5px; color: #6b7280; font-style: italic; }

  /* --- Lock screen --- */
  #lock-screen {
    position: fixed; inset: 0; z-index: 5000; display: flex; align-items: center; justify-content: center;
    background: #0f1c28; padding: 20px;
  }
  #lock-box {
    background: #16273a; border-radius: 14px; padding: 32px 28px; width: 100%; max-width: 320px;
    box-shadow: 0 10px 40px rgba(0,0,0,.4); text-align: center;
  }
  #lock-box h2 { color: #e3ebf1; margin: 0 0 18px; font-size: 20px; }
  #lock-box input {
    width: 100%; font-size: 16px; padding: 12px 14px; border-radius: 8px; border: 1.5px solid #2f3f52;
    background: #0f1c28; color: #e3ebf1; margin-bottom: 12px; box-sizing: border-box;
  }
  #lock-box button {
    width: 100%; font-size: 15px; padding: 12px; border-radius: 8px; border: none;
    background: #ef7a44; color: #0f1c28; font-weight: 700; cursor: pointer;
  }
  #lock-error { color: #e2775a; font-size: 13px; min-height: 18px; margin: 10px 0 0; }
  #app-root { display: none; flex-direction: column; height: 100%; flex: 1; min-height: 0; }

  /* --- Route tab --- */
  #view-route { flex: 1; display: none; min-height: 0; overflow: hidden; flex-direction: column; background: #eef1f3; }
  #view-route.active { display: flex; }
  @media (prefers-color-scheme: dark) { #view-route { background: #0f1c28; } }
  #route-toolbar { display: flex; gap: 6px; padding: 8px; flex-wrap: wrap; align-items: center; background: #e5e7eb; position: relative; }
  @media (prefers-color-scheme: dark) { #route-toolbar { background: #16273a; } }
  #route-toolbar input[type=text] {
    font-size: 13px; padding: 8px 10px; border-radius: 6px; border: 1px solid #9ca3af; flex: 1 1 180px;
  }
  #route-toolbar button {
    font-size: 13px; padding: 8px 12px; border-radius: 6px; border: none; background: #374151; color: #fff; cursor: pointer; white-space: nowrap;
  }
  #route-toolbar button.primary { background: #16a34a; }
  #route-search-results {
    position: absolute; top: 100%; left: 8px; right: 8px; z-index: 900; background: #fff; border-radius: 0 0 8px 8px;
    box-shadow: 0 6px 16px rgba(0,0,0,.25); max-height: 260px; overflow-y: auto; display: none;
  }
  @media (prefers-color-scheme: dark) { #route-search-results { background: #16273a; } }
  #route-search-results.show { display: block; }
  .rsr-item { padding: 8px 12px; font-size: 13px; display: flex; justify-content: space-between; gap: 8px; align-items: center; border-bottom: 1px solid rgba(0,0,0,.08); cursor: pointer; }
  @media (prefers-color-scheme: dark) { .rsr-item { border-bottom-color: rgba(255,255,255,.08); color: #e3ebf1; } }
  .rsr-item:hover { background: rgba(37,99,235,.08); }
  .rsr-item .rsr-add { flex-shrink: 0; background: #16a34a; color: #fff; border: none; border-radius: 6px; padding: 3px 9px; font-size: 12px; cursor: pointer; }
  #route-body { flex: 1; display: flex; min-height: 0; }
  #route-list { flex: 0 0 320px; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 6px; }
  #route-map { flex: 1; min-width: 0; }
  .route-stop {
    background: #fff; border-radius: 8px; padding: 8px 10px; font-size: 12.5px; display: flex; gap: 8px; align-items: center;
    box-shadow: 0 1px 3px rgba(0,0,0,.12); cursor: grab;
  }
  @media (prefers-color-scheme: dark) { .route-stop { background: #16273a; color: #e3ebf1; } }
  .route-stop.dragging { opacity: .4; }
  .route-stop .rs-num {
    flex-shrink: 0; width: 22px; height: 22px; border-radius: 50%; background: #ef7a44; color: #0f1c28;
    display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 11px;
  }
  .route-stop .rs-info { flex: 1; min-width: 0; }
  .route-stop .rs-name { font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .route-stop .rs-addr { color: #6b7280; font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .route-stop .rs-remove { flex-shrink: 0; background: none; border: none; color: #b0492e; font-size: 16px; cursor: pointer; padding: 2px 6px; }
  .route-stop .rs-move { flex-shrink: 0; display: flex; flex-direction: column; gap: 1px; }
  .route-stop .rs-move button {
    background: #e5e7eb; border: none; border-radius: 4px; width: 26px; height: 20px; font-size: 10px;
    cursor: pointer; color: #374151; padding: 0;
  }
  @media (prefers-color-scheme: dark) { .route-stop .rs-move button { background: #2f3f52; color: #cbd5e1; } }
  .route-stop .rs-move button:disabled { opacity: .25; cursor: default; }
  #route-empty { padding: 20px 12px; color: #6b7280; font-size: 13px; text-align: center; }
  .route-home {
    background: rgba(37,99,235,.08); border-radius: 8px; padding: 8px 10px; font-size: 12.5px; display: flex; gap: 8px; align-items: center;
  }
  .route-home .rs-num { flex-shrink: 0; width: 22px; height: 22px; border-radius: 50%; background: #2563eb; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 13px; }

  @media (max-width: 640px) {
    #topbar { padding: 6px 8px; }
    #topbar h1 { display: none; }
    #topbar select, #topbar input[type=text] { max-width: 44vw; }
    #stats { width: 100%; order: 99; margin-left: 0; }
    .kanban-col { flex-basis: 78vw; }
    #route-body { flex-direction: column; }
    #route-list { flex: 0 0 auto; max-height: 40vh; width: 100%; box-sizing: border-box; }
    #route-map { flex: 1; min-height: 220px; }
    #topbar button, #topbar select, #topbar input[type=text] { min-height: 38px; }
  }

  /* ================= Analyse-Dossier / Präsentationsmodus (bodi.media Markt-Analyse) ================= */
  .dossier-btn {
    width: 100%; margin-top: 6px; font-size: 13px; font-weight: 600; padding: 8px 10px;
    border-radius: 8px; border: none; background: #2563eb; color: #fff; cursor: pointer;
  }
  .dossier-btn:hover { background: #1d4ed8; }

  #dossier-overlay {
    display: none; position: fixed; inset: 0; z-index: 5000;
    background: #f5f7fa; color: #111827;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-optical-sizing: auto;
    flex-direction: column;
  }
  #dossier-overlay.open { display: flex; }

  .dossier-scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .dossier-body { max-width: 720px; margin: 0 auto; padding-bottom: 40px; }

  .d-brandbar {
    position: sticky; top: 0; z-index: 10; display: flex; align-items: center; justify-content: space-between;
    gap: 10px; padding: 14px 20px; background: #ffffff; border-bottom: 1px solid #e5e7eb;
  }
  .d-logo-svg { height: 19px; width: auto; display: block; }
  .d-brandbar-actions { display: flex; gap: 8px; }
  .d-bb-btn {
    font-size: 12.5px; font-weight: 600; padding: 7px 12px; border-radius: 7px; border: none; cursor: pointer;
    background: #f3f4f6; color: #111827; white-space: nowrap;
  }
  .d-bb-btn:hover { background: #e5e7eb; }
  .d-bb-btn.primary { background: #2563eb; color: #fff; }
  .d-bb-btn.primary:hover { background: #1d4ed8; }

  .d-content-pad { padding: 20px 20px 4px; display: flex; flex-direction: column; gap: 16px; }

  /* Kopf */
  .d-kopf h1 { margin: 0 0 6px; font-size: 25px; font-weight: 800; letter-spacing: -.02em; line-height: 1.15; color: #111827; text-wrap: balance; }
  .d-kopf .d-meta { margin: 0 0 10px; font-size: 13px; color: #6b7280; }
  .d-kopf .d-desc { margin: 0; font-size: 14px; color: #4b5563; line-height: 1.5; max-width: 56ch; }

  /* Card */
  .d-card {
    background: #ffffff; border: 1px solid #e5e7eb; border-radius: 14px; padding: 18px 18px 20px;
  }
  .d-card h2 { margin: 0 0 14px; font-size: 16px; font-weight: 700; color: #111827; letter-spacing: -.01em; }

  /* Karte */
  .d-map-wrap { position: relative; height: 260px; border-radius: 10px; overflow: hidden; background: #e9edf1; }
  #d-map { position: absolute; inset: 0; }
  .d-map-watermark {
    position: absolute; left: 50%; bottom: 14%; transform: translateX(-50%); z-index: 450;
    font-size: 30px; font-weight: 800; letter-spacing: .02em; color: rgba(17,24,39,.28);
    pointer-events: none; white-space: nowrap; text-transform: uppercase;
  }
  .d-map-pin-label {
    background: #fff !important; border: 1px solid #e5e7eb !important; border-radius: 8px !important;
    padding: 4px 9px !important; font-size: 11.5px !important; font-weight: 600; color: #111827;
    box-shadow: 0 2px 6px rgba(0,0,0,.1) !important;
  }

<script>
// ---------- Password gate = real Firebase Auth (server-verified, not bypassable via devtools) ----------
const UNLOCK_KEY = "kaltakquise_unlocked_v1";
const FIREBASE_LOGIN_EMAIL = "k36@karlcrm.app"; // matching Firebase Auth user (Platzhalter, keine echte Mail)

let fbReady = false;
let fbDb = null;
let fbAuthObj = null;

function showSyncWarning(msg) {
  let el = document.getElementById("sync-warning");
  if (!el) {
    el = document.createElement("div");
    el.id = "sync-warning";
    el.style.cssText = "background:#7c2d12;color:#fff;font-size:12px;padding:6px 10px;text-align:center;";
    document.getElementById("app-root").prepend(el);
  }
  el.textContent = msg;
}

function initFirebaseApp() {
  if (typeof firebase === "undefined") return false;
  try {
    const firebaseConfig = {
      apiKey: "AIzaSyAgsVZjnKQKBzjN9I857-d6ZGtFkt4Lg_s",
      authDomain: "bodi-crm.firebaseapp.com",
      databaseURL: "https://bodi-crm-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "bodi-crm",
      storageBucket: "bodi-crm.firebasestorage.app",
      messagingSenderId: "642432248289",
      appId: "1:642432248289:web:8329156b08feb937db8aa0",
    };
    if (!firebase.apps || !firebase.apps.length) firebase.initializeApp(firebaseConfig);
    fbAuthObj = firebase.auth();
    fbDb = firebase.database();
    return true;
  } catch (err) {
    console.error("Firebase Init Fehler:", err);
    return false;
  }
}

function attachFirebaseListeners() {
  fbReady = true;
  fbDb.ref("leads_data").once("value")
    .then(snapshot => {
      const val = snapshot.val();
      const arr = val ? Object.values(val) : [];
      if (!arr.length) {
        showSyncWarning("⚠️ Keine Leads-Daten in Firebase gefunden — wurden sie schon hochgeladen?");
      }
      initAppData(arr);
    })
    .catch(err => {
      console.error("Leads-Daten Ladefehler:", err);
      showSyncWarning("⚠️ Firmendaten konnten nicht geladen werden.");
    });
  fbDb.ref("leads_state").on("value", snapshot => {
    state = snapshot.val() || {};
    saveState(state);
    refreshCurrentView();
  }, err => { console.error(err); showSyncWarning("⚠️ Sync-Verbindung verloren."); });
  fbDb.ref("route").on("value", snapshot => {
    const remote = snapshot.val();
    if (remote) {
      routeState = { start: remote.start || routeState.start, stopIds: remote.stopIds || [] };
      document.getElementById("route-start").value = routeState.start;
    }
    renderRoute();
    refreshRouteBadges();
  });
}

function unlockApp() {
  document.getElementById("lock-screen").style.display = "none";
  document.getElementById("app-root").style.display = "flex";
  if (!appDataInitialized && !document.getElementById("data-loading")) {
    const el = document.createElement("div");
    el.id = "data-loading";
    el.style.cssText = "background:#1d4ed8;color:#fff;font-size:12px;padding:6px 10px;text-align:center;";
    el.textContent = "⏳ Lade Firmendaten …";
    document.getElementById("app-root").prepend(el);
  }
  setTimeout(() => { if (typeof map !== "undefined") map.invalidateSize(); }, 60);
}

function tryUnlock() {
  const val = document.getElementById("lock-password").value;
  const errEl = document.getElementById("lock-error");
  const btn = document.getElementById("lock-submit");
  errEl.textContent = "";
  if (!fbAuthObj) {
    if (!initFirebaseApp()) {
      errEl.textContent = "Keine Verbindung — bitte Internet prüfen und neu laden.";
      return;
    }
  }
  btn.disabled = true;
  btn.textContent = "Prüfe …";
  fbAuthObj.signInWithEmailAndPassword(FIREBASE_LOGIN_EMAIL, val)
    .then(() => {
      localStorage.setItem(UNLOCK_KEY, "1");
      unlockApp();
    })
    .catch(err => {
      console.error("Login-Fehler:", err);
      errEl.textContent = "Falsches Passwort.";
    })
    .finally(() => { btn.disabled = false; btn.textContent = "Entsperren"; });
}
document.getElementById("lock-submit").addEventListener("click", tryUnlock);
document.getElementById("lock-password").addEventListener("keydown", e => { if (e.key === "Enter") tryUnlock(); });

// silent re-auth on return visits (Firebase persists the session; this just re-attaches listeners + shows the app)
initFirebaseApp();
if (fbAuthObj) {
  fbAuthObj.onAuthStateChanged(user => {
    if (user) {
      attachFirebaseListeners();
      if (localStorage.getItem(UNLOCK_KEY) === "1") unlockApp();
    }
  });
}

function refreshCurrentView() {
  if (tabMapBtn.classList.contains("active")) buildMarkers();
  else if (tabPipelineBtn.classList.contains("active")) buildKanban();
  else if (tabRouteBtn.classList.contains("active")) renderRoute();
}

function fbWriteLeadState(id, entry) {
  if (!fbReady || !fbDb) return;
  fbDb.ref("leads_state/" + id).set({
    status: entry.status || "offen",
    notiz: entry.notiz || "",
    website_override: entry.website_override || "",
    musterkonkurrent: !!entry.musterkonkurrent,
    traumkunde: !!entry.traumkunde,
    einwand_tags: entry.einwand_tags || [],
    skala_wert: entry.skala_wert == null ? null : entry.skala_wert,
    folgetermin: entry.folgetermin || null,
  });
}
function fbWriteDossier(id, dossier) {
  if (!fbReady || !fbDb) return;
  fbDb.ref("leads_dossier/" + id).set(dossier);
}
function fbWriteRoute() {
  if (!fbReady || !fbDb) return;
  fbDb.ref("route").set(routeState);
}

// of hundreds of companies) — it's fetched from Firebase only after successful login,

const STORAGE_KEY = "kaltakquise_leads_state_v2";
function loadState() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
  catch (e) { return {}; }
}
function saveState(state) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}
let state = loadState();

function getEntry(id) {
  if (!state[id]) state[id] = { status: "offen", notiz: "", website_override: "", musterkonkurrent: false, traumkunde: false, einwand_tags: [], skala_wert: null, folgetermin: null };
  if (state[id].status === undefined) state[id].status = state[id].besucht ? "besucht_kein_interesse" : "offen";
  if (state[id].website_override === undefined) state[id].website_override = "";
  if (state[id].musterkonkurrent === undefined) state[id].musterkonkurrent = false;
  if (state[id].traumkunde === undefined) state[id].traumkunde = false;
  if (!Array.isArray(state[id].einwand_tags)) state[id].einwand_tags = [];
  if (state[id].skala_wert === undefined) state[id].skala_wert = null;
  if (state[id].folgetermin === undefined) state[id].folgetermin = null;
  return state[id];
}
function effectiveWebsite(item) {
  const st = getEntry(item.id);
  if (st.website_override) return "ja: " + st.website_override;
  return item.website;
}
function setStatus(id, value) {
  const st = getEntry(id);
  st.status = value;
  saveState(state);
  fbWriteLeadState(id, st);
}

const markersLayer = L.layerGroup().addTo(map);
const markerById = {};

function escapeHtml(s) {
  if (!s) return "";
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

function websiteHtml(w) {
  if (!w || w === "nein") return "nein";
  const url = w.replace(/^ja:\s*/, "").trim();
  if (!url) return "nein";
  const href = url.startsWith("http") ? url : "https://" + url;
  return `<a href="${escapeHtml(href)}" target="_blank" rel="noopener">${escapeHtml(url)}</a>`;
}

function marketingHtml(m) {
  if (!m) return "";
  const parts = m.split(" | ").map(seg => {
    return seg.replace(/(https?:\/\/[^\s]+)/g, url => `<a href="${url}" target="_blank" rel="noopener">Link</a>`);
  });
  return parts.join("<br>");
}

function statusSelectHtml(id, cssClass) {
  const st = getEntry(id);
  const opts = STATUS_OPTIONS.map(s => `<option value="${s.value}" ${s.value === st.status ? "selected" : ""}>${s.label}</option>`).join("");
  return `<select class="${cssClass}">${opts}</select>`;
}

function routeButtonHtml(id) {
  const idx = routeState.stopIds.indexOf(id);
  if (idx === -1) {
    return `<button class="route-toggle-btn" data-route-toggle="${id}">🚗 Zur Route hinzufügen</button>`;
  }
  return `<button class="route-toggle-btn in-route" data-route-toggle="${id}">✓ Route-Station ${idx + 1} — entfernen</button>`;
}

function colorFor(item) {
  const st = getEntry(item.id);
  if (st.status === "nicht_relevant" || st.status === "besucht_kein_interesse" || st.status === "angebot_abgelehnt") {
    return "#9ca3af";
  }
  return CATEGORY_COLORS[item.kategorie] || DEFAULT_COLOR;
}

// ✗ für nicht relevant, ✓ für alles, wo schon ein Besuch stattgefunden hat
function statusIconFor(status) {
  if (status === "nicht_relevant") return { symbol: "✕", bg: "#dc2626" };
  if (status === "besucht_gf_nicht_da") return { symbol: "!", bg: "#2563eb" };
  if (status && status !== "offen") return { symbol: "✓", bg: "#16a34a" };
  return null;
}

let statusIconMarkers = {};
function updateStatusIcon(item) {
  if (statusIconMarkers[item.id]) {
    markersLayer.removeLayer(statusIconMarkers[item.id]);
    delete statusIconMarkers[item.id];
  }
  if (!item.lat || !item.lng) return;
  const st = getEntry(item.id);
  const iconInfo = statusIconFor(st.status);
  if (!iconInfo) return;
  const icon = L.divIcon({
    html: `<div class="status-icon-badge" style="background:${iconInfo.bg}">${iconInfo.symbol}</div>`,
    className: "", iconSize: [17, 17], iconAnchor: [8, 8],
  });
  const m = L.marker([item.lat, item.lng], { icon, interactive: false, zIndexOffset: 1000 });
  m.addTo(markersLayer);
  statusIconMarkers[item.id] = m;
}

let topBadgeMarkers = {};
function updateTopBadges(item) {
  if (topBadgeMarkers[item.id]) {
    topBadgeMarkers[item.id].forEach(m => markersLayer.removeLayer(m));
    delete topBadgeMarkers[item.id];
  }
  if (!item.lat || !item.lng) return;
  const st = getEntry(item.id);
  const badges = [];
  if (st.musterkonkurrent) badges.push({ emoji: "👑", cls: "muster-crown-badge", title: "Musterkonkurrent" });
  if (st.traumkunde) badges.push({ emoji: "🚀", cls: "traumkunde-badge", title: "Traumkunde" });
  if (!badges.length) return;
  const radius = item.ab === "A" ? 9 : 6;
  const spacing = 15;
  const markers = [];
  badges.forEach((b, i) => {
    const desiredOffset = (i - (badges.length - 1) / 2) * spacing;
    const anchorX = 8 - desiredOffset;
    const icon = L.divIcon({
      html: `<div class="${b.cls}" title="${b.title}">${b.emoji}</div>`,
      className: "", iconSize: [16, 16], iconAnchor: [anchorX, 8 + radius],
    });
    const m = L.marker([item.lat, item.lng], { icon, interactive: false, zIndexOffset: 1001 });
    m.addTo(markersLayer);
    markers.push(m);
  });
  topBadgeMarkers[item.id] = markers;
}

function buildMarkers() {
  markersLayer.clearLayers();
  statusIconMarkers = {};
  topBadgeMarkers = {};
  const filtered = applyFilters(DATA);
  let skippedNoCoords = 0;
  filtered.forEach(item => {
    if (!item.lat || !item.lng) { skippedNoCoords++; return; }
    const isA = item.ab === "A";
    const st = getEntry(item.id);
    const isClosed = st.status === "closed";
    const marker = L.circleMarker([item.lat, item.lng], {
      radius: isA ? 9 : 6,
      fillColor: colorFor(item),
      color: isClosed ? "#16a34a" : (isA ? "#FFD700" : "#1f2937"),
      weight: isA || isClosed ? 3 : 1,
      fillOpacity: 0.9,
    });
    marker.bindPopup(popupHtml(item), {
      maxWidth: 320, minWidth: 260,
      maxHeight: Math.round(Math.min(420, window.innerHeight * 0.65)),
      autoPanPadding: [20, 20],
    });
    marker.on("popupopen", (e) => wirePopup(e.popup, item));
    marker.addTo(markersLayer);
    markerById[item.id] = marker;
    updateStatusIcon(item);
    updateTopBadges(item);
  });
  const shownCount = filtered.length - skippedNoCoords;
  document.getElementById("stats").textContent = skippedNoCoords
    ? `${shownCount} / ${DATA.length} Leads sichtbar (${skippedNoCoords} ohne Kartenkoordinaten)`
    : `${filtered.length} / ${DATA.length} Leads sichtbar`;
  refreshRouteBadges();
}

function refreshRouteBadges() {
  Object.entries(markerById).forEach(([id, marker]) => {
    if (marker.getTooltip()) marker.unbindTooltip();
    const idx = routeState.stopIds.indexOf(id);
    if (idx !== -1) {
      marker.bindTooltip(`<div class="route-num-badge">${idx + 1}</div>`, {
        permanent: true, direction: "top", offset: [0, -6], className: "route-badge-tooltip", opacity: 1,
      });
    }
  });
}

function toggleRouteStop(id) {
  const idx = routeState.stopIds.indexOf(id);
  if (idx === -1) routeState.stopIds.push(id);
  else routeState.stopIds.splice(idx, 1);
  saveRoute();
}

function wirePopup(popup, item) {
  const el = popup.getElement();
  if (!el) return;
  const statusSel = el.querySelector(".status-select-popup");
  const noteField = el.querySelector(".note-field");
  const saveBtn = el.querySelector(".save-note");
  statusSel.addEventListener("change", () => {
    setStatus(item.id, statusSel.value);
    const marker = markerById[item.id];
    if (marker) marker.setStyle({ fillColor: colorFor(item) });
    updateStatusIcon(item);
    const hideNichtRelevantEl = document.getElementById("f-hide-nicht-relevant");
    if (currentFilter("f-status") || (hideNichtRelevantEl && hideNichtRelevantEl.checked)) buildMarkers();
  });
  saveBtn.addEventListener("click", () => {
    const st = getEntry(item.id);
    st.notiz = noteField.value;
    saveState(state);
    fbWriteLeadState(item.id, st);
    saveBtn.textContent = "Gespeichert ✓";
    setTimeout(() => saveBtn.textContent = "Speichern", 1200);
  });
  const routeBtn = el.querySelector(".route-toggle-btn");
  if (routeBtn) {
    routeBtn.addEventListener("click", () => {
      toggleRouteStop(item.id);
      popup.setContent(popupHtml(item));
      wirePopup(popup, item);
    });
  }
  const editWebsiteBtn = el.querySelector(".edit-website-btn");
  const websiteEditBox = el.querySelector(".website-edit-box");
  const websiteDisplay = el.querySelector(".website-display");
  if (editWebsiteBtn) {
    editWebsiteBtn.addEventListener("click", () => {
      const showing = websiteEditBox.style.display !== "none";
      websiteEditBox.style.display = showing ? "none" : "inline-flex";
      websiteDisplay.style.display = showing ? "inline" : "none";
      if (!showing) el.querySelector(".website-edit-input").focus();
    });
  }
  const websiteSaveBtn = el.querySelector(".website-save-btn");
  if (websiteSaveBtn) {
    websiteSaveBtn.addEventListener("click", () => {
      const input = el.querySelector(".website-edit-input");
      let url = input.value.trim();
      if (url && !/^https?:\/\//i.test(url)) url = "https://" + url;
      const st = getEntry(item.id);
      st.website_override = url;
      saveState(state);
      fbWriteLeadState(item.id, st);
      popup.setContent(popupHtml(item));
      wirePopup(popup, item);
    });
  }
  const musterCb = el.querySelector(".muster-cb");
  if (musterCb) {
    musterCb.addEventListener("change", () => {
      const st = getEntry(item.id);
      st.musterkonkurrent = musterCb.checked;
      saveState(state);
      fbWriteLeadState(item.id, st);
      updateTopBadges(item);
      if (document.getElementById("f-muster-only").checked) buildMarkers();
    });
  }
  const traumCb = el.querySelector(".traum-cb");
  if (traumCb) {
    traumCb.addEventListener("change", () => {
      const st = getEntry(item.id);
      st.traumkunde = traumCb.checked;
      saveState(state);
      fbWriteLeadState(item.id, st);
      updateTopBadges(item);
      const traumOnlyEl = document.getElementById("f-traum-only");
      if (traumOnlyEl && traumOnlyEl.checked) buildMarkers();
    });
  }
  const dossierBtn = el.querySelector("[data-dossier-open]");
  if (dossierBtn) {
    dossierBtn.addEventListener("click", () => openDossier(item));
  }
}

function currentFilter(id) {
  return document.getElementById(id).value;
}

function applyFilters(data) {
  const gebiet = currentFilter("f-gebiet");
  const kategorie = currentFilter("f-kategorie");
  const b2c = currentFilter("f-b2c");
  const ab = currentFilter("f-ab");
  const status = currentFilter("f-status");
  const search = document.getElementById("f-search").value.trim().toLowerCase();

  return data.filter(item => {
    if (gebiet && item.gebiet !== gebiet) return false;
    if (kategorie && item.kategorie !== kategorie) return false;
    if (hiddenCategories.has(item.kategorie)) return false;
    const musterOnlyEl = document.getElementById("f-muster-only");
    if (musterOnlyEl && musterOnlyEl.checked && !getEntry(item.id).musterkonkurrent) return false;
    const traumOnlyEl = document.getElementById("f-traum-only");
    if (traumOnlyEl && traumOnlyEl.checked && !getEntry(item.id).traumkunde) return false;
    const hideNichtRelevantEl = document.getElementById("f-hide-nicht-relevant");
    if (hideNichtRelevantEl && hideNichtRelevantEl.checked && getEntry(item.id).status === "nicht_relevant") return false;
    if (b2c && item.b2c_b2b !== b2c) return false;
    if (ab && item.ab !== ab) return false;
    if (status && getEntry(item.id).status !== status) return false;
    if (search) {
      const hay = (item.name + " " + item.adresse).toLowerCase();
      if (!hay.includes(search)) return false;
    }
    return true;
  });
}

["f-gebiet", "f-kategorie", "f-b2c", "f-ab", "f-status"].forEach(id => {
  document.getElementById(id).addEventListener("change", buildMarkers);
});
document.getElementById("f-search").addEventListener("input", buildMarkers);

// ---------- Pipeline / Kanban ----------
function applyPipelineFilters(data) {
  const gebiet = currentFilter("p-gebiet");
  const kategorie = currentFilter("p-kategorie");
  const search = document.getElementById("p-search").value.trim().toLowerCase();
  return data.filter(item => {
    if (gebiet && item.gebiet !== gebiet) return false;
    if (kategorie && item.kategorie !== kategorie) return false;
    if (search) {
      const hay = (item.name + " " + item.adresse).toLowerCase();
      if (!hay.includes(search)) return false;
    }
    return true;
  });
}

function kcardHtml(item) {
  const telHref = item.telefon ? `<a href="tel:${item.telefon.replace(/[^\d+]/g, "")}">${escapeHtml(item.telefon)}</a>` : "";
  return `
    <div class="kcard" draggable="true" data-id="${item.id}" style="border-left-color:${CATEGORY_COLORS[item.kategorie] || DEFAULT_COLOR}">
      <b>${escapeHtml(item.name)} ${item.ab === "A" ? "⭐" : ""}</b>
      <div class="meta">${escapeHtml(item.kategorie)} · ${escapeHtml(item.gebiet)}</div>
      <div class="meta">${escapeHtml(item.adresse)}</div>
      <div class="meta">${telHref}</div>
      ${statusSelectHtml(item.id, "status-select")}
    </div>
  `;
}

function buildKanban() {
  const kanban = document.getElementById("kanban");
  kanban.innerHTML = "";
  const filtered = applyPipelineFilters(DATA);
  const byStatus = {};
  STATUS_OPTIONS.forEach(s => byStatus[s.value] = []);
  filtered.forEach(item => {
    const st = getEntry(item.id);
    (byStatus[st.status] || byStatus["offen"]).push(item);
  });

  STATUS_OPTIONS.forEach(s => {
    const col = document.createElement("div");
    col.className = "kanban-col";
    col.dataset.status = s.value;
    const items = byStatus[s.value];
    col.innerHTML = `
      <div class="kanban-col-head" style="background:${s.color}">
        <span>${s.label}</span><span>${items.length}</span>
      </div>
      <div class="kanban-col-body"></div>
    `;
    const body = col.querySelector(".kanban-col-body");
    items.forEach(item => body.insertAdjacentHTML("beforeend", kcardHtml(item)));
    kanban.appendChild(col);
  });

  // wire status-selects inside cards
  kanban.querySelectorAll(".kcard .status-select").forEach(sel => {
    sel.addEventListener("change", (e) => {
      const card = e.target.closest(".kcard");
      setStatus(card.dataset.id, sel.value);
      buildKanban();
      buildMarkers();
    });
  });

  // drag & drop between columns
  kanban.querySelectorAll(".kcard").forEach(card => {
    card.addEventListener("dragstart", () => card.classList.add("dragging"));
    card.addEventListener("dragend", () => card.classList.remove("dragging"));
  });
  kanban.querySelectorAll(".kanban-col-body").forEach(body => {
    body.addEventListener("dragover", (e) => {
      e.preventDefault();
      body.classList.add("dragover");
    });
    body.addEventListener("dragleave", () => body.classList.remove("dragover"));
    body.addEventListener("drop", (e) => {
      e.preventDefault();
      body.classList.remove("dragover");
      const dragging = kanban.querySelector(".kcard.dragging");
      if (!dragging) return;
      const newStatus = body.closest(".kanban-col").dataset.status;
      setStatus(dragging.dataset.id, newStatus);
      buildKanban();
      buildMarkers();
    });
  });

  document.getElementById("p-stats").textContent = `${filtered.length} / ${DATA.length} Leads`;
}

["p-gebiet", "p-kategorie"].forEach(id => document.getElementById(id).addEventListener("change", buildKanban));
document.getElementById("p-search").addEventListener("input", buildKanban);

// ---------- Export ----------
function currentExportData() {
  return DATA.map(item => {
    const st = getEntry(item.id);
    const statusLabel = (STATUS_BY_VALUE[st.status] || STATUS_BY_VALUE.offen).label;
    return { ...item, status: st.status, status_label: statusLabel, notiz_lokal: st.notiz };
  });
}

document.getElementById("btn-export-json").addEventListener("click", () => {
  const blob = new Blob([JSON.stringify(currentExportData(), null, 2)], { type: "application/json" });
  triggerDownload(blob, "leads_export.json");
});

document.getElementById("btn-export-csv").addEventListener("click", () => {
  const rows = currentExportData();
  const cols = ["name","rechtsform","ab","kategorie","b2c_b2b","gf","adresse","gebiet","telefon","website","email","oeffnungszeiten","beschreibung","roi","fb_page","fb_ads_link","marketing","status_label","notiz_lokal"];
  const csvEscape = v => `"${String(v ?? "").replace(/"/g, '""')}"`;
  const lines = [cols.join(",")];
  rows.forEach(r => lines.push(cols.map(c => csvEscape(r[c])).join(",")));
  const blob = new Blob(["﻿" + lines.join("\r\n")], { type: "text/csv;charset=utf-8" });
  triggerDownload(blob, "leads_export.csv");
});

function triggerDownload(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

beitrag), 10-20% Nettogewinnmarge", "marge_kontext": "Allgemeine Handwerk-Faustregel: gesunder Deckungsbeitrag 30-50% für Handwerk/Handel, gesunde Nettogewinnmarge 10-20%; Dachdecker-Stundensätze in DE/AT im oberen Handwerksbereich (ca. 40-65€/Std. netto Basis), keine dachdecker-spezifische Marge-Studie für AT gefunden.", "gewinn": "6.000–25.000€", "gewinn_hinweis": "berechnet aus Auftragswert 20.000–50.000€ × Marge 30–50% (grobe Schätzung, erste genannte Preisspanne)", "konfidenz": "mittel", "vorbilder": [{"Kategorie": "Dachdecker/Spengler", "Firma": "Klaus vom Dach (Klaus Marquardt / Marquardt GmbH, Deutschland)", "Warum": "Dachdecker-Persönlichkeitsmarke mit dokumentiertem Case Study (Agentur digitallotsen) – seit Beginn der Zusammenarbeit 2021 Instagram-Wachstum von +342%, mehrere Tausend erreichte Konten monatlich über Instagram/LinkedIn/Facebook, aktiver Blog und Lead-Funnel. Sehr konkret belegtes Beispiel für Content-/Social-Media-getriebenes Wachstum im Dachdeckerhandwerk.", "Quelle": "https://digitallotsen.com/referenzen/klaus-vom-dach/ ; https://klausvomdach.de/", "Website": "https://klausvomdach.de/"}, {"Kategorie": "Dachdecker/Spengler", "Firma": "Proaktiv Dach / Herischko Dach GmbH (Bad Schwanberg, Steiermark)", "Warum": "Steirischer Dachdecker-/Spenglerbetrieb (gegründet 2021), der seit 1.1.2023 eine koordinierte Social-Media-Präsenz auf Facebook, Instagram und TikTok fährt und dabei laut WKO Steiermark und meinbezirk.at innerhalb von neun Monaten über 17 Millionen Videoaufrufe erzielte, seither rund vier Bewerbungen pro Woche erhält und sechs neue Mitarbeiter einstellen konnte.", "Quelle": "https://www.wko.at/stmk/news/raus-aus-der-personalnot-mit-social-media ; https://www.meinbezirk.at/deutschlandsberg/c-wirtschaft/proaktiv-dach-aus-bad-schwanberg-geht-viral_a5940262 ; https://www.instagram.com/proaktivdach/", "Website": "https://www.proaktiv-dach.at/"}, {"Kategorie": "Dachdecker/Spengler", "Firma": "Johann Huber Ges.m.b.H. / Huberdach (Obersulz, Bezirk Gänserndorf)", "Warum": "Seit 1950 bestehender Dachdecker- und Spenglerbetrieb in dritter Generation mit Sitz in Obersulz, der laut eigener Positionierung exakt die Zielregion abdeckt ('Ihr Dachdecker & Spengler in Gänserndorf, Mistelbach und Wien'). 9 Google-Rezensionen mit 4,4/5 Sternen. Hinweis: eine gefundene Instagram-Seite mit ähnlichem Namen gehört nachweislich zu einem anderen, deutschen Betrieb – eigene Social-Media-Reichweite war nicht bestätigbar. Daher ein ehrliches, geografisch exakt passendes (Marchfeld/Weinviertel), aber marketing-technisch nur mäßig belegtes Beispiel.", "Quelle": "https://www.huberdach.at/ ; https://www.herold.at/gelbe-seiten/sulz-im-weinviertel/fkR2d/huber-johann-gesmbh/", "Website": "https://www.huberdach.at/"}]}, {"kategorie": "Kaminbau/Rauchfangkehrer", "auftragswert": "500–1.500€ (einfache Kaminsanierung); 1.500–5.000€ (umfassende Kaminsanierung/Edelstahlsystem); 40–150€ pro Rauchfangkehrer-Termin", "auftragswert_kontext": "Kaminsanierung in Österreich je nach Zustand/Höhe/Methode 500-5.000€ (Edelstahlsysteme ca. 110-150€/lfm inkl. Material); laufende Rauchfangkehrer-Dienstleistungen (Kehrung, Abnahme neuer Öfen) deutlich kleinere Auftragswerte von 40-250€ je Termin, keine klassischen Neukundenprojekte im PV/Fenster-Sinn.", "marge": "25-35%", "marge_kontext": "Keine kategorie-spezifische Quelle gefunden; grobe Schätzung basierend auf allgemeinen Bau-/Handwerksgewerbe-Margen (Rohertrag), da Rauchfangkehrer zudem gesetzlich reglementierte Kehrgebühren (kein freier Preis) haben, was die Vergleichbarkeit mit anderen Gewerken einschränkt.", "gewinn": "125–525€", "gewinn_hinweis": "berechnet aus Auftragswert 500–1.500€ × Marge 25–35% (grobe Schätzung, erste genannte Preisspanne)", "konfidenz": "niedrig", "vorbilder": [{"Kategorie": "Kaminbau/Rauchfangkehrer", "Firma": "Schiedel GmbH (Nussbach, Oberösterreich)", "Warum": "Österreichischer Marktführer für Kamin-, Schornstein- und Lüftungssysteme mit über 60% Marktanteil und mehr al der Kaminbau/-sanierungsbetrieb wie ASOS die realistischste regionale Alternative.", "Quelle": "https://asoskaminsanierung.at/ ; https://www.baucheck.io/asos-baugmbh ; https://www.instagram.com/asoskaminsanierung/", "Website": "https://asoskaminsanierung.at/"}, {"Kategorie": "Kaminbau/Rauchfangkehrer", "Firma": "Rauchfang Quester (Wien/Niederösterreich)", "Warum": "Seit 1992 als Partner von Schiedel (Marktführer für Kamin-/Abgassysteme) auf Kaminsanierung und -bau in Wien und Niederösterreich spezialisiert – geografisch genau im Zielgebiet des Kunden. Ehrlicher Hinweis: kein dokumentierter Ads-Case oder belastbare Social-Media-/Bewertungszahlen gefunden; die Branche ist durch die Kehrbezirk-Regelung generell schwach digital sichtbar. Als real existierendes, regional passendes Unternehmen dennoch aufgenommen, aber mit deutlich schwächerer Beleglage als ASOS.", "Quelle": "https://rauchfang-quester.at/", "Website": "https://rauchfang-quester.at/"}]}, {"kategorie": "Fassade/Maler", "auftragswert": "5.000–30.000€", "auftragswert_kontext": "Reine Malerarbeiten/Fassadenanstrich am unteren Ende (~4.000–10.000€ für EFH), komplette Fassadendämmung/Vollwärmeschutz für ein Einfamilienhaus (~150m² Fassadenfläche, 80–150€/m²) am oberen Ende (15.000–30.000€).", "marge": "20–30%", "marge_kontext": "Deckungsbeitrag im österreichischen Baugewerbe liegt laut Branchenquellen im Schnitt bei ca. 20–35% der Angebotssumme (Mittelwert ~25%); kategoriespezifische AT-Daten für Maler/Fassade nicht separat gefunden, daher allgemeiner Bau-Richtwert verwendet.", "gewinn": "1.000–9.000€", "gewinn_hinweis": "berechnet aus Auftragswert 5.000–30.000€ × Marge 20–30% (grobe Schätzung, erste genannte Preisspanne)", "konfidenz": "mittel", "vorbilder": [{"Kategorie": "Fassade/Maler", "Firma": "malerwerkstatt hinze GmbH", "Warum": "Traditioneller Malerbetrieb (60 Jahre, Wunstorf bei Hannover) mit dokumentiertem Google-Ads-Case-Study auf handwerk.com: gezielte Kampagnen zu Fassadengestaltung, Innenputz & Bo rtighaus-Marktführer, der seine Position über Jahrzehnte durch permanente Radio-/Werbekampagnen ('Endlich zuhause') und einen umfassenden Marken-Relaunch ausgebaut hat – historisch bis zu 99% Markenbekanntheit in Österreich.", "Quelle": "https://www.horizont.at/home/news/detail/elk-umfassender-marken-relaunch-abgeschlossen.html", "Website": "https://www.elk.at/"}, {"Kategorie": "Fertighaus/Holzbau", "Firma": "HARTL HAUS Holzindustrie GmbH", "Warum": "Ältestes Fertighausunternehmen Österreichs, das aktuell mit einer von einer Top-Werbeagentur (Demner, Merlicek & Bergmann) produzierten, breit ausgespielten Kampagne ('Dein Meisterwerk aus Meisterhand') seine Marktführerschaft untermauert.", "Quelle": "https://www.horizont.at/agenturen/news/dein-meisterwerk-aus-meisterhand-das-ist-die-neue-kampagne-von-hartl-haus-101732", "Website": "https://www.hartlhaus.at/"}]}, {"kategorie": "Abbruch/Erdbau", "auftragswert": "6.000–25.000€", "auftragswert_kontext": "Gebäudeabbruch kostet ca. 50–150€/m² Wohnfläche (Richtpreise Österreich/Deutschland), bei größerem Aufwand/Schadstoffen auch 150–300€/m² und mehr; Baggerarbeiten/Erdaushub werden meist nach Stundensatz (80–120€/h) verrechnet. Kunde ist häufig eine Baufirma oder Bauträger als Subauftraggeber, nicht direkt der Endkunde.", "marge": "15–25%", "marge_kontext": "Keine kategorie-spezifische Quelle; Erdbau/Abbruch gilt wegen hoher Maschinen-, Transport- und Entsorgungskosten als margenschwächer als reine Handwerksleistungen, daher unterer Bereich der allgemeinen Bau-Deckungsbeitragsspanne (20–35%) angesetzt.", "gewinn": "900–6.250€", "gewinn_hinweis": "berechnet aus Auftragswert 6.000–25.000€ × Marge 15–25% (grobe Schätzung, erste genannte Preisspanne)", "konfidenz": "niedrig", "vorbilder": [{"Kategorie": "Abbruch/Erdbau", "Firma": "Mayer Abbruch, Transport & Recycling GmbH (Wien)", "Warum": "Ehrlicher Hinweis: In dieser sehr B2B-lastigen Branche gibt es kaum dokumentierte Ads-Erfolgsgeschichten. Mayer ist eines der wenigen Wiener Abbruchunternehmen (ca. 140 Mitarbeiter) mit professioneller Website und aktivem Instagram-Auftritt (@mayer_und_co) – also sichtbar überdurchschnittlich investiertes Marketing für die Branche, aber kein belegter 'Ads-Case-Study'-Erfolg.", "Quelle": "https://www.instagram.com/mayer_und_co/", "Website": "https://www.mayer-abbruch.at/"}, {"Kategorie": "Abbruch/Erdbau", "Firma": "Prajo's Abbruch & Bau (Wien)", "Warum": "Wiener Abbruchunternehmen mit über 25 Jahren Erfahrung und laut eigener Darstellung mehr als 4.500 abgerissenen/entkernten Objekten, das für die B2B-lastige Branche ungewöhnlich aktiv auf Instagram (@prajos_, rund 3.500 Follower) mit Baustellenvideos und Projekteinblicken auftritt. Kein harter Ads-Case, aber zweites, unabhängig von Mayer Abbruch verifizierbares Beispiel für sichtbares Marketing-Investment in einer sonst kaum digital sichtbaren Branche in Wien.", "Quelle": "https://www.instagram.com/prajos_/ ; https://www.prajos-bau.at/ueber-uns/", "Website": "https://www.prajos-bau.at/"}]}, {"kategorie": "Gerüstbau", "auftragswert": "900–3.500€", "auftragswert_kontext": "Für ein Fassadengerüst an einem Einfamilienhaus (ca. 150m²) inkl. Lieferung, Montage, Demontage über 1–2 Wochen sind in Österreich grob 900–3.000€ realistisch (5–20€/m²/Woche je nach Gerüsttyp). Kunde ist meist eine Baufirma, Maler- oder Fassadenbetrieb, seltener der Privatkunde direkt.", "marge": "30–45%", "marge_kontext": "Keine direkte Quelle gefunden; da Gerüstmaterial mehrfach wiederverwendet wird (geringe variable Materialkosten pro Einsatz, hoher Lohn-/Logistikanteil), wird ein höherer Deckungsbeitrag als im klassischen Baugewerbe angenommen — als grobe, unsichere Schätzung zu verstehen.", "gewinn": "270–1.575€", "gewinn_hinweis": "berechnet aus Auftragswert 900–3.500€ × Marge 30–45% (grobe Schätzung, erste genannte Preisspanne)", "konfidenz": "niedrig", "vorbilder": [{"Kategorie": "Gerüstbau", "Firma": "XERVON Austria GmbH", "Warum": "Einer der österreichweit führenden Gerüstbaubetriebe (60+ Jahre am Markt, Teil des internationalen REMONDIS-Konzerns) mit eigener Konzern-Marketingabteilung und aktivem LinkedIn-Auftritt – gutes B2B-Beispiel, da klassische Endkunden-Werbung in dieser Branche kaum vorkommt.", "Quelle": "https://www.xervon.at/unternehmen/ueber-uns/", "Website": "https://www.xervon.at/"}, {"Kategorie": "Gerüstbau", "Firma": "", "Warum": "Trotz intensiver Recherche (Google-Ads-Fallstudien, Instagram/Facebook-Präsenz diverser österreichischer Gerüstbaubetriebe wie ALFA Gerüstbau, Au Gerüstbau, LinkedIn-Employer-Branding-Kampagnen) kein zweites überzeugendes Beispiel gefunden: Die geprüften Betriebe zeigten entweder keine aktive Social-Media-Präsenz (z.B. ALFA Gerüstbau GmbH, Markgrafneusiedl) oder waren nicht österreichisch, sondern deutsche Firmen mit nur geringer Reichweite (unter 400 Instagram-Follower).", "Quelle": "", "Website": ""}]}, {"kategorie": "Schlosserei/Metallbau", "auftragswert": "1.500–8.000€", "auftragswert_kontext": "Geländer/Zäune kosten je nach Material 60–300€ pro Laufmeter (Stahl 60–120€, Edelstahl 120–300€, Aluminium ca. 250€); ein typisches Privatprojekt (Balkon-/Treppengeländer, kleines Tor, 5–15 lfm) liegt in dieser Spanne, größere Stahlkonstruktionen/Vordächer können mehr kosten.", "marge": "35–50%", "marge_kontext": "Wie bei der Tischlerei handelt es sich um lohnintensive Maßanfertigung mit vergleichsweise geringem Materialkostenanteil; kategorie-spezifische Margendaten wurden nicht gefunden, daher analog zu anderen handwerklichen Fertigungsbetrieben geschätzt.", "gewinn": "525–4.000€", "gewinn_hinweis": "berechnet aus Auftragswert 1.500–8.000€ × Marge 35–50% (grobe Schätzung, erste genannte Preisspanne)", "konfidenz": "niedrig", "vorbilder": [{"Kategorie": "Schlosserei/Metallbau", "Firma": "Zaunteam (Zaunteam Franchise AG, aktiv auch in Österreich)", "Warum": "DACH-weites Franchise-System für Zaun-/Torbau (Metallbau-Teilbranche) mit rund 130 Standorten in der Schweiz, Deutschland und Österreich, das jedem Partner ein systematisches, zentral finanziertes Werbekonzept (Werbefonds, lokale Kampagnen) mitgibt – bester verfügbarer Beleg, dass strukturiertes Marketing einen Metallbau-Betrieb skalieren lässt (Ursprung Schweiz, kein rein österreichisches Unternehmen).", "Quelle": "https://www.zaunteam.at/de/zaunteam/zaunteam-franchising_feuerwehr/konzept", "Website": "https://www.zaunteam.at/"}, {"Kategorie": "Schlosserei/Metallbau", "Firma": "Schlosserei Kalb GmbH (Dornbirn, Vorarlberg)", "Warum": "Über 60 Jahre bestehender, echter Metall- und Stahlbaubetrieb (Stiegen, Geländer, Fassaden, Stahltragwerke für Hallen) mit rund 50 Mitarbeitern, der auf Instagram (@schlosserei.kalb) eine für die Branche ungewöhnlich professionell gepflegte Projekt-Präsenz zeigt.", "Quelle": "https://www.kalb.at/ ; https://www.instagram.com/schlosserei.kalb/", "Website": "https://www.kalb.at/"}, {"Kategorie": "Schlosserei/Metallbau", "Firma": "OC-Stahlbau und Schlosserei GmbH (Wien-Liesing)", "Warum": "Seit über 20 Jahren aktiver Schlosserei-/Stahlbaubetrieb, der sich explizit als 'Ihre Schlosserei für Wien und Niederösterreich' positioniert (Einbruchschutz, Sicherheitstüren, 24h-Sperrdienst). Kundenbewertungen auf herold.at/BezirksTipp.at loben Schnelligkeit und Präzision.", "Quelle": "https://www.oc-stahlbau.at/ ; https://www.oc-stahlbau.at/de/oc-stahlbau/%C3%BCber-uns/ ; https://bezirkstipp.at/firma/oc-stahlbau-u-schliesstechnig-gmbh-2/", "Website": "https://www.oc-stahlbau.at/"}, {"Kategorie": "Schlosserei/Metallbau", "Firma": "Schlosserei MaTe (Gerasdorf bei Wien)", "Warum": "Metallbau-/Schlossereibetrieb mit Sitz direkt in Gerasdorf bei Wien – einer der vom Kunden explizit genannten Marchfeld-Orte – und Leistungsgebiet u.a. Gänserndorf und Korneuburg. Website zweisprachig (DE/EN) professionell aufgesetzt. Ehrlicher Hinweis: keine öffentlich dokumentierten Bewertungszahlen, Social-Media-Reichweite oder Ads-Kennzahlen gefunden – geografisch aber der bislang treffendste Beleg dafür, dass es einen professionell auftretenden Metallbaubetrieb direkt im Zielgebiet des Kunden gibt.", "Quelle": "https://schlosserei-mate.at/en/", "Website": "https://schlosserei-mate.at/"}]}, {"kategorie": "Alarmanlagen/Sicherheitstechnik", "auftragswert": "1.500–5.000€", "auftragswert_kontext": "Eine Basis-Alarmanlage für ein Einfamilienhaus kostet 1.500–2.500€ inkl. Einbau, größere/professionelle Anlagen mit Kameraüberwachung 2.500–5.000€+; als Richtwert für ein Komplettpaket werden rund 3.600€ genannt.", "marge": "25–35%", "marge_kontext": "Laut WKO-Musterstundensatzkalkulation wird in der Elektrotechnik ein Materialaufschlag von ca. 30% kalkuliert; da im Gesamtprojekt auch der volle Lohnanteil (Installation) mit einfließt, wird die Gesamtmarge etwas höher als der reine Materialaufschlag geschätzt.", "gewinn": "375–1.750€", "gewinn_hinweis": "berechnet aus Auftragswert 1.500–5.000€ × Marge 25–35% (grobe Schätzung, erste genannte Preisspanne)", "konfidenz": "mittel", "vorbilder": [{"Kategorie": "Alarmanlagen/Sicherheitstechnik", "Firma": "Verisure / Securitas Direct (Schweiz)", "Warum": "Der europaweit bekannteste Name für private Alarmanlagen, dessen Wachstum fast ausschließlich auf aggressiver TV-, Online- und Haustürwerbung beruht – die Standardreferenz dafür, dass Werbung in der Sicherheitstechnik-Branche funktioniert (in Österreich selbst nicht aktiv, daher DACH-Beispiel Schweiz).", "Quelle": "https://www.securitas-direct.ch/de", "Website": "https://www.securitas-direct.ch/"}, {"Kategorie": "Alarmanlagen/Sicherheitstechnik", "Firma": "Alarm Lindner Sicherheitstechnik GmbH (Österreich)", "Warum": "Familienbetrieb seit 1963 mit österreichweiter Abdeckung bei Alarmanlagen, Video und Zutrittskontrolle – als konkretes österreichisches Beispiel enthalten, auch wenn kein spezifischer Ads-Case-Study-Beleg vorliegt.", "Quelle": "https://alarmlindner.at/", "Website": "https://alarmlindner.at/"}]}, {"kategorie": "Blitzschutztechnik", "auftragswert": "2.500–5.000€", "auftragswert_kontext": "Eine komplette Blitzschutzanlage für ein durchschnittliches Einfamilienhaus in Österreich kostet ca. 2.000–5.000€ (äußerer Blitzschutz 2.000–2.500€, Erdung 1.200–1.700€, innerer Überspannungsschutz 1.000–1.500€); nachträgliche Installation oft 3.000–4.500€.", "marge": "25–35%", "marge_kontext": "Keine kategorie-spezifische Margenquelle; als artverwandtes Elektro-/Installationsgewerk wird der gleiche Schätzbereich wie bei Alarmanlagen/Sicherheitstechnik verwendet (WKO Elektrotechnik-Materialaufschlag ca. 30% als Anhaltspunkt).", "gewinn": "625–1.750€", "gewinn_hinweis": "berechnet aus Auftragswert 2.500–5.000€ × Marge 25–35% (grobe Schätzung, erste genannte Preisspanne)", "konfidenz": "niedrig", "vorbilder": [{"Kategorie": "Blitzschutztechnik", "Firma": "AROOS Blitzschutz GmbH (Gmunden/Ohlsdorf, Oberösterreich)", "Warum": "Mit rund 30 Blitzschutz-Fachkräften und Projekten in ganz Österreich eines der größeren Unternehmen der Nische; aktiv gemanagtes Google-Bewertungsprofil (4,6★) und professioneller Webauftritt zeigen sichtbares Marketing-Investment in einer sonst kaum digital sichtbaren Branche – ehrlich gesagt kein spektakulärer Ads-Case, aber das überzeugendste verfügbare Beispiel.", "Quelle": "https://aroos-blitzschutz.at/", "Website": "https://aroos-blitzschutz.at/"}, {"Kategorie": "Blitzschutztechnik", "Firma": "EBI Erdung-Blitzschutz-Installationen GmbH (Hellmonsödt, Oberösterreich)", "Warum": "Seit 1994 (rund 30 Jahre) österreichweit tätiger Blitzschutz-Fachbetrieb mit professionellem Webauftritt inkl. eigener Referenzen-Seite. Wie bei AROOS kein spektakulärer Ads-Case dokumentiert, aber eines der am längsten etablierten und sichtbarsten Unternehmen einer sonst kaum digital beworbenen Nische, was für kontinuierliches Investment in Marke und Website spricht.", "Quelle": "https://www.ebi-blitzschutz.at/ ; https://www.ebi.at/en/blitzschutz-technik/referenzen", "Website": "https://www.ebi-blitzschutz.at/"}, {"Kategorie": "Blitzschutztechnik", "Firma": "Trisko Blitzschutzbau GmbH (Gerasdorf bei Wien / Wien-Donaustadt)", "Warum": "2017 gegründeter Blitzschutz- und Erdungsanlagenbetrieb mit Sitz direkt in Gerasdorf bei Wien (zusätzliche Adresse in Wien-Donaustadt), tätig in Wien, Niederösterreich und Burgenland; durchgehend 5,0/5 Sterne bei 100% Weiterempfehlung auf ProvenExpert.", "Quelle": "https://www.triskoblitzschutzbau.at/ ; https://www.provenexpert.com/de-de/trisko-blitzschutzbau-gmbh/", "Website": "https://www.triskoblitzschutzbau.at/"}, {"Kategorie": "Blitzschutztechnik", "Firma": "Karnthaler Blitzschutzbau GmbH (Wiener Neustadt, NÖ)", "Warum": "Seit 1993 aktiver Blitzschutzbetrieb im Raum Wiener Neustadt, tätig in Wien, Niederösterreich und Burgenland – ein langjährig etablierter regionaler Fachbetrieb. Keine belastbaren Social-Media- oder Ads-Kennzahlen öffentlich auffindbar, daher als zweites, schwächer belegtes Beispiel ergänzt.", "Quelle": "https://www.karnthaler-blitzschutzbau.at/", "Website": "https://www.karnthaler-blitzschutzbau.at/"}]}, {"kategorie": "Treppenbau", "auftragswert": "4.000–12.000€", "auftragswert_kontext": "Einfache gerade Holztreppen kosten 2.500–6.000€ zzgl. 1.500–2.000€ Montage; hochwertige Maßanfertigungen (z.B. Eiche, mit Geländer) liegen typischerweise bei 5.000–15.000€ inkl. Material und Einbau.", "marge": "35–50%", "marge_kontext": "Ähnlich wie Tischlerei/Schlosserei handelt es sich um lohnintensive handwerkliche Maßfertigung; keine treppenbau-spezifische Margenquelle gefunden, daher analog zu verwandten Fertigungsgewerken geschätzt.", "gewinn": "1.400–6.000€", "gewinn_hinweis": "berechnet aus Auftragswert 4.000–12.000€ × Marge 35–50% (grobe Schätzung, erste genannte Preisspanne)", "konfidenz": "niedrig", "vorbilder": [{"Kategorie": "Treppenbau", "Firma": "Treppenmeister (Partnergemeinschaft, aktiv in Österreich)", "Warum": "Europas umsatzstärkste Treppenbau-Marke: Ein Verbund selbstständiger Tischler/Treppenbauer, die durch eine gemeinsame, zentral organisierte Werbe- und P ": "https://www.rohrmax.at/"}, {"Kategorie": "Kanal-/Rohrsanierung", "Firma": "Der Kanal (DerKanal.at Kanalsanierungs GmbH, Wien-Liesing)", "Warum": "Familienbetrieb mit über 20 Jahren Erfahrung in Kanalreinigung/-sanierung für Wien, NÖ und Burgenland, der aktiv auf Facebook, Instagram, TikTok, LinkedIn und YouTube präsent ist, 4,8 Sterne bei 74 Google-Bewertungen vorweist und sogar in einem TV-Beitrag der österreichischen Sendung 'Hoagascht' auf ServusTV vorgestellt wurde – ein dokumentiertes, ungewöhnlich breites Multi-Kanal-Marketing-Beispiel in einer sonst wenig sichtbaren Branche.", "Quelle": "https://www.derkanal.at/en ; https://www.instagram.com/derkanal.at/ ; https://www.facebook.com/DerKanal.at/", "Website": "https://www.derkanal.at/"}]}, {"kategorie": "Betonbohren/Betonschneiden", "auftragswert": "500–3.000€ pro Einsatz", "auftragswert_kontext": "Einzelne Kernbohrungen kosten ca. 90–280€ (bei größeren Durchmessern/Stahlbeton 250–500€), Betonschneiden 35–250€/lfm; ein typischer Baustelleneinsatz mit mehreren Bohrungen/Schnitten liegt oft im Bereich 500–3.000€. Kunde ist praktisch immer eine Bau- oder Installationsfirma als Subauftraggeber, kaum je der Privatkunde direkt.", "marge": "35–50%", "marge_kontext": "Keine direkte Quelle; Spezialgeräte-Dienstleistung mit hohem Kapitaleinsatz aber geringem laufendem Materialverbrauch pro Auftrag, daher wird analog zu anderen Spezialgeräte-Dienstleistungen ein höherer Deckungsbeitrag geschätzt.", "gewinn": "175–1.500€", "gewinn_hinweis": "berechnet aus Auftragswert 500–3.000€ × Marge 35–50% (grobe Schätzung, erste genannte Preisspanne)", "konfidenz": "niedrig", "vorbilder": [{"Kategorie": "Betonbohren/Betonschneiden", "Firma": "Josef Seidl Betonbohr- und -sägedienst GmbH (Obertrum am See, Salzburg)", "Warum": "Positioniert sich explizit und sichtbar erfolgreich als 'Österreichs Nr. 1 im Betonbohren und -sägen' und belegt in der Google-Suche zum eigenen Kernbegriff Top-Plätze – starkes Beispiel für Branding-getriebene 69 Versicherungsexpert:innen – ein dokumentiertes Beispiel für tech- und marketinggetriebenes Wachstum im heimischen Maklermarkt.", "Quelle": "https://www.wefox.at/versicherungen/wachstumskurs-in-oesterreich ; https://www.asscompact.at/nachrichten/wefox-erreicht-in-oesterreich-500-mio-euro-praemienvolumen-im-partnerportal", "Website": "https://www.wefox.at/"}, {"Kategorie": "Versicherungsmakler", "Firma": "IRH Tschrepitsch Versicherungsmakler (Wien/Klagenfurt)", "Warum": "Dokumentierte SEO-Case-Study einer Wiener Agentur zeigt für diesen Versicherungsmakler eine Steigerung der organischen Google-Sichtbarkeit um über 2.500% (Februar–Juni 2025, über 2.100 organische Sitzungen), u.a. Aufstieg beim Keyword 'Versicherungsmakler Wien' von Position 66 auf Position 7 und 'Versicherungsmakler Klagenfurt' auf Platz 1 – ein konkretes, mit Zahlen belegtes Beispiel für digitalen Marketingerfolg in dieser Kategorie.", "Quelle": "https://seo-agenturwien.at/en/blog/case-study-how-we-increased-the-visibility-of-an-insurance-broker-by-over-2-500/", "Website": "https://www.tschrepitsch.at/"}]}, {"kategorie": "Finanzberater", "auftragswert": "500–2.000€ (Honorar pro Beratungsmandat bei Honorarberatung); alternativ 1-4% Abschlussprovision auf vermitteltes Anlagevolumen im Provisionsmodell", "auftragswert_kontext": "In Österreich dominiert bei Finanzberatung noch das Provisionsmodell (Vertrieb von Fonds, Versicherungen, Bausparverträgen), bei dem die Vergütung im Produkt versteckt ist und kaum öffentlich beziffert wird. Die noch junge Honorarberatung verlangt laut fynup.at im Schnitt rund 500€ pro Beratungsmandat (bzw. Stundensätze 70-130€); als Näherung für ein umfassenderes Mandat wird eine Spanne von 500-2.000€ angesetzt.", "marge": "60-80%", "marge_kontext": "Da 'Auftragswert' hier bereits das Honorar/die Provision selbst ist (personalintensive Beratungsdienstleistung mit sehr geringem Wareneinsatz), wird die Marge als Rohertragsanteil nach Abzug direkter Kosten grob geschätzt; keine
