fende Betreuung); 4.200–7.700€ (Jahreshonorar kleine GmbH)", "auftragswert_kontext": "Laut mehreren österreichischen Steuerberater-Preisübersichten (deine-steuerberater.at, meetadam.io, Heschik-Honorarübersicht Jänner 2025) liegen die geschätzten Jahreskosten für laufende Betreuung (Buchhaltung, Lohnverrechnung, Jahresabschluss, Steuererklärungen) bei einem Einzelunternehmen bei ca. 1.500-2.600€ netto, bei einer kleinen GmbH bei 4.200-7.700€ netto; Stundensätze reichen von 55-100€ (Buchhaltung) bis 225-360€ (Spezialberatung). Seit Aufhebung der verbindlichen Honorargrundsätze 2007 sind Honorare frei verhandelbar.", "marge": "35-50%", "marge_kontext": "Laut Branchenpublikation vwt.at (Kanzleientwicklung) sollte die Umsatzrendite bei kleineren Kanzleien (Umsatz bis 300.000€) bei 50-75% liegen, bei mittleren Kanzleien (300.000-1.000.000€ Umsatz) bei 35-50%; als konservativere Schätzung für ein typisches KMU-Mandat wird 35-50% angesetzt. Keine Quelle für Marge auf Einzelmandat-Ebene gefunden, Kanzlei-Gesamtrendite als Näherung verwendet.", "gewinn": "525–1.300€", "gewinn_hinweis": "berechnet aus Auftragswert 1.500–2.600€ (Jahreshonorar Einzelunternehmen) × Marge 35–50% (grobe Schätzung, erste genannte Preisspanne, bezogen auf ein Einzelunternehmer-Mandat pro Jahr)", "konfidenz": "niedrig", "vorbilder": [{"Kategorie": "Steuerberater", "Firma": "Huber & Huber Steuerberatungs und Wirtschaftsprüfungs GmbH (Salzburg)", "Warum": "Reale, im Firmenbuch eingetragene Salzburger Kanzlei, die als öffentlich genannte Referenzkundin des auf Steuerkanzlei-Marketing spezialisierten Anbieters Atikon einen kompletten Relaunch von Website und Online-Auftritt dokumentiert und dabei explizit einen modernen, professionellen Kanzleiauftritt als Ziel und Ergebnis nennt – ein reales Beispiel dafür, wie österreichische Steuerkanzleien gezielt in digitales Marketing investieren.", "Quelle": "https://hubersteuerberatung.at/ ; https://www.atikon.com/", "Website": "https://hubersteuerberatung.at/"}, {"Kategorie": "Steuerberater", "Firma": "Wöber Dirmhirn Steuerberatung und Wirtschaftsprüfung GmbH (Wien)", "Warum": "Wiener Steuer- und Wirtschaftsprüfungskanzlei, die laut eigenem, öffentlich zitiertem Kundenfeedback gezielt in eine neue Kanzlei-Website mit integrierten Online-Mandanten-Tools (u.a. laufend aktualisierte Steuernews) investiert hat, um Digitalisierungskompetenz und moderne Positionierung sichtbar zu machen – ein reales, verifizierbares Beispiel für digitales Kanzleimarketing abseits reiner Mundpropaganda.", "Quelle": "https://www.woeber.at/ ; https://www.atikon.com/", "Website": "https://www.woeber.at/"}]}, {"kategorie": "Anwälte", "auftragswert": "1.500–4.000€ (typisches außergerichtliches Mandat, netto, exkl. USt./Barauslagen)", "auftragswert_kontext": "Österreichische Rechtsanwälte verrechnen außergerichtlich meist nach Stundensatz (üblich 150-350€/Std. netto laut RAK Wien Kosten-ABC, Partner in Spezialgebieten bis 400-700€/Std.) oder Pauschale. Beispielwerte: unbestrittene Scheidung inkl. Beratungen und Antrag ca. 2.500-3.500€ netto, Vertragserrichtung 1,5-3% des Vertragswerts, Erstberatung ca. 150-180€ pauschal.", "marge": "25-40%", "marge_kontext": "Keine anwaltsspezifische Margen-/Rohertragsquelle gefunden; als Näherung allgemeine Kanzlei-Kostenstruktur (Personal, Miete, Haftpflichtversicherung, Kammerbeiträge) verwendet, wie sie bei anderen freien Berufen mit stundenbasiertem Geschäftsmodell üblich ist.", "gewinn": "375–1.600€", "gewinn_hinweis": "berechnet aus Auftragswert 1.500–4.000€ × Marge 25–40% (grobe Schätzung, erste genannte Preisspanne)", "konfidenz": "niedrig", "vorbilder": [{"Kategorie": "Anwälte", "Firma": "Pichler Rechtsanwalt GmbH (Wien/Dornbirn, Wirtschaftsrecht-Kanzlei)", "Warum": "Wirtschaftsrechtskanzlei, laut JUVE Magazine unter den besten Wirtschaftskanzleien Westösterreichs gelistet. Eine dokumentierte Case Study einer österreichischen Google-Ads-Agentur zeigt für diese Kanzlei eine Senkung der Online-Werbekosten um 51% bei gleichzeitiger Steigerung der Mandanten-Anfragen um 126% – ein konkretes, belegtes Beispiel für Performance-Marketing-Erfolg im regulierten österreichischen Anwaltsmarkt.", "Quelle": "https://adwordsagentur.at/google-adwords-fur-anwaelte-und-kanzleien/", "Website": "https://www.anwaltskanzlei-pichler.at/"}, {"Kategorie": "Anwälte", "Firma": "COBIN claims (Rechtsanwalt Dr. Peter Kolba, Wien) – Plattform für Sammelaktionen", "Warum": "COBIN claims, die von Rechtsanwalt Dr. Peter Kolba gegründete Wiener Plattform für Sammelaktionen bei Massenschäden, gewann für ihre Kampagne 'dieselklage.at' im VW-Abgasskandal rund 5.700 Teilnehmer:innen mit über 6.700 betroffenen Fahrzeugen – akquiriert über eine eigene Kampagnen-Website und aktive Social-Media-Kanäle, mit breiter Presseberichterstattung (OTS, mehrere Sammelklagen-Meldungen). Ein seltenes, gut dokumentiertes Beispiel für konsequent digitale Mandanten-/Teilnehmerakquise im österreichischen Rechtsmarkt (ergänzt den bereits vorhandenen Eintrag Pichler Rechtsanwalt GmbH).", "Quelle": "https://www.cobinclaims.at/home ; https://www.ots.at/presseaussendung/OTS_20180319_OTS0030/cobin-claims-start-der-sammelklagen-aktion-dieselklageat-im-vw-dieselskandal-erste-sammelklage-eingebracht ; https://www.facebook.com/cobinclaims/", "Website": "https://www.cobinclaims.at/"}]}, {"kategorie": "Notare", "auftragswert": "3.000–7.000€ (Honorar für Errichtung eines Immobilienkaufvertrags bei Kaufpreis 200.000–350.000€, zzgl. USt. und Barauslagen)", "auftragswert_kontext": "Die häufigste größere Notarleistung ist die Kaufvertragserrichtung bei Immobilientransaktionen; laut mehreren Ratgeberportalen (infina.at, kredit-fuchs.at) liegen reine Notarkosten bei ca. 1,5-2% des Kaufpreises (Beispiel 300.000€ → ca. 6.000€ inkl. USt.). Beglaubigungen/kleinere Urkunden sind im Notariatstarifgesetz (NTG, §18, §25) gestaffelt nach Bemessungsgrundlage geregelt und liegen meist im niedrigen zwei- bis dreistelligen Bereich; ein Testament kostet bei einem Vermögen von 100.000-300.000€ üblicherweise 350-900€ inkl. ÖZTR-Eintragung.", "marge": "30-45%", "marge_kontext": "Keine notarspezifische Margenquelle gefunden; Näherungswert analog zu anderen honorarbasierten freien Berufen mit überschaubarem Sachaufwand (Personal, Kanzleiraum, Haftpflicht) angesetzt.", "gewinn": "900–3.150€", "gewinn_hinweis": "berechnet aus Auftragswert 3.000–7.000€ × Marge 30–45% (grobe Schätzung, erste genannte Preisspanne)", "konfidenz": "niedrig", "vorbilder": [{"Kategorie": "Notare", "Firma": "NHP – Notare Huppmann, Poindl, Pfaffenberger & Partner (Wien)", "Warum": "Erste Kanzlei Österreichs, die 2019 eine digitale GmbH-Gründung per Videokonferenz durchgeführt hat (breite Presseberichterstattung u.a. derStandard und juve.de) und dies auf einer eigenen Service-Seite 'Digitales Notariat' aktiv als Differenzierungsmerkmal vermarktet. Angesichts des strengen notariellen Standesrechts eines der wenigen Beispiele für bewusst digital positionierte Innovationskommunikation statt reiner Mundpropaganda – ein Case ohne Ad-Spend-Zahlen, aber mit dokumentierter Marketingwirkung (Presse, Fachmedien).", "Quelle": "https://www.nhp.at/erste-digitale-gmbh-grundung-in-osterreich-mit-nhp-notare/ ; https://derstandard.at/story/2000110706170/erste-gmbh-gruendung-ueber-die-kamera ; https://juve.de/nachrichten/oesterreich/2019/10/premiere-schoenherr-und-huppmann-poindl-begleiten-erste-digitale-gmbh-gruendung", "Website": "https://www.nhp.at/"}, {"Kategorie": "Notare", "Firma": "", "Warum": "Notare unterliegen in Österreich einem strengen Standesrecht mit engen Werbebeschränkungen. Trotz intensiver Suche wurde – über den Einzelfall der ersten digitalen GmbH-Gründung (siehe anderer Eintrag NHP Notare) hinaus – kein zweites Notariat mit dokumentiertem, performance-marketing-getriebenem Erfolg (Google/Meta Ads, belegte Fallstudie mit Zahlen) gefunden. Die Branche akquiriert praktisch ausschließlich über Empfehlung, Amtsstellung und Vertrauen, nicht über bezahlte Werbung.", "Quelle": "", "Website": ""}]}, {"kategorie": "Wirtschaftsprüfer", "auftragswert": "5.000–20.000€ (Prüfungshonorar für gesetzliche Jahresabschlussprüfung einer mittelgroßen GmbH, netto)", "auftragswert_kontext": "Honorare werden in Österreich individuell nach Stundenaufwand und Risikoeinschätzung vereinbart (kein einheitlicher Gebührenrahmen wie bei Steuerberatern, Stundensätze ab ca. 95€ netto). Belastbare österreichspezifische Euro-Beispiele waren öffentlich kaum auffindbar, daher wird als Näherung eine branchenübliche Orientierungsgröße für mittelständische GmbH-Abschlussprüfungen herangezogen (mittlerer vierstelliger bis niedriger fünfstelliger Bereich) – ausdrücklich mit Vorbehalt, da Prüfungshonorare in Österreich oft als Verhandlungssache/Betriebsgeheimnis gehandhabt werden.", "marge": "20-30%", "marge_kontext": "Keine belastbare Quelle für wirtschaftsprüferspezifische Margen gefunden; grobe Schätzung auf Basis allgemeiner Rohertragsspannen bei stundenbasierten Prüfungs-/Beratungsdienstleistungen nach Abzug von Personal- und Haftungskosten.", "gewinn": "1.000–6.000€", "gewinn_hinweis": "berechnet aus Auftragswert 5.000–20.000€ × Marge 20–30% (grobe Schätzung, erste genannte Preisspanne)", "konfidenz": "niedrig", "vorbilder": [{"Kategorie": "Wirtschaftsprüfer", "Firma": "Grant Thornton Austria GmbH (Wien, 3 Standorte)", "Warum": "Startete laut Fachmedien (horizont.at, ots.at) Ende 2025 die neue Markenkampagne 'Beratung, die beruhigt' (Agentur: Kubrik) gezielt auf LinkedIn und Meta mit Fokus auf Awareness und Lead-Generierung für Tax, Audit und Advisory – inklusive eigener Landingpages und Always-on-Kommunikation. Eines der wenigen dokumentierten Beispiele einer österreichischen Wirtschaftsprüfungsgesellschaft mit aktiver bezahlter Performance-/Brand-Kampagne auf Social-Media-Kanälen.", "Quelle": "https://www.horizont.at/marketing/news/beratung-die-beruhigt-grant-thornton-setzt-auf-markenauftritt-von-kubrik-100126 ; https://www.ots.at/presseaussendung/OTS_20251201_OTS0023/beratung-die-beruhigt-grant-thornton-austria-startet-neue-markenkampagne", "Website": "https://www.grantthornton.at/"}, {"Kategorie": "Wirtschaftsprüfer", "Firma": "", "Warum": "Wirtschaftsprüfung in Österreich wird stark über Ausschreibungen, gesetzliche Rotationspflichten und Empfehlungsnetzwerke statt Publikumswerbung vergeben. Über den Einzelfall Grant Thornton Austria hinaus (siehe anderer Eintrag) wurde trotz gezielter Suche keine zweite österreichische Wirtschaftsprüfungsgesellschaft mit öffentlich dokumentierter Performance-Marketing-Kampagne (Google/Meta Ads) oder belegter Fallstudie mit konkreten Zahlen gefunden.", "Quelle": "", "Website": ""}]}, {"kategorie": "Unternehmensberater", "auftragswert": "5.200–15.600€ pro Beratungsprojekt (typisches KMU-Mandat, ca. 5-15 Beratertage à WKO-Richttagessatz)", "auftragswert_kontext": "Der Fachverband Unternehmensberatung und Informationstechnologie der WKO empfiehlt (unverbindlich) einen Kalkulations-Stundensatz von 130€/Std., entsprechend ca. 1.040€/Manntag. Ein typisches KMU-Beratungsprojekt (Strategie-, Organisations- oder Digitalisierungsprojekt) umfasst grob 5-15 Beratertage, woraus sich ca. 5.200-15.600€ pro Mandat ergeben – dies ist eine eigene grobe Herleitung, keine offizielle Projektgrößen-Statistik, da Projektumfänge stark variieren (Einzelcoaching bis Mehrmonatsprojekt).", "marge": "17-25%", "marge_kontext": "Laut BDU-Branchendaten (Bundesverband Deutscher Unternehmensberater, DACH-Raum) lag die durchschnittliche Umsatzrendite von Beratungsunternehmen bei 17-18%, Top-Beratungen erzielen bis 25-28%. Als Näherung für Österreich verwendet, da keine separate österreichische Branchenkennzahl gefunden wurde.", "gewinn": "884–3.900€", "gewinn_hinweis": "berechnet aus Auftragswert 5.200–15.600€ × Marge 17–25% (grobe Schätzung, erste genannte Preisspanne)", "konfidenz": "niedrig", "vorbilder": [{"Kategorie": "Unternehmensberater", "Firma": "Dirk Kreuter / Bestseller Verlag GmbH (Deutschland)", "Warum": "Europas bekanntester Vertriebs- und Unternehmensberater/Trainer, dessen Geschäftsmodell fast vollständig auf dokumentiertem Online-Funnel-Marketing beruht (Facebook-/Instagram-Ads, YouTube-Kanal 'Kreuter.TV', Podcast, Omnipräsenz-Strategie). Presseberichten zufolge erzielte sein Team bis Ende 2024 rund 100 Mio. Euro Auftragseingang; laut Wirtschaftsprüfer-Angaben wies der Bestseller Verlag einen geprüften Umsatz von rund 19 Mio. Euro aus.", "Quelle": "https://www.dirkkreuter.com/ ; https://www.unternehmerjournal.de/dirk-kreuter-wahrheit-sein-vermoegen-und-sein-umsatz-deutlich-kleiner/amp/ ; https://marketingunited.org/wiki/Dirk_Kreuter", "Website": "https://www.dirkkreuter.com/"}, {"Kategorie": "Unternehmensberater", "Firma": "next level consulting Österreich GmbH (Wien)", "Warum": "Auf Projekt-, Prozess- und Change-Management spezialisierte österreichische Unternehmensberatung mit internationalen Standorten (u.a. USA, Singapur, Kapstadt); pflegt eine aktive mehrsprachige LinkedIn-Unternehmensseite sowie einen eigenen YouTube-Kanal mit Fachcontent zur Positionierung als Experten – ein reales Beispiel für systematisches B2B-Content-Marketing statt klassischer Kaltakquise, allerdings ohne öffentlich belegte Performance-Marketing-Kennzahlen.", "Quelle": "https://www.nextlevelconsulting.com/ ; https://www.linkedin.com/company/next-level-consulting_2 ; https://www.youtube.com/user/nextlevelconsulting", "Website": "https://www.nextlevelconsulting.com/"}]}, {"kategorie": "Personalberater/Headhunter", "auftragswert": "10.000–25.000€ pro Vermittlung (Fachkräfte); 30.000–70.000€ (Führungskräfte/Executive Search)", "auftragswert_kontext": "Die Vermittlungsprovision liegt im DACH-Raum laut BDU-Studien im Schnitt bei rund 27,8% des Bruttojahreszielgehalts der besetzten Stelle (ca. zwei Drittel der Headhunter berechnen 20-30%). Bei qualifizierten Fachkräften liegen die Honorare meist zwischen 10.000-25.000€, bei Führungskräften zwischen 30.000-70.000€ pro erfolgreicher Vermittlung; Mindesthonorare im Executive Search liegen oft bei 40.000€+. Die Auftragswert-Range ist hier bereits das volle Vermittlungshonorar (nicht eine zusätzliche Bemessungsgrundlage).", "marge": "60-75%", "marge_kontext": "Da das Vermittlungshonorar bereits die volle Provision ist, wird 'Marge' hier als Rohertrags-/Gewinnanteil nach Abzug direkter Kosten (Sourcing-Aufwand, Active-Sourcing-Tools, anteilige Beraterzeit) verstanden. Für personalintensive Beratungsdienstleistungen mit geringem Wareneinsatz ist ein Rohertragsanteil von 60-75% des Honorars eine branchenübliche Schätzung (kein spezifischer österreichischer Quellenbeleg gefunden).", "gewinn": "6.000–18.750€", "gewinn_hinweis": "berechnet aus Auftragswert 10.000–25.000€ (Vermittlungshonorar Fachkräfte) × Marge 60–75% (geschätzter Rohertragsanteil) (grobe Schätzung, erste genannte Preisspanne)", "konfidenz": "niedrig", "vorbilder": [{"Kategorie": "Personalberater/Headhunter", "Firma": "TRESCON Personalberatung (Wien/Linz/Salzburg/St. Pölten, seit über 40 Jahren am Markt)", "Warum": "Reales, langjähriges österreichisches Personalberatungsunternehmen, das laut eigener Website 'Social Media- und Google-Kampagnen' als festen, systematischen Bestandteil seiner Recruiting-Methodik einsetzt. Hinweis zur Belastbarkeit: es wurden keine öffentlich dokumentierten konkreten Kennzahlen (Werbebudget, Leads, Erfolgsquote) gefunden – die Firma ist daher ein Beleg für reale, aktive Ads-Nutzung im Personalberatungssektor, aber kein voller Case-Study-Beleg mit harten Zahlen.", "Quelle": "https://www.trescon.at/methoden/personalsuche/social-media-google-kampagnen-im-recruiting", "Website": "https://www.trescon.at/"}, {"Kategorie": "Personalberater/Headhunter", "Firma": "epunkt GmbH (Linz, Wien, Graz, Salzburg, München)", "Warum": "Marktführer der österreichischen Recruiting-Branche seit 2015 in Folge, mit rund 10% Marktanteil nach Umsatz, ca. 1.650 Besetzungen pro Jahr und rund 200 Mitarbeitern an fünf Standorten (Stand: 25-Jahre-Jubiläum). epunkt ist zudem branchenweit für aufwändiges, unverwechselbares Employer-Branding/Kandidaten-Marketing über LinkedIn, Instagram, Facebook und TikTok bekannt – deutlich besser belegt als das zuvor gefundene TRESCON.", "Quelle": "https://www.epunkt.com/r/blog/marktfuehrer-recruiting-oesterreich/ ; https://www.epunkt.com/r/blog/epunkt-25-jahre-recruiting-oesterreich/", "Website": "https://www.epunkt.com/"}]}, {"kategorie": "IT-Systemhäuser/EDV-Dienstleister", "auftragswert": "8.000–25.000€ pro mittlerem Infrastruktur-/Migrationsprojekt (grobe Schätzung); 80–115€/Std. (Stundensatz Standard-/Spezialistendienstleistung)", "auftragswert_kontext": "Laut Synaxon IT Service Price Index 2025 (DACH-Umfrage, 750 Teilnehmer D/A) liegt der durchschnittliche Stundensatz für Standard-IT-Dienstleistungen bei rund 100€ netto, für komplexe Netzwerk-/Spezialistenleistungen bei 111€, für 3rd-Level-Support bei 115€. Für ein mittleres Infrastruktur- oder Cloud-Migrationsprojekt bei einem KMU ergäbe sich bei geschätzten 100-250 Beratungsstunden ein Projektwert von ca. 8.000-25.000€ – diese Projektgrößen-Range ist eine eigene grobe Herleitung, keine direkte Studienangabe.", "marge": "25-35%", "marge_kontext": "Laut Branchenpresse (it-business.de, channelobserver.de) liegt die Handelsspanne bei Managed Services bei 50-60%, mit Gewinnspannen von 25% bis über 30%; reines Hardware-Reselling erzielt dagegen nur einstellige Margen (5-10%). Für Dienstleistungs-/Projektgeschäft (nicht reiner Hardwareverkauf) wurde die höhere Managed-Services-Marge als Näherung verwendet.", "gewinn": "2.000–8.750€", "gewinn_hinweis": "berechnet aus Auftragswert 8.000–25.000€ (Projektwert) × Marge 25–35% (Managed-Services-Marge als Näherung) (grobe Schätzung, erste genannte Preisspanne)", "konfidenz": "niedrig", "vorbilder": [{"Kategorie": "IT-Systemhäuser/EDV-Dienstleister", "Firma": "world4you Internet Services GmbH (Wien/Linz)", "Warum": "Österreichs größter Webhosting-Anbieter (rund 100.000 Kunden, ca. 250.000 gehostete Websites) betreibt laut eigenen Unternehmensangaben eine dedizierte Marketing- & Communications-Abteilung, die aktiv Google Ads, Google Analytics, Facebook, Instagram und LinkedIn zur Kundenakquise einsetzt – inklusive eines eigenen Kunden-Tools 'marketingRadar' für Website-Optimierung. Ein reales, verifizierbares Beispiel für professionell aufgesetztes Performance-Marketing im heimischen IT-/Hosting-Bereich.", "Quelle": "https://www.world4you.com/unternehmen/marketing-und-communications ; https://www.world4you.com/de/unternehmen.html", "Website": "https://www.world4you.com/"}, {"Kategorie": "IT-Systemhäuser/EDV-Dienstleister", "Firma": "Kapsch BusinessCom AG / K-Businesscom AG (Wien, CEE-weit)", "Warum": "Führendes ICT-Systemhaus in Österreich und CEE (rund 1.300 Mitarbeiter:innen, über 300 Mio. Euro Umsatz) mit aktiv redaktionell gepflegter LinkedIn-Unternehmensseite (rund 7.800 Follower), auf der laufend Themen wie Cybersecurity-Partnerschaften (z.B. mit Palo Alto Networks) und Kooperationen (u.a. mit CANCOM) kommuniziert werden – ein Beispiel für konsequente B2B-Content- und Social-Media-Präsenz eines klassischen österreichischen IT-Systemhauses.", "Quelle": "https://www.linkedin.com/company/kapsch-businesscom-ag/ ; https://www.kapsch.net/en/kbc/about-us", "Website": "https://www.kapsch.net/de/kbc"}]}, {"kategorie": "Immobilienmakler", "auftragswert": "3.500–15.000€ pro Vermittlung (Verkaufsprovision, netto ohne USt, bei Kaufpreisen ca. 150.000–500.000€)", "auftragswert_kontext": "Laut Immobilienmaklerverordnung/gängiger Praxis gilt bei Kaufpreisen über 48.448,51€ eine max. Provision von 3% des Kaufpreises je Vertragspartei (+20% USt); bei Kaufpreisen bis 36.336,42€ sogar 4%. Bei einem typischen österreichischen Immobilienkaufpreis von 150.000-500.000€ ergibt das ca. 3.500-15.000€ Provision netto pro vermittelter Partei. Bei Vermietung gilt seit 1.7.2023 das Bestellerprinzip (Vermieter zahlt, max. 2 Bruttomietzinse bei unbefristet/lang befristet, max. 1 bei ≤3 Jahren Befristung); der VfGH bestätigte im Februar 2025 die Verfassungsmäßigkeit.", "marge": "20-35%", "marge_kontext": "Keine öffentliche Quelle zur Nettomarge österreichischer Maklerbüros gefunden (Betriebsergebnis nach Personal-/Bürokosten); Schätzung basiert auf allgemeiner Dienstleistungsbranchen-Logik für personalintensive Geschäftsmodelle mit geringem Wareneinsatz. Als Näherungswert verwendet, keine branchenspezifische Zahl verifizierbar.", "gewinn": "700–5.250€", "gewinn_hinweis": "berechnet aus Auftragswert 3.500–15.000€ × Marge 20–35% (grobe Schätzung, erste genannte Preisspanne)", "konfidenz": "mittel", "vorbilder": [{"Kategorie": "Immobilienmakler", "Firma": "Stefan Weidner Immobilien (Kelkheim, Deutschland)", "Warum": "Dokumentierte Case Study der Agentur Schneider Marketing: Durch Personal-Branding-Kampagnen auf Social Media (Meta) erzielte der Makler in unter 6 Monaten 11,1 Mio.€ an vermittelten Aufträgen und über 550.000€ Provisionseinnahmen.", "Quelle": "https://referenzen.schneider-marketing.com/case-study-11-mio ; https://www.youtube.com/watch?v=eiTVKGErS9c", "Website": "https://stefan-weidner-immobilien.de/"}, {"Kategorie": "Immobilienmakler", "Firma": "RE/MAX Immopartner Tirol (Schwaz & Telfs)", "Warum": "Für dieses österreichische RE/MAX-Partnerbüro dokumentiert die Agentur POINTED. eine Full-Service-Online-Marketing-Betreuung inklusive Facebook- und LinkedIn-Remarketing sowie monatlichem KPI-Tracking (Reichweite, Impressionen, Cost-per-Click, Cost-per-Lead); Geschäftsführerin Andrea Ebner bestätigt namentlich die durch Online-Marketing gewonnene Reichweite. Damit endlich ein echtes, benanntes und mit einer Agentur-Case-Study belegtes österreichisches Beispiel, nachdem zuvor nur ein deutsches Beispiel (Stefan Weidner) gefunden wurde – wenngleich harte Lead-/Umsatzzahlen auf der Case-Study-Seite nicht offengelegt werden.", "Quelle": "https://www.pointed.at/referenzen-und-insights/full-service-online-marketing-fuer-rem function branchInfoHtml(kategorie) {
  const b = BRANCHEN_BY_KATEGORIE[kategorie];
  if (!b) return "";
  const vb = (b.vorbilder && b.vorbilder[0]) || null;
  const vbHtml = vb
    ? `<div class="roi-vorbild">🏆 <b>Vorbild erwähnen:</b> ${escapeHtml(vb.Firma)} — ${escapeHtml(vb.Warum)}</div>`
    : "";
  return `
    <div class="row roi">
      <div class="roi-stats">
        <span><b>Auftragswert</b> ${escapeHtml(b.auftragswert || "–")}</span>
        <span><b>Marge</b> ${escapeHtml(b.marge || "–")}</span>
        <span class="roi-gewinn"><b>Gewinn/Auftrag</b> ${escapeHtml(b.gewinn || "–")}</span>
      </div>
      ${vbHtml}
    </div>
  `;
}

function confClassB(k) {
  const v = (k || "").toLowerCase();
  if (v.includes("hoch")) return "bconf-hoch";
  if (v.includes("mittel")) return "bconf-mittel";
  return "bconf-niedrig";
}

function bVorbildHtml(v) {
  const site = v.Website ? `<a href="${escapeHtml(v.Website)}" target="_blank" rel="noopener">${escapeHtml(v.Website.replace(/^https?:\/\//, "").replace(/\/$/, ""))}</a>` : "";
  return `<div class="bvb"><b>${escapeHtml(v.Firma)}</b>${site ? " · " + site : ""}<div class="bvb-why">${escapeHtml(v.Warum)}</div></div>`;
}

function bCardHtml(item) {
  const vbs = item.vorbilder && item.vorbilder.length
    ? item.vorbilder.map(bVorbildHtml).join("")
    : `<div class="bno-vb">Kein belegtes Beispiel gefunden.</div>`;
  return `
    <div class="bcard">
      <div class="bcard-head">
        <span class="bcard-name">${escapeHtml(item.kategorie)}</span>
        <span class="bcard-conf ${confClassB(item.konfidenz)}">${escapeHtml(item.konfidenz || "?")}</span>
      </div>
      <div class="bstat-row">
        <div class="bstat">
          <div class="bstat-label">Auftragswert</div>
          <div class="bstat-value">${escapeHtml(item.auftragswert || "–")}</div>
          <div class="bstat-ctx">${escapeHtml(item.auftragswert_kontext || "")}</div>
        </div>
        <div class="bstat">
          <div class="bstat-label">Marge</div>
          <div class="bstat-value">${escapeHtml(item.marge || "–")}</div>
          <div class="bstat-ctx">${escapeHtml(item.marge_kontext || "")}</div>
        </div>
        <div class="bstat gewinn">
          <div class="bstat-label">Gewinn/Auftrag</div>
          <div class="bstat-value">${escapeHtml(item.gewinn || "–")}</div>
          <div class="bstat-ctx">${escapeHtml(item.gewinn_hinweis || "")}</div>
        </div>
      </div>
      <div class="bvorbilder">
        <div class="bvorbilder-label">Vorbilder in der Branche</div>
        ${vbs}
      </div>
    </div>
  `;
}

function buildBranchen(filter) {
  const q = (filter !== undefined ? filter : document.getElementById("b-search").value).trim().toLowerCase();
  const filtered = BRANCHEN_DATA.filter(d => !q || d.kategorie.toLowerCase().includes(q));
  document.getElementById("branchen-grid").innerHTML = filtered.map(bCardHtml).join("");
  document.getElementById("branchen-count").textContent = `${filtered.length} / ${BRANCHEN_DATA.length}`;
}
document.getElementById("b-search").addEventListener("input", () => buildBranchen());

const AGE_BANDS = [[0, 9], [10, 19], [20, 29], [30, 39], [40, 49], [50, 59], [60, 69], [70, 79], [80, 100]];
function ageRangeFraction(bundesland, minAge, maxAge) {
  const dist = AGE_DIST_BY_BUNDESLAND[bundesland];
  if (!dist) return 0.55; // Rückfallwert, falls ein Ort keinem der 3 recherchierten Bundesländer zugeordnet ist
  let count = 0;
  AGE_BANDS.forEach(([lo, hi]) => {
    const bandKey = hi === 100 ? "80+" : (lo + "-" + hi);
    const bandPop = dist.bands[bandKey] || 0;
    const bandWidth = hi - lo + 1;
    const overlapWidth = Math.max(0, Math.min(hi, maxAge) - Math.max(lo, minAge) + 1);
    count += bandPop * (overlapWidth / bandWidth);
  });
  return dist.gesamt > 0 ? count / dist.gesamt : 0.55;
}

};
function platzhirscheRegionForGebiet(gebiet) {
  const stripped = (gebiet || "").replace(/\s*\([^)]*\)\s*$/, "").trim().toLowerCase();
  return PLATZHIRSCHE_GEBIET_ALIAS[stripped] || "Marchfeld (allgemein)";
}
function platzhirscheFor(kategorie, gebiet) {
  const region = platzhirscheRegionForGebiet(gebiet);
  return PLATZHIRSCHE_DATA
    .filter(p => p.Kategorie === kategorie && p.Region === region)
    .slice()
    .sort((a, b) => b.user_rating_count - a.user_rating_count)
    .slice(0, 3);
}

function haversineKm(lat1, lng1, lat2, lng2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat / 2) ** 2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLng / 2) ** 2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}
function placeEffectiveRadiusKm(place) {
  if (place.flaeche_km2) return Math.sqrt(place.flaeche_km2 / Math.PI);
  return place.typ === "bezirk" ? 4 : 3;
}
// Fläche zweier sich überschneidender Kreise (Radius R = Auswahl-Umkreis, r = Ort,
// d = Distanz der Mittelpunkte) — Linsenformel. Damit wird jeder Ort als Fläche mit
// gleichmäßiger Bevölkerungsdichte modelliert statt (falsch) linear nach Distanz
// hochgerechnet — sonst zählt ein 1-km-Umkreis mitten in einem 100-km²-Bezirk
// fälschlich einen zweistelligen Prozentsatz von dessen GESAMTER Einwohnerzahl.
function circleIntersectionArea(R, r, d) {
  if (d >= R + r) return 0;
  if (d <= Math.abs(R - r)) return Math.PI * Math.min(R, r) ** 2;
  const R2 = R * R, r2 = r * r, d2 = d * d;
  const alpha = Math.acos(Math.max(-1, Math.min(1, (d2 + R2 - r2) / (2 * d * R)))) * 2;
  const beta = Math.acos(Math.max(-1, Math.min(1, (d2 + r2 - R2) / (2 * d * r)))) * 2;
  return 0.5 * r2 * (beta - Math.sin(beta)) + 0.5 * R2 * (alpha - Math.sin(alpha));
}
function computeReachPersons(centerLat, centerLng, radiusKm, minAge, maxAge) {
  let total = 0;
  REACH_PLACES.forEach(p => {
    const d = haversineKm(centerLat, centerLng, p.lat, p.lng);
    const r = placeEffectiveRadiusKm(p);
    const placeArea = Math.PI * r * r;
    const density = placeArea > 0 ? p.einwohner / placeArea : 0;
    const overlapArea = circleIntersectionArea(radiusKm, r, d);
    const ageFrac = ageRangeFraction(p.bundesland, minAge, maxAge);
    total += density * overlapArea * ageFrac;
  });
  return total * REACH_KALIBRIERUNG_FAKTOR;
}

function competitorsInRadius(item, radiusKm) {
  return DATA.filter(d => d.kategorie === item.kategorie && d.id !== item.id && d.lat && d.lng)
    .map(d => Object.assign({}, d, { _dist: haversineKm(item.lat, item.lng, d.lat, d.lng) }))
    .filter(d => d._dist <= radiusKm)
    .sort((a, b) => a._dist - b._dist);
}

let competitorMarkers = [];
function updateCompetitorMarkers(competitors) {
  competitorMarkers.forEach(m => dossierMap && dossierMap.removeLayer(m));
  competitorMarkers = [];
  if (!dossierMap) return;
  competitors.forEach(c => {
    if (!c.lat || !c.lng) return;
    const marker = L.circleMarker([c.lat, c.lng], {
      radius: 9, color: "#fff", weight: 2, fillColor: "#f97316", fillOpacity: 1,
    }).addTo(dossierMap);
    const ratingLine = c.google_bewertungen != null
      ? `<div style="font-size:11.5px;color:#6b7280;margin:2px 0 6px;">⭐ ${(c.google_rating || 0).toFixed(1).replace(".", ",")} · ${c.google_bewertungen} Bewertungen</div>`
      : "";
    marker.bindPopup(`
      <div class="d-competitor-popup">
        <b>${escapeHtml(c.name)}</b>
        ${ratingLine}
        <button class="d-mini-btn danger d-competitor-hide-btn" type="button" data-crm-only>✕ nicht passend, ausblenden</button>
      </div>
    `);
    marker.on("popupopen", (e) => {
      const el = e.popup.getElement();
      const btn = el && el.querySelector(".d-competitor-hide-btn");
      if (btn) {
        btn.addEventListener("click", () => {
          if (dossierHiddenCompetitors.indexOf(c.id) === -1) dossierHiddenCompetitors.push(c.id);
          currentDossierData.hidden_competitor_ids = dossierHiddenCompetitors;
          fbWriteDossier(currentDossierItem.id, currentDossierData);
          renderRegionBody(currentDossierItem);
        });
      }
    });
    competitorMarkers.push(marker);

}

const NEAR_REGION_HINTS = ["Wien", "Niederösterreich", " NÖ", "Burgenland", "Gerasdorf", "Marchfeld"];
function vorbildRegionScore(v) {
  const text = (v.Firma || "") + " " + (v.Warum || "");
  const isNear = NEAR_REGION_HINTS.some(r => text.indexOf(r) !== -1);
  const isFar = FAR_REGION_HINTS.some(r => text.indexOf(r) !== -1);
  if (isNear) return 0;
  if (!isFar) return 1;
  return 2;
}

function getNum(id) { return parseFloat(document.getElementById(id).value) || 0; }
function setNum(id, val, decimals) {
  const el = document.getElementById(id);
  const factor = decimals ? 10 : 1;
  el.value = Math.round(val * factor) / factor;
}
function updateRoiNebenrechnung(anfragenProMonat) {
  document.getElementById("roi2-neben-monat").textContent = Math.round(anfragenProMonat).toLocaleString("de-AT");
  document.getElementById("roi2-neben-tag").textContent = (anfragenProMonat / 30).toFixed(1).replace(".", ",");
}
function roiForward() {
  const budget = getNum("roi2-budget"), cpl = getNum("roi2-cpl"), quote = getNum("roi2-quote"), auftragswert = getNum("roi2-auftragswert");
  const anfragen = cpl > 0 ? (budget * 30) / cpl : 0;
  const neukunden = anfragen * (quote / 100);
  const umsatz = neukunden * auftragswert;
  setNum("roi2-neukunden", neukunden, true);
  setNum("roi2-umsatz", umsatz, false);
  updateRoiNebenrechnung(anfragen);
}
function roiReverseFromNeukunden() {
  const budget = getNum("roi2-budget"), quote = getNum("roi2-quote"), auftragswert = getNum("roi2-auftragswert"), neukunden = getNum("roi2-neukunden");
  const benoetigteAnfragen = quote > 0 ? neukunden / (quote / 100) : 0;
  const cpl = benoetigteAnfragen > 0 ? (budget * 30) / benoetigteAnfragen : 0;
  setNum("roi2-cpl", cpl, false);
  setNum("roi2-umsatz", neukunden * auftragswert, false);
  updateRoiNebenrechnung(benoetigteAnfragen);
}
function roiReverseFromUmsatz() {
  const auftragswert = getNum("roi2-auftragswert"), umsatz = getNum("roi2-umsatz");
  const neukunden = auftragswert > 0 ? umsatz / auftragswert : 0;
  setNum("roi2-neukunden", neukunden, true);
  roiReverseFromNeukunden();
}
const ROI_STEP = { "roi2-budget": [5, 5, 2000], "roi2-cpl": [5, 1, 500], "roi2-quote": [5, 1, 100], "roi2-auftragswert": [100, 50, 200000], "roi2-neukunden": [1, 0, 500], "roi2-umsatz": [500, 0, 5000000] };
function wireRoiCalc() {
  ["roi2-budget", "roi2-cpl", "roi2-quote", "roi2-auftragswert"].forEach(id => {
    document.getElementById(id).addEventListener("input", roiForward);
  });
  document.getElementById("roi2-neukunden").addEventListener("input", roiReverseFromNeukunden);
  document.getElementById("roi2-umsatz").addEventListener("input", roiReverseFromUmsatz);
  Object.keys(ROI_STEP).forEach(id => {
    const [step, min, max] = ROI_STEP[id];
    const handler = id === "roi2-neukunden" ? roiReverseFromNeukunden : (id === "roi2-umsatz" ? roiReverseFromUmsatz : roiForward);
    const minus = document.querySelector(`[data-step-minus="${id}"]`);
    const plus = document.querySelector(`[data-step-plus="${id}"]`);
    if (minus) minus.addEventListener("click", () => { setNum(id, Math.max(min, getNum(id) - step), false); handler(); });
    if (plus) plus.addEventListener("click", () => { setNum(id, Math.min(max, getNum(id) + step), false); handler(); });
  });
  roiForward();
}

function radiusToZoom(km) {
  if (km <= 2) return 13;
  if (km <= 5) return 12;
  if (km <= 10) return 11;
  if (km <= 20) return 10;
  if (km <= 35) return 9;
  return 8;
}
function wireDossierMap(item) {
  if (dossierMap) { dossierMap.remove(); dossierMap = null; }
  if (!item.lat || !item.lng) return;
  dossierMap = L.map("d-map", {
    zoomControl: false, attributionControl: false, dragging: true, scrollWheelZoom: true,
    touchZoom: true, doubleClickZoom: true, boxZoom: false, keyboard: false, tap: true,
  }).setView([item.lat, item.lng], radiusToZoom(dossierRadiusKm));
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", { maxZoom: 18 }).addTo(dossierMap);
  dossierMapMarker = L.marker([item.lat, item.lng]).addTo(dossierMap);
  dossierMapMarker.bindTooltip(`<b>${escapeHtml(item.name)}</b>`, {
    permanent: true, direction: "bottom", offset: [0, 12], className: "d-map-pin-label",
  }).openTooltip();
  dossierMapCircle = L.circle([item.lat, item.lng], {
    radius: dossierRadiusKm * 1000, color: "#2563eb", weight: 2, fillColor: "#2563eb", fillOpacity: 0.12,
  }).addTo(dossierMap);
  fitDossierMap();

  const slider = document.getElementById("d-radius-slider");
  const num = document.getElementById("d-radius-num");
  slider.addEventListener("input", () => {
    num.value = slider.value;
    setDossierRadius(item, parseFloat(slider.value), false);
  });
  slider.addEventListener("change", () => fitDossierMap());
  num.addEventListener("change", () => {
    let v = Math.max(1, Math.min(50, parseFloat(num.value) || 1));
    num.value = v;
    slider.value = v;
    setDossierRadius(item, v, true);
    fitDossierMap();
  });
  const recenterBtn = document.getElementById("d-map-recenter");
  if (recenterBtn) recenterBtn.addEventListener("click", () => fitDossierMap());
}
function fitDossierMap() {
  if (!dossierMap || !dossierMapCircle) return;
  dossierMap.setView(dossierMapCircle.getLatLng(), radiusToZoom(dossierRadiusKm));
}
function setDossierRadius(item, km, animate) {
  const fromKm = dossierRadiusKm;
  dossierRadiusKm = km;
  if (radiusAnimHandle) cancelAnimationFrame(radiusAnimHandle);
  if (!animate) {
    if (dossierMapCircle) dossierMapCircle.setRadius(km * 1000);
    updateReachUI(item, false);
    renderRegionBody(item);
    return;
  }
  const start = performance.now(), duration = 280;
  function step(now) {
    const t = Math.min(1, (now - start) / duration);
    const eased = 1 - Math.pow(1 - t, 3);
    const cur = fromKm + (km - fromKm) * eased;
    if (dossierMapCircle) dossierMapCircle.setRadius(cur * 1000);
    updateReachUI(item, true, cur);
    if (t < 1) radiusAnimHandle = requestAnimationFrame(step);
    else { updateReachUI(item, false); renderRegionBody(item); }
  }
  radiusAnimHandle = requestAnimationFrame(step);
}
function updateReachUI(item, mid, radiusOverride) {
  const radius = radiusOverride != null ? radiusOverride : dossierRadiusKm;
  const [minAge, maxAge] = categoryAgeRange(item.kategorie);
  const persons = item.lat && item.lng ? computeReachPersons(item.lat, item.lng, radius, minAge, maxAge) : 0;
  const el = document.getElementById("d-reach-value");
  if (el) el.textContent = Math.round(persons).toLocaleString("de-AT");
  const haushalte = document.getElementById("d-tile-haushalte");
  if (haushalte) haushalte.textContent = "ca. " + Math.round(persons / 2.1).toLocaleString("de-AT");
  const umkreis = document.getElementById("d-tile-umkreis");
  if (umkreis) umkreis.textContent = Math.round(radius) + " km";
}

const HOME_COORDS = [48.2435290, 16.4872532]; // Karl-Bednarik-Gasse 36, 1220 Wien
let routeState = { start: "Karl-Bednarik-Gasse 36, 1220 Wien", stopIds: [] };

const routeMap = L.map("route-map", { zoomControl: true }).setView(HOME_COORDS, 12);

function routeStopHtml(item, index, total) {

      </div>

function renderRoute() {
  const listEl = document.getElementById("route-list");
  const stops = routeState.stopIds.map(id => DATA_BY_ID[id]).filter(Boolean);

  const homeHtml = `<div class="route-home"><span class="rs-num">🏠</span><div class="rs-info"><div class="rs-name">Start</div><div class="rs-addr">${escapeHtml(routeState.start || "")}</div></div></div>`;
  listEl.innerHTML = homeHtml + (stops.length
    ? stops.map((item, index) => routeStopHtml(item, index, stops.length)).join("")
    : `<div id="route-empty">Noch keine Stationen. Firma oben suchen und mit + hinzufügen.</div>`);

  // drag & drop reorder
  listEl.querySelectorAll(".route-stop").forEach(el => {
    el.addEventListener("dragstart", () => el.classList.add("dragging"));
    el.addEventListener("dragend", () => el.classList.remove("dragging"));
    el.addEventListener("dragover", e => e.preventDefault());
    el.addEventListener("drop", e => {
      e.preventDefault();
      const draggingEl = listEl.querySelector(".route-stop.dragging");
      if (!draggingEl || draggingEl === el) return;
      const draggingId = draggingEl.dataset.id;
      const targetId = el.dataset.id;
      const ids = routeState.stopIds.filter(id => id !== draggingId);
      const targetIdx = ids.indexOf(targetId);
      ids.splice(targetIdx, 0, draggingId);
      routeState.stopIds = ids;
      saveRoute();
    });
  });
  listEl.querySelectorAll(".rs-remove").forEach(btn => {
    btn.addEventListener("click", () => {
      routeState.stopIds = routeState.stopIds.filter(id => id !== btn.dataset.remove);
      saveRoute();
    });
  });
  listEl.querySelectorAll(".rs-up").forEach(btn => {
    btn.addEventListener("click", () => {
      const id = btn.dataset.up;
      const idx = routeState.stopIds.indexOf(id);
      if (idx > 0) {
        [routeState.stopIds[idx - 1], routeState.stopIds[idx]] = [routeState.stopIds[idx], routeState.stopIds[idx - 1]];
        saveRoute();
      }
    });
  });
  listEl.querySelectorAll(".rs-down").forEach(btn => {
    btn.addEventListener("click", () => {
      const id = btn.dataset.down;
      const idx = routeState.stopIds.indexOf(id);
      if (idx !== -1 && idx < routeState.stopIds.length - 1) {
        [routeState.stopIds[idx], routeState.stopIds[idx + 1]] = [routeState.stopIds[idx + 1], routeState.stopIds[idx]];
        saveRoute();
      }
    });
  });

  // map: home marker + numbered stop markers + connecting line
  routeLayer.clearLayers();
  const homeIcon = L.divIcon({
    html: `<div style="background:#2563eb;color:#fff;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:14px;box-shadow:0 1px 4px rgba(0,0,0,.4);">🏠</div>`,
    className: "", iconSize: [26, 26], iconAnchor: [13, 13],
  });
  L.marker(HOME_COORDS, { icon: homeIcon }).addTo(routeLayer).bindTooltip("Start: " + (routeState.start || ""));
  const latlngs = [HOME_COORDS];
  stops.forEach((item, i) => {
    const icon = L.divIcon({
      html: `<div style="background:#ef7a44;color:#0f1c28;border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;box-shadow:0 1px 4px rgba(0,0,0,.4);">${i + 1}</div>`,
      className: "", iconSize: [24, 24], iconAnchor: [12, 12],
    });
    if (item.lat && item.lng) {
      L.marker([item.lat, item.lng], { icon }).addTo(routeLayer).bindTooltip(`${i + 1}. ${item.name}`);
      latlngs.push([item.lat, item.lng]);
    }
  });
  if (latlngs.length > 1) {
    L.polyline(latlngs, { color: "#ef7a44", weight: 3, dashArray: "6 6" }).addTo(routeLayer);
    routeMap.fitBounds(L.latLngBounds(latlngs), { padding: [30, 30] });
  }
}

});
document.getElementById("btn-route-maps").addEventListener("click", () => {
  const stops = routeState.stopIds.map(id => DATA_BY_ID[id]).filter(Boolean);
  if (!stops.length) { alert("Route ist leer — erst Stationen hinzufügen."); return; }
  const points = [routeState.start, ...stops.map(s => s.adresse)].map(encodeURIComponent);
  const url = "https://www.google.com/maps/dir/" + points.join("/");
  window.open(url, "_blank");
});

buildMarkers();
</script>
