<!DOCTYPE html>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Kaltakquise Leads – Wien 22 &amp; Marchfeld</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  body { display: flex; flex-direction: column; height: 100vh; overflow: hidden; background: #fff; color: #111; }
  @media (prefers-color-scheme: dark) { body { background: #15181c; color: #e8e8e8; } }

  #topbar {
    display: flex; flex-wrap: wrap; gap: 6px; align-items: center;
    padding: 8px 10px; background: #1f2937; color: #fff; z-index: 1000;
    box-shadow: 0 2px 6px rgba(0,0,0,.25);
  }
  #topbar h1 { font-size: 14px; margin: 0 10px 0 0; font-weight: 700; white-space: nowrap; }
  #topbar select, #topbar input[type=text] {
    font-size: 13px; padding: 5px 6px; border-radius: 6px; border: 1px solid #4b5563;
    background: #111827; color: #fff; max-width: 150px;
  }
  #topbar button {
    font-size: 13px; padding: 6px 10px; border-radius: 6px; border: none;
    background: #2563eb; color: #fff; cursor: pointer; white-space: nowrap;
  }
  #topbar button:hover { background: #1d4ed8; }
  #topbar button.secondary { background: #374151; }
  #topbar button.secondary:hover { background: #4b5563; }
  #topbar button.tab-btn { background: #374151; }
  #topbar button.tab-btn.active { background: #2563eb; }
  #stats { font-size: 12px; color: #cbd5e1; margin-left: auto; white-space: nowrap; }

  #view-map { flex: 1; display: flex; min-height: 0; }
  #view-map.hidden { display: none; }
  #map { flex: 1; width: 100%; }

  #view-pipeline { flex: 1; display: none; min-height: 0; overflow: hidden; flex-direction: column; background: #f3f4f6; }
  #view-pipeline.active { display: flex; }
  @media (prefers-color-scheme: dark) { #view-pipeline { background: #0f1115; } }
  #pipeline-toolbar { display: flex; gap: 6px; padding: 8px; flex-wrap: wrap; align-items: center; background: #e5e7eb; }
  @media (prefers-color-scheme: dark) { #pipeline-toolbar { background: #1a1d23; } }
  #pipeline-toolbar select, #pipeline-toolbar input[type=text] {
    font-size: 13px; padding: 5px 6px; border-radius: 6px; border: 1px solid #9ca3af;
  }
  #kanban { flex: 1; overflow-x: auto; overflow-y: hidden; display: flex; gap: 8px; padding: 8px; }
  .kanban-col {
    flex: 0 0 220px; display: flex; flex-direction: column; background: rgba(0,0,0,.04);
    border-radius: 8px; overflow: hidden;
  }
  @media (prefers-color-scheme: dark) { .kanban-col { background: rgba(255,255,255,.05); } }
  .kanban-col-head {
    padding: 8px; font-size: 12px; font-weight: 700; color: #fff; display: flex;
    justify-content: space-between; align-items: center;
  }
  .kanban-col-body { flex: 1; overflow-y: auto; padding: 6px; display: flex; flex-direction: column; gap: 6px; }
  .kanban-col-body.dragover { background: rgba(37,99,235,.15); }
  .kcard {
    background: #fff; border-radius: 6px; padding: 7px 8px; font-size: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.15);
    cursor: grab; border-left: 4px solid #999;
  }
  @media (prefers-color-scheme: dark) { .kcard { background: #262a33; color: #eee; } }
  .kcard.dragging { opacity: .4; }
  .kcard b { display: block; font-size: 12.5px; margin-bottom: 2px; }
  .kcard .meta { font-size: 10.5px; color: #6b7280; margin-bottom: 4px; }
  .kcard select.status-select { width: 100%; font-size: 11px; padding: 2px; margin-top: 4px; }
  .kcard a { color: #2563eb; }

  .legend {
    background: rgba(255,255,255,.95); padding: 8px 10px; border-radius: 8px;
    font-size: 11px; line-height: 1.5; box-shadow: 0 1px 4px rgba(0,0,0,.3); max-width: 200px;
    max-height: min(80vh, 600px); display: flex; flex-direction: column;
  }
  @media (prefers-color-scheme: dark) { .legend { background: rgba(30,33,38,.95); color: #eee; } }
  .legend .dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 5px; vertical-align: middle; }
  .legend .a-ring { display:inline-block; width:10px; height:10px; border-radius:50%; border:2px solid gold; vertical-align:middle; margin-right:5px; }
  .legend-cat-controls { display: flex; gap: 6px; margin: 4px 0 6px; flex: 0 0 auto; }
  .legend-cat-controls button {
    font-size: 10px; padding: 3px 8px; border-radius: 10px; border: none; background: #2563eb; color: #fff; cursor: pointer;
  }
  .legend-cat-controls button:hover { background: #1d4ed8; }
  .legend-cat-row { display: flex; align-items: center; gap: 4px; cursor: pointer; padding: 1px 0; }
  .legend-cat-row input { margin: 0; cursor: pointer; }
  .legend-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; cursor: pointer; font-weight: 700; flex: 0 0 auto; }
  .legend-arrow { transition: transform .15s; }
  .legend.collapsed .legend-arrow { transform: rotate(-90deg); }
  .legend-body { margin-top: 6px; display: flex; flex-direction: column; flex: 1 1 auto; min-height: 0; overflow: hidden; }
  .legend-cat-list { overflow-y: auto; flex: 1 1 auto; min-height: 40px; }
  .legend.collapsed .legend-body { display: none; }
  .legend.collapsed { padding-bottom: 8px; max-height: none; }

  .popup-box { font-size: 13px; width: 300px; max-width: 80vw; line-height: 1.45; }
  .leaflet-popup-content { margin: 12px 14px; }
  .leaflet-popup-content-wrapper { border-radius: 10px; }
  .popup-box h3 { margin: 0 0 4px; font-size: 14px; }
  .popup-box .badge { display: inline-block; font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 10px; margin-right: 4px; }
  .badge.A { background: gold; color: #333; }
  .badge.B { background: #ddd; color: #333; }
  .popup-box .row { margin: 3px 0; }
  .popup-box a { color: #2563eb; }
  .popup-box .edit-website-btn {
    background: none; border: none; cursor: pointer; font-size: 12px; padding: 0 3px; vertical-align: middle;
  }
  .popup-box .website-edit-box { display: inline-flex; gap: 4px; margin-top: 4px; width: 100%; }
  .popup-box .website-edit-input {
    flex: 1; font-size: 12px; padding: 4px 6px; border-radius: 4px; border: 1px solid #ccc; min-width: 0;
  }
  .popup-box .website-save-btn {
    font-size: 11px; padding: 4px 8px; border-radius: 4px; border: none; background: #2563eb; color: #fff; cursor: pointer; white-space: nowrap;
  }
  .popup-box textarea {
    width: 100%; font-size: 12px; padding: 4px; border-radius: 4px; border: 1px solid #ccc;
    resize: vertical; min-height: 40px; font-family: inherit;
  }
  .popup-box select.status-select-popup { width: 100%; font-size: 12px; padding: 4px; margin-top: 6px; border-radius: 4px; }
  .popup-box button.save-note { margin-top: 4px; font-size: 11px; padding: 3px 8px; border-radius: 4px; border: none; background: #2563eb; color: #fff; cursor: pointer; }
  .popup-box .marketing { font-size: 11px; color: #555; }
  .popup-box .marketing a { word-break: break-all; }
  .popup-box .roi { font-size: 11px; background: #ecfdf5; border-left: 3px solid #10b981; padding: 5px 7px; border-radius: 3px; }
  @media (prefers-color-scheme: dark) { .popup-box .roi { background: #052e21; } }
  .popup-box .roi-stats { display: flex; flex-direction: column; gap: 2px; }
  .popup-box .roi-stats span { display: block; }
  .popup-box .roi-gewinn { color: #b8560f; }
  @media (prefers-color-scheme: dark) { .popup-box .roi-gewinn { color: #ef7a44; } }
  .popup-box .roi-vorbild { margin-top: 5px; padding-top: 5px; border-top: 1px dashed rgba(0,0,0,.15); }
  @media (prefers-color-scheme: dark) { .popup-box .roi-vorbild { border-top-color: rgba(255,255,255,.15); } }
  .route-toggle-btn {
    width: 100%; font-size: 12px; padding: 7px; border-radius: 6px; border: none; cursor: pointer;
    background: #2563eb; color: #fff; font-weight: 600;
  }
  .route-toggle-btn.in-route { background: #ef7a44; color: #0f1c28; }
  .route-num-badge {
    background: #ef7a44; color: #0f1c28; border-radius: 50%; width: 22px; height: 22px;
    display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 11px;
    box-shadow: 0 1px 4px rgba(0,0,0,.5); border: 2px solid #fff;
  }
  .status-icon-badge {
    width: 17px; height: 17px; border-radius: 50%; color: #fff; font-weight: 900; font-size: 11px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 1px 3px rgba(0,0,0,.6); border: 1.5px solid #fff;
  }
  .muster-crown-badge, .traumkunde-badge {
    width: 16px; height: 16px; font-size: 15px; line-height: 1;
    display: flex; align-items: center; justify-content: center;
    filter: drop-shadow(0 1px 2px rgba(0,0,0,.7));
  }
  .route-badge-tooltip { background: transparent; border: none; box-shadow: none; padding: 0; }
  .route-badge-tooltip::before { display: none; }

  /* --- Branchen-Referenz tab --- */
  #view-branchen { flex: 1; display: none; min-height: 0; overflow: hidden; flex-direction: column; background: #eef1f3; }
  #view-branchen.active { display: flex; }
  @media (prefers-color-scheme: dark) { #view-branchen { background: #0f1c28; } }
  #branchen-toolbar { display: flex; gap: 8px; padding: 8px; flex-wrap: wrap; align-items: center; background: #e5e7eb; }
  @media (prefers-color-scheme: dark) { #branchen-toolbar { background: #16273a; } }
  #branchen-toolbar input[type=text] { font-size: 14px; padding: 8px 12px; border-radius: 8px; border: 1px solid #9ca3af; flex: 1 1 220px; }
  #branchen-count { font-size: 11px; color: #6b7280; font-family: ui-monospace, "SF Mono", monospace; }
  #branchen-grid {
    flex: 1; overflow-y: auto; padding: 10px;
    display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 12px; align-content: start;
  }
  .bcard {
    background: #fff; border: 1px solid #d7dde3; border-radius: 10px; padding: 14px 16px 16px;
    display: flex; flex-direction: column; gap: 9px;
  }
  @media (prefers-color-scheme: dark) { .bcard { background: #16273a; border-color: rgba(223,231,238,.14); color: #e3ebf1; } }
  .bcard-head { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; }
  .bcard-name { font-size: 15px; font-weight: 700; }
  .bcard-conf {
    font-family: ui-monospace, "SF Mono", monospace; font-size: 9.5px; letter-spacing: .04em; text-transform: uppercase;
    padding: 2px 7px; border-radius: 20px; white-space: nowrap; border: 1px solid currentColor;
  }
  .bconf-hoch { color: #2f8f5b; } .bconf-mittel { color: #c98a1a; } .bconf-niedrig { color: #b0492e; }
  @media (prefers-color-scheme: dark) { .bconf-hoch { color: #4fbd85; } .bconf-mittel { color: #e0ac3f; } .bconf-niedrig { color: #e2775a; } }
  .bstat-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .bstat { flex: 1 1 90px; }
  .bstat-label { font-family: ui-monospace, "SF Mono", monospace; font-size: 9.5px; letter-spacing: .05em; text-transform: uppercase; color: #2f7d94; }
  @media (prefers-color-scheme: dark) { .bstat-label { color: #6bb9d1; } }
  .bstat-value { font-family: ui-monospace, "SF Mono", monospace; font-size: 14.5px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .bstat-ctx { font-size: 11px; color: #6b7280; margin-top: 1px; line-height: 1.35; }
  .bstat.gewinn .bstat-value { color: #b8560f; }
  @media (prefers-color-scheme: dark) { .bstat.gewinn .bstat-value { color: #ef7a44; } }
  .bvorbilder { border-top: 1px dashed #d7dde3; padding-top: 8px; display: flex; flex-direction: column; gap: 6px; }
  @media (prefers-color-scheme: dark) { .bvorbilder { border-color: rgba(223,231,238,.14); } }
  .bvorbilder-label { font-family: ui-monospace, "SF Mono", monospace; font-size: 9.5px; letter-spacing: .05em; text-transform: uppercase; color: #6b7280; }
  .bvb { font-size: 12.5px; line-height: 1.4; }
  .bvb b { font-weight: 700; }
  .bvb a { color: #2f7d94; }
  @media (prefers-color-scheme: dark) { .bvb a { color: #6bb9d1; } }
  .bvb-why { color: #6b7280; }
  .bno-vb { font-size: 11.5px; color: #6b7280; font-style: italic; }

  /* --- Lock screen --- */
  #lock-screen {
    position: fixed; inset: 0; z-index: 5000; display: flex; align-items: center; justify-content: center;
    background: #0f1c28; padding: 20px;
  }
  #lock-box {
    background: #16273a; border-radius: 14px; padding: 32px 28px; width: 100%; max-width: 320px;
    box-shadow: 0 10px 40px rgba(0,0,0,.4); text-align: center;
  }
  #lock-box h2 { color: #e3ebf1; margin: 0 0 18px; font-size: 20px; }
  #lock-box input {
    width: 100%; font-size: 16px; padding: 12px 14px; border-radius: 8px; border: 1.5px solid #2f3f52;
    background: #0f1c28; color: #e3ebf1; margin-bottom: 12px; box-sizing: border-box;
  }
  #lock-box button {
    width: 100%; font-size: 15px; padding: 12px; border-radius: 8px; border: none;
    background: #ef7a44; color: #0f1c28; font-weight: 700; cursor: pointer;
  }
  #lock-error { color: #e2775a; font-size: 13px; min-height: 18px; margin: 10px 0 0; }
  #app-root { display: none; flex-direction: column; height: 100%; flex: 1; min-height: 0; }

  /* --- Route tab --- */
  #view-route { flex: 1; display: none; min-height: 0; overflow: hidden; flex-direction: column; background: #eef1f3; }
  #view-route.active { display: flex; }
  @media (prefers-color-scheme: dark) { #view-route { background: #0f1c28; } }
  #route-toolbar { display: flex; gap: 6px; padding: 8px; flex-wrap: wrap; align-items: center; background: #e5e7eb; position: relative; }
  @media (prefers-color-scheme: dark) { #route-toolbar { background: #16273a; } }
  #route-toolbar input[type=text] {
    font-size: 13px; padding: 8px 10px; border-radius: 6px; border: 1px solid #9ca3af; flex: 1 1 180px;
  }
  #route-toolbar button {
    font-size: 13px; padding: 8px 12px; border-radius: 6px; border: none; background: #374151; color: #fff; cursor: pointer; white-space: nowrap;
  }
  #route-toolbar button.primary { background: #16a34a; }
  #route-search-results {
    position: absolute; top: 100%; left: 8px; right: 8px; z-index: 900; background: #fff; border-radius: 0 0 8px 8px;
    box-shadow: 0 6px 16px rgba(0,0,0,.25); max-height: 260px; overflow-y: auto; display: none;
  }
  @media (prefers-color-scheme: dark) { #route-search-results { background: #16273a; } }
  #route-search-results.show { display: block; }
  .rsr-item { padding: 8px 12px; font-size: 13px; display: flex; justify-content: space-between; gap: 8px; align-items: center; border-bottom: 1px solid rgba(0,0,0,.08); cursor: pointer; }
  @media (prefers-color-scheme: dark) { .rsr-item { border-bottom-color: rgba(255,255,255,.08); color: #e3ebf1; } }
  .rsr-item:hover { background: rgba(37,99,235,.08); }
  .rsr-item .rsr-add { flex-shrink: 0; background: #16a34a; color: #fff; border: none; border-radius: 6px; padding: 3px 9px; font-size: 12px; cursor: pointer; }
  #route-body { flex: 1; display: flex; min-height: 0; }
  #route-list { flex: 0 0 320px; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 6px; }
  #route-map { flex: 1; min-width: 0; }
  .route-stop {
    background: #fff; border-radius: 8px; padding: 8px 10px; font-size: 12.5px; display: flex; gap: 8px; align-items: center;
    box-shadow: 0 1px 3px rgba(0,0,0,.12); cursor: grab;
  }
  @media (prefers-color-scheme: dark) { .route-stop { background: #16273a; color: #e3ebf1; } }
  .route-stop.dragging { opacity: .4; }
  .route-stop .rs-num {
    flex-shrink: 0; width: 22px; height: 22px; border-radius: 50%; background: #ef7a44; color: #0f1c28;
    display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 11px;
  }
  .route-stop .rs-info { flex: 1; min-width: 0; }
  .route-stop .rs-name { font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .route-stop .rs-addr { color: #6b7280; font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .route-stop .rs-remove { flex-shrink: 0; background: none; border: none; color: #b0492e; font-size: 16px; cursor: pointer; padding: 2px 6px; }
  .route-stop .rs-move { flex-shrink: 0; display: flex; flex-direction: column; gap: 1px; }
  .route-stop .rs-move button {
    background: #e5e7eb; border: none; border-radius: 4px; width: 26px; height: 20px; font-size: 10px;
    cursor: pointer; color: #374151; padding: 0;
  }
  @media (prefers-color-scheme: dark) { .route-stop .rs-move button { background: #2f3f52; color: #cbd5e1; } }
  .route-stop .rs-move button:disabled { opacity: .25; cursor: default; }
  #route-empty { padding: 20px 12px; color: #6b7280; font-size: 13px; text-align: center; }
  .route-home {
    background: rgba(37,99,235,.08); border-radius: 8px; padding: 8px 10px; font-size: 12.5px; display: flex; gap: 8px; align-items: center;
  }
  .route-home .rs-num { flex-shrink: 0; width: 22px; height: 22px; border-radius: 50%; background: #2563eb; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 13px; }

  @media (max-width: 640px) {
    #topbar { padding: 6px 8px; }
    #topbar h1 { display: none; }
    #topbar select, #topbar input[type=text] { max-width: 44vw; }
    #stats { width: 100%; order: 99; margin-left: 0; }
    .kanban-col { flex-basis: 78vw; }
    #route-body { flex-direction: column; }
    #route-list { flex: 0 0 auto; max-height: 40vh; width: 100%; box-sizing: border-box; }
    #route-map { flex: 1; min-height: 220px; }
    #topbar button, #topbar select, #topbar input[type=text] { min-height: 38px; }
  }

  /* ================= Dossier + Präsentationsmodus ================= */
  .dossier-btn {
    width: 100%; margin-top: 6px; font-size: 13px; font-weight: 600; padding: 8px 10px;
    border-radius: 8px; border: none; background: #111111; color: #fff; cursor: pointer;
  }
  .dossier-btn:hover { background: #2f2f2f; }

  #dossier-overlay {
    display: none; position: fixed; inset: 0; z-index: 5000;
    background: #eef1f3; color: #142433;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    flex-direction: column;
  }
  #dossier-overlay.open { display: flex; }
  @media (prefers-color-scheme: dark) { #dossier-overlay { background: #10161d; color: #e7edf2; } }

  .dossier-topbar {
    flex: 0 0 auto; display: flex; align-items: center; gap: 10px; padding: 10px 14px;
    background: #ffffff; border-bottom: 1px solid rgba(20,36,51,.1);
  }
  @media (prefers-color-scheme: dark) { .dossier-topbar { background: #16202b; border-bottom-color: rgba(255,255,255,.08); } }
  .dossier-topbar .d-title { font-weight: 700; font-size: 14px; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .dossier-topbar button {
    font-size: 12.5px; font-weight: 600; padding: 7px 12px; border-radius: 7px; border: none; cursor: pointer; white-space: nowrap;
  }
  #dossier-close-btn { background: #e5e7eb; color: #111; }
  #dossier-close-btn:hover { background: #d1d5db; }
  #dossier-present-btn { background: #ff5500; color: #fff; }
  #dossier-present-btn:hover { background: #e64d00; }

  .dossier-scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .dossier-body { max-width: 780px; margin: 0 auto; padding: 18px 16px 60px; display: flex; flex-direction: column; gap: 16px; }

  .d-section {
    background: #fff; border: 1px solid rgba(20,36,51,.1); border-radius: 12px; padding: 16px 18px;
  }
  @media (prefers-color-scheme: dark) { .d-section { background: #16202b; border-color: rgba(255,255,255,.08); } }
  .d-section h3 {
    margin: 0 0 10px; font-size: 12px; letter-spacing: .06em; text-transform: uppercase; font-weight: 700;
    color: #2f7d94;
  }
  @media (prefers-color-scheme: dark) { .d-section h3 { color: #6bb9d1; } }

  /* Marktanalyse-Kopf */
  .d-head { background: #111111; color: #fff; border-radius: 14px; padding: 22px 20px; position: relative; overflow: hidden; }
  .d-head::before {
    content: ""; position: absolute; inset: 0;
    background: radial-gradient(600px 200px at 90% -20%, rgba(90,230,242,.25), transparent 70%);
    pointer-events: none;
  }
  .d-head .d-eyebrow { font-size: 11px; letter-spacing: .1em; text-transform: uppercase; color: #ff8a4d; font-weight: 700; margin-bottom: 6px; }
  .d-head h1 { margin: 0 0 4px; font-size: 22px; font-weight: 800; letter-spacing: -.02em; text-wrap: balance; }
  .d-head .d-sub { font-size: 13px; color: #b9c2c9; margin: 0; }
  .d-head .d-meta-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }

<script>
// ---------- Password gate = real Firebase Auth (server-verified, not bypassable via devtools) ----------
const UNLOCK_KEY = "kaltakquise_unlocked_v1";
const FIREBASE_LOGIN_EMAIL = "k36@karlcrm.app"; // matching Firebase Auth user (Platzhalter, keine echte Mail)

let fbReady = false;
let fbDb = null;
let fbAuthObj = null;

function showSyncWarning(msg) {
  let el = document.getElementById("sync-warning");
  if (!el) {
    el = document.createElement("div");
    el.id = "sync-warning";
    el.style.cssText = "background:#7c2d12;color:#fff;font-size:12px;padding:6px 10px;text-align:center;";
    document.getElementById("app-root").prepend(el);
  }
  el.textContent = msg;
}

function initFirebaseApp() {
  if (typeof firebase === "undefined") return false;
  try {
    const firebaseConfig = {
      apiKey: "AIzaSyAgsVZjnKQKBzjN9I857-d6ZGtFkt4Lg_s",
      authDomain: "bodi-crm.firebaseapp.com",
      databaseURL: "https://bodi-crm-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "bodi-crm",
      storageBucket: "bodi-crm.firebasestorage.app",
      messagingSenderId: "642432248289",
      appId: "1:642432248289:web:8329156b08feb937db8aa0",
    };
    if (!firebase.apps || !firebase.apps.length) firebase.initializeApp(firebaseConfig);
    fbAuthObj = firebase.auth();
    fbDb = firebase.database();
    return true;
  } catch (err) {
    console.error("Firebase Init Fehler:", err);
    return false;
  }
}

function attachFirebaseListeners() {
  fbReady = true;
  fbDb.ref("leads_data").once("value")
    .then(snapshot => {
      const val = snapshot.val();
      const arr = val ? Object.values(val) : [];
      if (!arr.length) {
        showSyncWarning("⚠️ Keine Leads-Daten in Firebase gefunden — wurden sie schon hochgeladen?");
      }
      initAppData(arr);
    })
    .catch(err => {
      console.error("Leads-Daten Ladefehler:", err);
      showSyncWarning("⚠️ Firmendaten konnten nicht geladen werden.");
    });
  fbDb.ref("leads_state").on("value", snapshot => {
    state = snapshot.val() || {};
    saveState(state);
    refreshCurrentView();
  }, err => { console.error(err); showSyncWarning("⚠️ Sync-Verbindung verloren."); });
  fbDb.ref("route").on("value", snapshot => {
    const remote = snapshot.val();
    if (remote) {
      routeState = { start: remote.start || routeState.start, stopIds: remote.stopIds || [] };
      document.getElementById("route-start").value = routeState.start;
    }
    renderRoute();
    refreshRouteBadges();
  });
}

function unlockApp() {
  document.getElementById("lock-screen").style.display = "none";
  document.getElementById("app-root").style.display = "flex";
  if (!appDataInitialized && !document.getElementById("data-loading")) {
    const el = document.createElement("div");
    el.id = "data-loading";
    el.style.cssText = "background:#1d4ed8;color:#fff;font-size:12px;padding:6px 10px;text-align:center;";
    el.textContent = "⏳ Lade Firmendaten …";
    document.getElementById("app-root").prepend(el);
  }
  setTimeout(() => { if (typeof map !== "undefined") map.invalidateSize(); }, 60);
}

function tryUnlock() {
  const val = document.getElementById("lock-password").value;
  const errEl = document.getElementById("lock-error");
  const btn = document.getElementById("lock-submit");
  errEl.textContent = "";
  if (!fbAuthObj) {
    if (!initFirebaseApp()) {
      errEl.textContent = "Keine Verbindung — bitte Internet prüfen und neu laden.";
      return;
    }
  }
  btn.disabled = true;
  btn.textContent = "Prüfe …";
  fbAuthObj.signInWithEmailAndPassword(FIREBASE_LOGIN_EMAIL, val)
    .then(() => {
      localStorage.setItem(UNLOCK_KEY, "1");
      unlockApp();
    })
    .catch(err => {
      console.error("Login-Fehler:", err);
      errEl.textContent = "Falsches Passwort.";
    })
    .finally(() => { btn.disabled = false; btn.textContent = "Entsperren"; });
}
document.getElementById("lock-submit").addEventListener("click", tryUnlock);
document.getElementById("lock-password").addEventListener("keydown", e => { if (e.key === "Enter") tryUnlock(); });

// silent re-auth on return visits (Firebase persists the session; this just re-attaches listeners + shows the app)
initFirebaseApp();
if (fbAuthObj) {
  fbAuthObj.onAuthStateChanged(user => {
    if (user) {
      attachFirebaseListeners();
      if (localStorage.getItem(UNLOCK_KEY) === "1") unlockApp();
    }
  });
}

function refreshCurrentView() {
  if (tabMapBtn.classList.contains("active")) buildMarkers();
  else if (tabPipelineBtn.classList.contains("active")) buildKanban();
  else if (tabRouteBtn.classList.contains("active")) renderRoute();
}

function fbWriteLeadState(id, entry) {
  if (!fbReady || !fbDb) return;
  fbDb.ref("leads_state/" + id).set({
    status: entry.status || "offen",
    notiz: entry.notiz || "",
    website_override: entry.website_override || "",
    musterkonkurrent: !!entry.musterkonkurrent,
    traumkunde: !!entry.traumkunde,
    einwand_tags: entry.einwand_tags || [],
    skala_wert: entry.skala_wert == null ? null : entry.skala_wert,
    folgetermin: entry.folgetermin || null,
  });
}
function fbWriteDossier(id, dossier) {
  if (!fbReady || !fbDb) return;
  fbDb.ref("leads_dossier/" + id).set(dossier);
}
function fbWriteRoute() {
  if (!fbReady || !fbDb) return;
  fbDb.ref("route").set(routeState);
}

const STORAGE_KEY = "kaltakquise_leads_state_v2";
function loadState() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
  catch (e) { return {}; }
}
function saveState(state) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}
let state = loadState();

function getEntry(id) {
  if (!state[id]) state[id] = { status: "offen", notiz: "", website_override: "", musterkonkurrent: false, traumkunde: false, einwand_tags: [], skala_wert: null, folgetermin: null };
  if (state[id].status === undefined) state[id].status = state[id].besucht ? "besucht_kein_interesse" : "offen";
  if (state[id].website_override === undefined) state[id].website_override = "";
  if (state[id].musterkonkurrent === undefined) state[id].musterkonkurrent = false;
  if (state[id].traumkunde === undefined) state[id].traumkunde = false;
  if (!Array.isArray(state[id].einwand_tags)) state[id].einwand_tags = [];
  if (state[id].skala_wert === undefined) state[id].skala_wert = null;
  if (state[id].folgetermin === undefined) state[id].folgetermin = null;
  return state[id];
}
function effectiveWebsite(item) {
  const st = getEntry(item.id);
  if (st.website_override) return "ja: " + st.website_override;
  return item.website;
}
function setStatus(id, value) {
  const st = getEntry(id);
  st.status = value;
  saveState(state);
  fbWriteLeadState(id, st);
}

const markerById = {};

function escapeHtml(s) {
  if (!s) return "";
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

function websiteHtml(w) {
  if (!w || w === "nein") return "nein";
  const url = w.replace(/^ja:\s*/, "").trim();
  if (!url) return "nein";
  const href = url.startsWith("http") ? url : "https://" + url;
  return `<a href="${escapeHtml(href)}" target="_blank" rel="noopener">${escapeHtml(url)}</a>`;
}

function marketingHtml(m) {
  if (!m) return "";
  const parts = m.split(" | ").map(seg => {
    return seg.replace(/(https?:\/\/[^\s]+)/g, url => `<a href="${url}" target="_blank" rel="noopener">Link</a>`);
  });
  return parts.join("<br>");
}

function statusSelectHtml(id, cssClass) {

  return `<select class="${cssClass}">${opts}</select>`;
}

function routeButtonHtml(id) {
  const idx = routeState.stopIds.indexOf(id);
  if (idx === -1) {
    return `<button class="route-toggle-btn" data-route-toggle="${id}">🚗 Zur Route hinzufügen</button>`;
  }
  return `<button class="route-toggle-btn in-route" data-route-toggle="${id}">✓ Route-Station ${idx + 1} — entfernen</button>`;
}

function colorFor(item) {
  const st = getEntry(item.id);
  if (st.status === "nicht_relevant" || st.status === "besucht_kein_interesse" || st.status === "angebot_abgelehnt") {
    return "#9ca3af";
  }
  return CATEGORY_COLORS[item.kategorie] || DEFAULT_COLOR;
}

// ✗ für nicht relevant, ✓ für alles, wo schon ein Besuch stattgefunden hat
function statusIconFor(status) {
  if (status === "nicht_relevant") return { symbol: "✕", bg: "#dc2626" };
  if (status === "besucht_gf_nicht_da") return { symbol: "!", bg: "#2563eb" };
  if (status && status !== "offen") return { symbol: "✓", bg: "#16a34a" };
  return null;
}

let statusIconMarkers = {};
function updateStatusIcon(item) {
  if (statusIconMarkers[item.id]) {
    markersLayer.removeLayer(statusIconMarkers[item.id]);
    delete statusIconMarkers[item.id];
  }
  if (!item.lat || !item.lng) return;
  const st = getEntry(item.id);
  const iconInfo = statusIconFor(st.status);
  if (!iconInfo) return;
  const icon = L.divIcon({
    html: `<div class="status-icon-badge" style="background:${iconInfo.bg}">${iconInfo.symbol}</div>`,
    className: "", iconSize: [17, 17], iconAnchor: [8, 8],
  });
  const m = L.marker([item.lat, item.lng], { icon, interactive: false, zIndexOffset: 1000 });
  m.addTo(markersLayer);
  statusIconMarkers[item.id] = m;
}

let topBadgeMarkers = {};
function updateTopBadges(item) {
  if (topBadgeMarkers[item.id]) {
    topBadgeMarkers[item.id].forEach(m => markersLayer.removeLayer(m));
    delete topBadgeMarkers[item.id];
  }
  if (!item.lat || !item.lng) return;
  const st = getEntry(item.id);
  const badges = [];
  if (st.musterkonkurrent) badges.push({ emoji: "👑", cls: "muster-crown-badge", title: "Musterkonkurrent" });
  if (st.traumkunde) badges.push({ emoji: "🚀", cls: "traumkunde-badge", title: "Traumkunde" });
  if (!badges.length) return;
  const radius = item.ab === "A" ? 9 : 6;
  const spacing = 15;
  const markers = [];
  badges.forEach((b, i) => {
    const desiredOffset = (i - (badges.length - 1) / 2) * spacing;
    const anchorX = 8 - desiredOffset;
    const icon = L.divIcon({
      html: `<div class="${b.cls}" title="${b.title}">${b.emoji}</div>`,
      className: "", iconSize: [16, 16], iconAnchor: [anchorX, 8 + radius],
    });
    const m = L.marker([item.lat, item.lng], { icon, interactive: false, zIndexOffset: 1001 });
    m.addTo(markersLayer);
    markers.push(m);
  });
  topBadgeMarkers[item.id] = markers;
}

function buildMarkers() {
  markersLayer.clearLayers();
  statusIconMarkers = {};
  topBadgeMarkers = {};
  const filtered = applyFilters(DATA);
  let skippedNoCoords = 0;
  filtered.forEach(item => {
    if (!item.lat || !item.lng) { skippedNoCoords++; return; }
    const isA = item.ab === "A";
    const st = getEntry(item.id);
    const isClosed = st.status === "closed";
    const marker = L.circleMarker([item.lat, item.lng], {
      radius: isA ? 9 : 6,
      fillColor: colorFor(item),
      color: isClosed ? "#16a34a" : (isA ? "#FFD700" : "#1f2937"),
      weight: isA || isClosed ? 3 : 1,
      fillOpacity: 0.9,
    });
    marker.bindPopup(popupHtml(item), {
      maxWidth: 320, minWidth: 260,
      maxHeight: Math.round(Math.min(420, window.innerHeight * 0.65)),
      autoPanPadding: [20, 20],
    });
    marker.on("popupopen", (e) => wirePopup(e.popup, item));
    marker.addTo(markersLayer);
    markerById[item.id] = marker;
    updateStatusIcon(item);
    updateTopBadges(item);
  });
  const shownCount = filtered.length - skippedNoCoords;
  document.getElementById("stats").textContent = skippedNoCoords
    ? `${shownCount} / ${DATA.length} Leads sichtbar (${skippedNoCoords} ohne Kartenkoordinaten)`
    : `${filtered.length} / ${DATA.length} Leads sichtbar`;
  refreshRouteBadges();
}

function refreshRouteBadges() {
  Object.entries(markerById).forEach(([id, marker]) => {
    if (marker.getTooltip()) marker.unbindTooltip();
    const idx = routeState.stopIds.indexOf(id);
    if (idx !== -1) {
      marker.bindTooltip(`<div class="route-num-badge">${idx + 1}</div>`, {
        permanent: true, direction: "top", offset: [0, -6], className: "route-badge-tooltip", opacity: 1,
      });
    }
  });
}

function toggleRouteStop(id) {
  const idx = routeState.stopIds.indexOf(id);
  if (idx === -1) routeState.stopIds.push(id);
  else routeState.stopIds.splice(idx, 1);
  saveRoute();
}

function wirePopup(popup, item) {
  const el = popup.getElement();
  if (!el) return;
  const statusSel = el.querySelector(".status-select-popup");
  const noteField = el.querySelector(".note-field");
  const saveBtn = el.querySelector(".save-note");
  statusSel.addEventListener("change", () => {
    setStatus(item.id, statusSel.value);
    const marker = markerById[item.id];
    if (marker) marker.setStyle({ fillColor: colorFor(item) });
    updateStatusIcon(item);
    const hideNichtRelevantEl = document.getElementById("f-hide-nicht-relevant");
    if (currentFilter("f-status") || (hideNichtRelevantEl && hideNichtRelevantEl.checked)) buildMarkers();
  });
  saveBtn.addEventListener("click", () => {
    const st = getEntry(item.id);
    st.notiz = noteField.value;
    saveState(state);
    fbWriteLeadState(item.id, st);
    saveBtn.textContent = "Gespeichert ✓";
    setTimeout(() => saveBtn.textContent = "Speichern", 1200);
  });
  const routeBtn = el.querySelector(".route-toggle-btn");
  if (routeBtn) {
    routeBtn.addEventListener("click", () => {
      toggleRouteStop(item.id);
      popup.setContent(popupHtml(item));
      wirePopup(popup, item);
    });
  }
  const editWebsiteBtn = el.querySelector(".edit-website-btn");
  const websiteEditBox = el.querySelector(".website-edit-box");
  const websiteDisplay = el.querySelector(".website-display");
  if (editWebsiteBtn) {
    editWebsiteBtn.addEventListener("click", () => {
      const showing = websiteEditBox.style.display !== "none";
      websiteEditBox.style.display = showing ? "none" : "inline-flex";
      websiteDisplay.style.display = showing ? "inline" : "none";
      if (!showing) el.querySelector(".website-edit-input").focus();
    });
  }
  const websiteSaveBtn = el.querySelector(".website-save-btn");
  if (websiteSaveBtn) {
    websiteSaveBtn.addEventListener("click", () => {
      const input = el.querySelector(".website-edit-input");
      let url = input.value.trim();
      if (url && !/^https?:\/\//i.test(url)) url = "https://" + url;
      const st = getEntry(item.id);
      st.website_override = url;
      saveState(state);
      fbWriteLeadState(item.id, st);
      popup.setContent(popupHtml(item));
      wirePopup(popup, item);
    });
  }
  const musterCb = el.querySelector(".muster-cb");
  if (musterCb) {
    musterCb.addEventListener("change", () => {
      const st = getEntry(item.id);
      st.musterkonkurrent = musterCb.checked;
      saveState(state);
      fbWriteLeadState(item.id, st);
      updateTopBadges(item);
      if (document.getElementById("f-muster-only").checked) buildMarkers();
    });
  }
  const traumCb = el.querySelector(".traum-cb");
  if (traumCb) {
    traumCb.addEventListener("change", () => {
      const st = getEntry(item.id);
      st.traumkunde = traumCb.checked;
      saveState(state);
      fbWriteLeadState(item.id, st);
      updateTopBadges(item);
      const traumOnlyEl = document.getElementById("f-traum-only");
      if (traumOnlyEl && traumOnlyEl.checked) buildMarkers();
    });
  }
  const dossierBtn = el.querySelector("[data-dossier-open]");
  if (dossierBtn) {
    dossierBtn.addEventListener("click", () => openDossier(item));
  }
}

function currentFilter(id) {
  return document.getElementById(id).value;
}

function applyFilters(data) {
  const gebiet = currentFilter("f-gebiet");
  const kategorie = currentFilter("f-kategorie");
  const b2c = currentFilter("f-b2c");
  const ab = currentFilter("f-ab");
  const status = currentFilter("f-status");
  const search = document.getElementById("f-search").value.trim().toLowerCase();

  return data.filter(item => {
    if (gebiet && item.gebiet !== gebiet) return false;
    if (kategorie && item.kategorie !== kategorie) return false;
    if (hiddenCategories.has(item.kategorie)) return false;
    const musterOnlyEl = document.getElementById("f-muster-only");
    if (musterOnlyEl && musterOnlyEl.checked && !getEntry(item.id).musterkonkurrent) return false;
    const traumOnlyEl = document.getElementById("f-traum-only");
    if (traumOnlyEl && traumOnlyEl.checked && !getEntry(item.id).traumkunde) return false;
    const hideNichtRelevantEl = document.getElementById("f-hide-nicht-relevant");
    if (hideNichtRelevantEl && hideNichtRelevantEl.checked && getEntry(item.id).status === "nicht_relevant") return false;
    if (b2c && item.b2c_b2b !== b2c) return false;
    if (ab && item.ab !== ab) return false;
    if (status && getEntry(item.id).status !== status) return false;
    if (search) {
      const hay = (item.name + " " + item.adresse).toLowerCase();
      if (!hay.includes(search)) return false;
    }
    return true;
  });
}

["f-gebiet", "f-kategorie", "f-b2c", "f-ab", "f-status"].forEach(id => {
  document.getElementById(id).addEventListener("change", buildMarkers);
});
document.getElementById("f-search").addEventListener("input", buildMarkers);

function applyPipelineFilters(data) {
  const gebiet = currentFilter("p-gebiet");
  const kategorie = currentFilter("p-kategorie");
  const search = document.getElementById("p-search").value.trim().toLowerCase();
  return data.filter(item => {
    if (gebiet && item.gebiet !== gebiet) return false;
    if (kategorie && item.kategorie !== kategorie) return false;
    if (search) {
      const hay = (item.name + " " + item.adresse).toLowerCase();
      if (!hay.includes(search)) return false;
    }
    return true;
  });
}

      <div class="meta">${escapeHtml(item.adresse)}</div>
      <div class="meta">${telHref}</div>
      ${statusSelectHtml(item.id, "status-select")}
    </div>
  `;
}

function buildKanban() {
  const kanban = document.getElementById("kanban");
  kanban.innerHTML = "";
  const filtered = applyPipelineFilters(DATA);
  const byStatus = {};
  STATUS_OPTIONS.forEach(s => byStatus[s.value] = []);
  filtered.forEach(item => {
    const st = getEntry(item.id);
    (byStatus[st.status] || byStatus["offen"]).push(item);
  });

  STATUS_OPTIONS.forEach(s => {
    const col = document.createElement("div");
    col.className = "kanban-col";
    col.dataset.status = s.value;
    const items = byStatus[s.value];
    col.innerHTML = `
      <div class="kanban-col-head" style="background:${s.color}">
        <span>${s.label}</span><span>${items.length}</span>
      </div>
      <div class="kanban-col-body"></div>
    `;
    const body = col.querySelector(".kanban-col-body");
    items.forEach(item => body.insertAdjacentHTML("beforeend", kcardHtml(item)));
    kanban.appendChild(col);
  });

  // wire status-selects inside cards
  kanban.querySelectorAll(".kcard .status-select").forEach(sel => {
    sel.addEventListener("change", (e) => {
      const card = e.target.closest(".kcard");
      setStatus(card.dataset.id, sel.value);
      buildKanban();
      buildMarkers();
    });
  });

  // drag & drop between columns
  kanban.querySelectorAll(".kcard").forEach(card => {
    card.addEventListener("dragstart", () => card.classList.add("dragging"));
    card.addEventListener("dragend", () => card.classList.remove("dragging"));
  });
  kanban.querySelectorAll(".kanban-col-body").forEach(body => {
    body.addEventListener("dragover", (e) => {
      e.preventDefault();
      body.classList.add("dragover");
    });
    body.addEventListener("dragleave", () => body.classList.remove("dragover"));
    body.addEventListener("drop", (e) => {
      e.preventDefault();
      body.classList.remove("dragover");
      const dragging = kanban.querySelector(".kcard.dragging");
      if (!dragging) return;
      const newStatus = body.closest(".kanban-col").dataset.status;
      setStatus(dragging.dataset.id, newStatus);
      buildKanban();
      buildMarkers();
    });
  });

  document.getElementById("p-stats").textContent = `${filtered.length} / ${DATA.length} Leads`;
}

["p-gebiet", "p-kategorie"].forEach(id => document.getElementById(id).addEventListener("change", buildKanban));
document.getElementById("p-search").addEventListener("input", buildKanban);

// ---------- Export ----------
function currentExportData() {
  return DATA.map(item => {
    const st = getEntry(item.id);
    const statusLabel = (STATUS_BY_VALUE[st.status] || STATUS_BY_VALUE.offen).label;
    return { ...item, status: st.status, status_label: statusLabel, notiz_lokal: st.notiz };
  });
}

document.getElementById("btn-export-json").addEventListener("click", () => {
  const blob = new Blob([JSON.stringify(currentExportData(), null, 2)], { type: "application/json" });
  triggerDownload(blob, "leads_export.json");
});

document.getElementById("btn-export-csv").addEventListener("click", () => {
  const rows = currentExportData();
  const cols = ["name","rechtsform","ab","kategorie","b2c_b2b","gf","adresse","gebiet","telefon","website","email","oeffnungszeiten","beschreibung","roi","fb_page","fb_ads_link","marketing","status_label","notiz_lokal"];
  const csvEscape = v => `"${String(v ?? "").replace(/"/g, '""')}"`;
  const lines = [cols.join(",")];
  rows.forEach(r => lines.push(cols.map(c => csvEscape(r[c])).join(",")));
  const blob = new Blob(["﻿" + lines.join("\r\n")], { type: "text/csv;charset=utf-8" });
  triggerDownload(blob, "leads_export.csv");
});

function triggerDownload(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

": "5.000–30.000€", "auftragswert_kontext": "Reine Malerarbeiten/Fassadenanstrich am unteren Ende (~4.000–10.000€ für EFH), komplette Fassadendämmung/Vollwärmeschutz für ein Einfamilienhaus (~150m² Fassadenfläche, 80–150€/m²) am oberen Ende (15.000–30.000€).", "marge": "20–30%", "marge_kontext": "Deckungsbeitrag im österreichischen Baugewerbe liegt laut Branchenquellen im Schnitt bei ca. 20–35% der Angebotssumme (Mittelwert ~25%); kategoriespezifische AT-Daten für Maler/Fassade nicht separat gefunden, daher allgemeiner Bau-Richtwert verwendet.", "gewinn": "1.000–9.000€", "gewinn_hinweis": "berechnet aus Auftragswert 5.000–30.000€ × Marge 20–30% (grobe Schätzung, erste genannte Preisspanne)", "konfidenz": "mittel", "vorbilder": [{"Kategorie": "Fassade/Maler", "Firma": "malerwerkstatt hinze GmbH", "Warum": "Traditioneller Malerbetrieb (60 Jahre, Wunstorf bei Hannover) mit dokumentiertem Google-Ads-Case-Study auf handwerk.com: gezielte Kampagnen zu Fassadengestaltung, Innenputz & Bodendesign brachten spürbar mehr echte Kundenanfragen statt reiner Angebotssammler. Das Unternehmen ist so erfolgreich, dass es 2023 vom norwegischen Handwerkskonzern Håndverksgruppen übernommen wurde.", "Quelle": "https://www.handwerk.com/google-ads-die-wunschzielgruppe-im-fokus", "Website": "https://www.hinze-maler.de/"}]}, {"kategorie": "Stuckateur/Fassadenprofile", "auftragswert": "2.500–10.000€", "auftragswert_kontext": "Komplettpreis (Material + Montage) für Stuckleisten-/Fassadenprofil-Projekte bei ca. 80–100 Laufmetern (22–110€/lfm je nach Material/Qualität), z.B. Zimmerdecken oder Fassadenzierelemente an einem Wohnhaus.", "marge": "20–30%", "marge_kontext": "Keine stuckateur-spezifische AT-Margenquelle gefunden; allgemeiner Handwerks-Materialaufschlag von 15–30% auf Einkaufspreis sowie üblicher Stundensatz von 45–65€/h für Stuckateur/Maler als Orientierung verwendet.", "gewinn": "500–3.000€", "gewinn_hinweis": "berechnet aus Auftragswert 2.500–10.000€ × Marge 20–30% (grobe Schätzung, sche Quelle gefunden – die genannte Spanne ist eine grobe Schätzung basierend auf Analogie zu Wasser-/Sanierungsschäden, nicht auf einer direkten Quelle.", "marge": "25–35%", "marge_kontext": "Spezialsanierung/Notdienstleistungen erzielen tendenziell höhere Margen als Standardgewerke; kategoriespezifische AT-Quelle nicht gefunden, Range ist eine plausible Einordnung oberhalb des allgemeinen Bau-Durchschnitts (20–35%).", "gewinn": "250–3.500€", "gewinn_hinweis": "berechnet aus Auftragswert 1.000–10.000€ × Marge 25–35% (grobe Schätzung, erste genannte Preisspanne)", "konfidenz": "niedrig", "vorbilder": [{"Kategorie": "Schimmelsanierung/Brandschadensanierung", "Firma": "BELFOR Austria", "Warum": "Marktführer für Brand-, Wasser- und Schimmelschadensanierung in Österreich, mit eigener Marketingabteilung und österreichweitem Filialnetz. Wuchs 2023 durch Übernahme von TEAM RED GmbH (Spezialist für Brand-, Wasser- und Schimmelsanierung) weiter und baute damit die Marktführerschaft aus – sichtbares Ergebnis konsequenter Sichtbarkeits- und Wachstumsstrategie.", "Quelle": "https://www.belfor-jobs.com/at/de/ueber-uns/", "Website": "https://www.belfor.com/at/de/"}]}, {"kategorie": "Badsanierung/Fliesenleger", "auftragswert": "8.000–25.000€", "auftragswert_kontext": "Komplette Badsanierung für ein typisches Bad im Einfamilienhaus/Wohnung in Österreich 2025/26 (bei kleineren Bädern ab ~5.000€, bei großen/hochwertigen Bädern bis 40.000€ möglich).", "marge": "20–30%", "marge_kontext": "Fliesenleger-Stundensatz 40–60€/h (Wien/Graz auch 70–95€), allgemeiner Materialaufschlag im Handwerk 15–30%; keine badsanierungs-spezifische AT-Margenquelle, daher allgemeiner Richtwert verwendet.", "gewinn": "1.600–7.500€", "gewinn_hinweis": "berechnet aus Auftragswert 8.000–25.000€ × Marge 20–30% (grobe Schätzung, erste genannte Preisspanne)", "konfidenz": "mittel", "vorbilder": [{"Kategorie": "Badsanierung/Fliesenleger", "Firma": "Viterma Badsanierung", "Warum": "Österreichisches Franchise-Unternehmen für Bad-Komplettsanierung in 5 Arbeitstagen, mittlerweile Marktführer in Österreich und der Schweiz mit über 40.000 sanierten Bädern und ca. 40 Franchisepartnern in AT/DE. 2024 erstmals eigener TV-Spot im österreichischen Fernsehen (ORF); Franchisepartner zahlen 2,5% Marketinggebühr für überregionale Online-, Radio- und TV-Werbung – ein Paradebeispiel für Handwerk, das durch Werbung skaliert.", "Quelle": "https://www.viterma.com/viterma-tv-spot/", "Website": "https://www.viterma.com/"}]}, {"kategorie": "Bodenleger/Parkett", "auftragswert": "3.000–12.000€", "auftragswert_kontext": "Typisches Parkettprojekt für Wohnung/Haus (ca. 60–100m²): Verlegekosten 25–70€/m² plus Material 18–150€/m², je nach Parkettart (Fertig- vs. Massivparkett) und Zusatzarbeiten (Untergrundvorbereitung, Entsorgung Altbelag).", "marge": "20–30%", "marge_kontext": "Keine bodenleger-spezifische AT-Margenquelle gefunden; allgemeiner Handwerks-Materialaufschlag von 15–30% als Orientierung übernommen.", "gewinn": "600–3.600€", "gewinn_hinweis": "berechnet aus Auftragswert 3.000–12.000€ × Marge 20–30% (grobe Schätzung, erste genannte Preisspanne)", "konfidenz": "mittel", "vorbilder": [{"Kategorie": "Bodenleger/Parkett", "Firma": "parkett.at", "Warum": "Wiener Parkett-Meisterbetrieb (gegründet 2009, Showroom Piaristengasse), der auf Instagram unter dem Handle '@parkett.at' (\"World's finest parquet\") mit rund 560.000 Followern eine für die Baubranche außergewöhnlich große Social-Media-Reichweite aufgebaut hat und offizieller Markenbotschafter für UZIN, PALLMANN und WOLFF ist – ein Paradebeispiel für organisches + bezahltes Content-Marketing in einem kleinteiligen Handwerk.", "Quelle": "https://www.instagram.com/parkett.at/", "Website": "https://www.parkett.at/"}]}, {"kategorie": "Estrich/Betonbau", "auftragswert": "2.000–8.000€", "auftragswert_kontext": "Estrichverlegung für ein Einfamilienhaus (~80–120m²): Zementestrich 18–30€/m², Fließestrich 25–55€/m², Trockenestrich 45–75€/m²; für strukturell ge 35–50% (grobe Schätzung, erste genannte Preisspanne)", "konfidenz": "mittel", "vorbilder": [{"Kategorie": "Tischlerei", "Firma": "Tischlerei Leitner – Wohlfühlräume (St. Stefan ob Leoben, Steiermark)", "Warum": "Kleine Tischlerei, die sich selbst öffentlich als Erfolgsbeispiel für konsequenten Markenaufbau über Social Media positioniert (aktive Instagram-/Facebook-Kanäle, eigener Post über den erfolgreichen Aufbau der Marke 'Wohlfühlräume'). Zeigt, dass auch ein kleiner Tischlerei-Betrieb über Content und Ads eine erkennbare Marke werden kann.", "Quelle": "https://www.instagram.com/p/DJ8-CMzKmjf/", "Website": "https://wfr.at"}, {"Kategorie": "Tischlerei", "Firma": "Wagenleitner Tischlerei & Innenarchitektur", "Warum": "Positioniert sich bewusst mit eigener Markenlinie ('Wir sind Wohnen') statt als anonymer Handwerksbetrieb und tritt entsprechend professionell online auf – gutes Beispiel dafür, dass Tischlereien sich über Marke/Content von der Masse abheben können.", "Quelle": "https://www.wagenleitner.at/", "Website": "https://www.wagenleitner.at/"}]}, {"kategorie": "Baumeister/Baufirma/Zimmerei", "auftragswert": "15.000–70.000€", "auftragswert_kontext": "Sanierungen kosten ca. 400–1.200€/m² (Teilsanierung) bis 1.500€/m² (Vollsanierung Altbau), Zu-/Umbauten 700–2.000€/m²; ein typisches Privatprojekt (Teilsanierung, kleiner Zubau) liegt daher grob in diesem Bereich, große Sanierungen/Zubauten können deutlich mehr kosten.", "marge": "20–30%", "marge_kontext": "Laut Bauprofessor/Fachliteratur liegt der Deckungsbeitrag im Baugewerbe im Schnitt bei ca. 25% (Spanne 20–35%) der Angebotssumme, vor Abzug allgemeiner Geschäftskosten.", "gewinn": "3.000–21.000€", "gewinn_hinweis": "berechnet aus Auftragswert 15.000–70.000€ × Marge 20–30% (grobe Schätzung, erste genannte Preisspanne)", "konfidenz": "mittel", "vorbilder": [{"Kategorie": "Baumeister/Baufirma/Zimmerei", "Firma": "Rhomberg Bau GmbH (Bregenz, Vorarlberg)", "Warum": "Traditionsreiche Vorarlberger Baufirma, die sich mit klarem Markenauftritt ('Ideen, die bleiben'), aktiver Presse-/PR-Arbeit und Innovationskommunikation (z.B. CO2-neutrale Holzhochhäuser) weit über die Region hinaus sichtbar gemacht hat.", "Quelle": "https://de.wikipedia.org/wiki/Rhomberg_Gruppe", "Website": "https://www.rhomberg.com/"}, {"Kategorie": "Baumeister/Baufirma/Zimmerei", "Firma": "Kaufmann Bausysteme / Kaufmann Zimmerei (Reuthe, Vorarlberg)", "Warum": "Aus einer klassischen Zimmerei entstanden, heute durch konsequente Innovations- und Fachpresse-PR Weltmarktführer im Holzmodulbau – zeigt eindrucksvoll, wie sichtbares Marketing/PR einen regionalen Zimmereibetrieb zur international bekannten Marke machen kann.", "Quelle": "https://www.konstruktiver-holzbau.de/2021/04/09/kaufmann-bausysteme-ist-weltmarktfuehrer-im-holzmodulbau/", "Website": "https://www.kaufmannbausysteme.at/"}]}, {"kategorie": "Fertighaus/Holzbau", "auftragswert": "250.000–450.000€", "auftragswert_kontext": "Schlüsselfertige Fertighäuser kosten 2025 in Österreich meist 2.200–3.000€/m² Wohnfläche; bei einem typischen Einfamilienhaus (100–150m²) ergibt sich daraus die Spanne, Ausbauhäuser sind mit 1.800–2.200€/m² günstiger.", "marge": "20–30%", "marge_kontext": "Keine trade-spezifische Quelle gefunden; hier wird der allgemeine Deckungsbeitrag im Baugewerbe (ca. 20–35%, Bauprofessor/Fachliteratur) als Näherung verwendet, da Fertighausbau materialintensiv und wettbewerbsstark ist.", "gewinn": "50.000–135.000€", "gewinn_hinweis": "berechnet aus Auftragswert 250.000–450.000€ × Marge 20–30% (grobe Schätzung, erste genannte Preisspanne)", "konfidenz": "niedrig", "vorbilder": [{"Kategorie": "Fertighaus/Holzbau", "Firma": "ELK Fertighaus GmbH", "Warum": "Österreichischer Fertighaus-Marktführer, der seine Position über Jahrzehnte durch permanente Radio-/Werbekampagnen ('Endlich zuhause') und einen umfassenden Marken-Relaunch ausgebaut hat – historisch bis zu 99% Markenbekanntheit in Österreich.", "Quelle": "https://www.horizont.at/home/news/detail/elk-umfassender-marken-relaunch-abgeschlossen.html", "Website": "https://www.elk.at/"}, {"Kategorie": "Fertighaus/Holzbau", "Firma": "HARTL HAUS Holzindustrie GmbH", "Warum": "Ältestes Fertighausunternehmen Österreichs, das aktuell mit einer von einer Top-Werbeagentur (Demner, Merlicek & Bergmann) produzierten, breit ausgespielten Kampagne ('Dein Meisterwerk aus Meisterhand') seine Marktführerschaft untermauert.", "Quelle": "https://www.horizont.at/agenturen/news/dein-meisterwerk-aus-meisterhand-das-ist-die-neue-kampagne-von-hartl-haus-101732", "Website": "https://www.hartlhaus.at/"}]}, {"kategorie": "Abbruch/Erdbau", "auftragswert": "6.000–25.000€", "auftragswert_kontext": "Gebäudeabbruch kostet ca. 50–150€/m² Wohnfläche (Richtpreise Österreich/Deutschland), bei größerem Aufwand/Schadstoffen auch 150–300€/m² und mehr; Baggerarbeiten/Erdaushub werden meist nach Stundensatz (80–120€/h) verrechnet. Kunde ist häufig eine Baufirma oder Bauträger als Subauftraggeber, nicht direkt der Endkunde.", "marge": "15–25%", "marge_kontext": "Keine kategorie-spezifische Quelle; Erdbau/Abbruch gilt wegen hoher Maschinen-, Transport- und Entsorgungskosten als margenschwächer als reine Handwerksleistungen, daher unterer Bereich der allgemeinen Bau-Deckungsbeitragsspanne (20–35%) angesetzt.", "gewinn": "900–6.250€", "gewinn_hinweis": "berechnet aus Auftragswert 6.000–25.000€ × Marge 15–25% (grobe Schätzung, erste genannte Preisspanne)", "konfidenz": "niedrig", "vorbilder": [{"Kategorie": "Abbruch/Erdbau", "Firma": "Mayer Abbruch, Transport & Recycling GmbH (Wien)", "Warum": "Ehrlicher Hinweis: In dieser sehr B2B-lastigen Branche gibt es kaum dokumentierte Ads-Erfolgsgeschichten. Mayer ist eines der wenigen Wiener Abbruchunternehmen (ca. 140 Mitarbeiter) mit professioneller Website und aktivem Instagram-Auftritt (@mayer_und_co) – also sichtbar überdurchschnittlich investiertes Marketing für die Branche, aber kein belegter 'Ads-Case-Study'-Erfolg.", "Quelle": "https://www.instagram.com/mayer_und_co/", "Website": "https://www.mayer-abbruch.at/"}]}, {"kategorie": "Gerüstbau", "auftragswert": "900–3.500€", "auftragswert_kontext": "Für ein Fassadengerüst an einem Einfamilienhaus (ca. 150m²) inkl. Lieferung, Montage, Demontage über 1–2 Wochen sind in Österreich grob 900–3.000€ realistisch (5–20€/m²/Woche je nach Gerüsttyp). Kunde ist meist eine Baufirma, Maler- oder Fassadenbetrieb, seltener der Privatkunde direkt.", "marge": "30–45%", "marge_kontext": "Keine direkte Quelle gefunden; da Gerüstmaterial mehrfach wiederverwendet wird (geringe variable Materialkosten pro Einsatz, hoher Lohn-/Logistikanteil), wird ein höherer Deckungsbeitrag als im klassischen Baugewerbe angenommen — als grobe, unsichere Schätzung zu verstehen.", "gewinn": "270–1.575€", "gewinn_hinweis": "berechnet aus Auftragswert 900–3.500€ × Marge 30–45% (grobe Schätzung, erste genannte Preisspanne)", "konfidenz": "niedrig", "vorbilder": [{"Kategorie": "Gerüstbau", "Firma": "XERVON Austria GmbH", "Warum": "Einer der österreichweit führenden Gerüstbaubetriebe (60+ Jahre am Markt, Teil des internationalen REMONDIS-Konzerns) mit eigener Konzern-Marketingabteilung und aktivem LinkedIn-Auftritt – gutes B2B-Beispiel, da klassische Endkunden-Werbung in dieser Branche kaum vorkommt.", "Quelle": "https://www.xervon.at/unternehmen/ueber-uns/", "Website": "https://www.xervon.at/"}]}, {"kategorie": "Schlosserei/Metallbau", "auftragswert": "1.500–8.000€", "auftragswert_kontext": "Geländer/Zäune kosten je nach Material 60–300€ pro Laufmeter (Stahl 60–120€, Edelstahl 120–300€, Aluminium ca. 250€); ein typisches Privatprojekt (Balkon-/Treppengeländer, kleines Tor, 5–15 lfm) liegt in dieser Spanne, größere Stahlkonstruktionen/Vordächer können mehr kosten.", "marge": "35–50%", "marge_kontext": "Wie bei der Tischlerei handelt es sich um lohnintensive Maßanfertigung mit vergleichsweise geringem Materialkostenanteil; kategorie-spezifische Margendaten wurden nicht gefunden, daher analog zu anderen handwerklichen Fertigungsbetrieben geschätzt.", "gewinn": "525–4.000€", "gewinn_hinweis": "berechnet aus Auftragswert 1.500–8.000€ × Marge 35–50% (grobe Schätzung, erste genannte Preisspanne)", "konfidenz": "niedrig", "vorbilder": [{"Kategorie": "Schlosserei/Metallbau", "Firma": "Zaunteam (Zaunteam Franchise AG, aktiv auch in Österreich)", "Warum": "DACH-weites Franchise-System für Zaun-/Torbau (Metallbau-Teilbranche) mit rund 130 Standorten in der Schweiz, Deutschland und Österreich, das jedem Partner ein systematisches, zentral finanziertes Werbekonzept (Werbefonds, lokale Kampagnen) mitgibt – bester verfügbarer Beleg, dass strukturiertes Marketing einen Metallbau-Betrieb skalieren lässt (Ursprung Schweiz, kein rein österreichisches Unternehmen).", "Quelle": "https://www.zaunteam.at/de/zaunteam/zaunteam-franchising_feuerwehr/konzept", "Website": "https://www.zaunteam.at/"}]}, {"kategorie": "Alarmanlagen/Sicherheitstechnik", "auftragswert": "1.500–5.000€", "auftragswert_kontext": "Eine Basis-Alarmanlage für ein Einfamilienhaus kostet 1.500–2.500€ inkl. Einbau, größere/professionelle Anlagen mit Kameraüberwachung 2.500–5.000€+; als Richtwert für ein Komplettpaket werden rund 3.600€ genannt.", "marge": "25–35%", "marge_kontext": "Laut WKO-Musterstundensatzkalkulation wird in der Elektrotechnik ein Materialaufschlag von ca. 30% kalkuliert; da im Gesamtprojekt auch der volle Lohnanteil (Installation) mit einfließt, wird die Gesamtmarge etwas höher als der reine Materialaufschlag geschätzt.", "gewinn": "375–1.750€", "gewinn_hinweis": "berechnet aus Auftragswert 1.500–5.000€ × Marge 25–35% (grobe Schätzung, erste genannte Preisspanne)", "konfidenz": "mittel", "vorbilder": [{"Kategorie": "Alarmanlagen/Sicherheitstechnik", "Firma": "Verisure / Securitas Direct (Schweiz)", "Warum": "Der europaweit bekannteste Name für private Alarmanlagen, dessen Wachstum fast ausschließlich auf aggressiver TV-, Online- und Haustürwerbung beruht – die Standardreferenz dafür, dass Werbung in der Sicherheitstechnik-Branche funktioniert (in Österreich selbst nicht aktiv, daher DACH-Beispiel Schweiz).", "Quelle": "https://www.securitas-direct.ch/de", "Website": "https://www.securitas-direct.ch/"}, {"Kategorie": "Alarmanlagen/Sicherheitstechnik", "Firma": "Alarm Lindner Sicherheitstechnik GmbH (Österreich)", "Warum": "Familienbetrieb seit 1963 mit österreichweiter Abdeckung bei Alarmanlagen, Video und Zutrittskontrolle – als konkretes österreichisches Beispiel enthalten, auch wenn kein spezifischer Ads-Case-Study-Beleg vorliegt.", "Quelle": "https://alarmlindner.at/", "Website": "https://alarmlindner.at/"}]}, {"kategorie": "Blitzschutztechnik", "auftragswert": "2.500–5.000€", "auftragswert_kontext": "Eine komplette Blitzschutzanlage für ein durchschnittliches Einfamilienhaus in Österreich kostet ca. 2.000–5.000€ (äußerer Blitzschutz 2.000–2.500€, Erdung 1.200–1.700€, innerer Überspannungsschutz 1.000–1.500€); nachträgliche Installation oft 3.000–4.500€.", "marge": "25–35%", "marge_kontext": "Keine kategorie-spezifische Margenquelle; als artverwandtes Elektro-/Installationsgewerk wird der gleiche Schätzbereich wie bei Alarmanlagen/Sicherheitstechnik verwendet (WKO Elektrotechnik-Materialaufschlag ca. 30% als Anhaltspunkt).", "gewinn": "625–1.750€", "gewinn_hinweis": "berechnet aus Auftragswert 2.500–5.000€ × Marge 25–35% (grobe Schätzung, erste genannte Preisspanne)", "konfidenz": "niedrig", "vorbilder": [{"Kategorie": "Blitzschutztechnik", "Firma": "AROOS Blitzschutz GmbH (Gmunden/Ohlsdorf, Oberösterreich)", "Warum": "Mit rund 30 Blitzschutz-Fachkräften und Projekten in ganz Österreich eines der größeren Unternehmen der Nische; aktiv gemanagtes Google-Bewertungsprofil (4,6★) und professioneller Webauftritt zeigen sichtbares Marketing-Investment in einer sonst kaum digital sichtbaren Branche – ehrlich gesagt kein spektakulärer Ads-Case, aber das überzeugendste verfügbare Beispiel.", "Quelle": "https://aroos-blitzschutz.at/", "Website": "https://aroos-blitzschutz.at/ anierungen können mehr kosten.", "marge": "30–45%", "marge_kontext": "Keine direkte Quelle; grabenlose Sanierungsverfahren sind technologie-/spezialgeräteintensiv aber personalarm pro Einsatz, was tendenziell höhere Margen als klassische Grabenbauweise erwarten lässt — als grobe Schätzung zu verstehen.", "gewinn": "600–2.700€", "gewinn_hinweis": "berechnet aus Auftragswert 2.000–6.000€ × Marge 30–45% (grobe Schätzung, erste genannte Preisspanne)", "konfidenz": "niedrig", "vorbilder": [{"Kategorie": "Kanal-/Rohrsanierung", "Firma": "ROHRMAX Rohrreinigungs- und Kanalsanierungsgesellschaft m.b.H.", "Warum": "Größter österreichweiter Player der Branche (45+ Jahre, 10 Standorte, 500+ Mitarbeiter, 24/7-Erreichbarkeit) und dominiert die Google-Suchergebnisse für 'Kanal-/Rohrsanierung Österreich' klar über SEO/Ads-getriebene Sichtbarkeit – zeigt, dass Sichtbarkeit in dieser Nische direkt zu Marktführerschaft führt.", "Quelle": "https://www.rohrmax.at/niederlassungen/", "Website": "https://www.rohrmax.at/"}]}, {"kategorie": "Betonbohren/Betonschneiden", "auftragswert": "500–3.000€ pro Einsatz", "auftragswert_kontext": "Einzelne Kernbohrungen kosten ca. 90–280€ (bei größeren Durchmessern/Stahlbeton 250–500€), Betonschneiden 35–250€/lfm; ein typischer Baustelleneinsatz mit mehreren Bohrungen/Schnitten liegt oft im Bereich 500–3.000€. Kunde ist praktisch immer eine Bau- oder Installationsfirma als Subauftraggeber, kaum je der Privatkunde direkt.", "marge": "35–50%", "marge_kontext": "Keine direkte Quelle; Spezialgeräte-Dienstleistung mit hohem Kapitaleinsatz aber geringem laufendem Materialverbrauch pro Auftrag, daher wird analog zu anderen Spezialgeräte-Dienstleistungen ein höherer Deckungsbeitrag geschätzt.", "gewinn": "175–1.500€", "gewinn_hinweis": "berechnet aus Auftragswert 500–3.000€ × Marge 35–50% (grobe Schätzung, erste genannte Preisspanne)", "konfidenz": "niedrig", "vorbilder": [{"Kategorie": "Betonbohren/Betonschneiden", "Firma": "Josef Seidl Betonbohr- und -sägedienst GmbH (Obertrum am See, Salzburg)", "Warum": "Positioniert sich explizit und sichtbar erfolgreich als 'Österreichs Nr. 1 im Betonbohren und -sägen' und belegt in der Google-Suche zum eigenen Kernbegriff Top-Plätze – starkes Beispiel für Branding-getriebene Marktführerschaft in einer sehr technischen Nische.", "Quelle": "https://www.seidl.at/de/", "Website": "https://www.seidl.at/de/"}]}, {"kategorie": "Ofenbau/Kachelöfen", "auftragswert": "6.000-18.000€", "auftragswert_kontext": "Kachelofen/Grundofen mit Einbau durch Hafner, je nach Ausführung (Warmluftofen bis handgesetzter Grundofen)", "marge": "20-30%", "marge_kontext": "keine kategorie-spezifische Quelle gefunden, allgemeiner Handwerk/Bau-Richtwert (Rohertrag nach Material)", "gewinn": "1.200–5.400€", "gewinn_hinweis": "berechnet aus Auftragswert 6.000–18.000€ × Marge 20–30% (grobe Schätzung, erste genannte Preisspanne)", "konfidenz": "niedrig", "vorbilder": [{"Kategorie": "Ofenbau/Kachelöfen", "Firma": "Ofenbau Csida (Tirol)", "Warum": "Tiroler Hafnermeisterbetrieb mit aktiv gepflegten Facebook- und Instagram-Kanälen für Neuigkeiten rund um Kachelöfen – ehrlich gesagt eher moderates, aber das sichtbarste verfügbare Beispiel für digitales Marketing in einer generell sehr traditionell/offline geprägten Branche.", "Quelle": "https://www.csida.at/", "Website": "https://www.csida.at/"}]}, {"kategorie": "Sonnenschutz innen (Plissees/Jalousien)", "auftragswert": "500-3.000€", "auftragswert_kontext": "Gesamtauftrag für mehrere Fenster im Haushalt (Einzelfenster-Plissee 60-200€, Innenjalousie 40-80€/m²)", "marge": "25-35%", "marge_kontext": "keine kategorie-spezifische Quelle gefunden, allgemeiner Sonnenschutz/Handwerk-Richtwert", "gewinn": "125–1.050€", "gewinn_hinweis": "berechnet aus Auftragswert 500–3.000€ × Marge 25–35% (grobe Schätzung, erste genannte Preisspanne)", "konfidenz": "niedrig", "vorbilder": [{"Kategorie": "Sonnenschutz innen (Plissees/Jalousien)", "Firma": "JalouCity (Deutschland)", "Warum": "Deutschlands Marktführer im Maßgeschäft für Sicht- und Sonnenschutz (u.a. Plissees/Jalousien) mit 37+ Filialen, der auf eine eigene, seit Jahrzehnten dokumentierte Historie von TV- und Print-Werbekampagnen verweist – klarster Beleg für Ads-getriebenes Wachstum in dieser Nische (DACH-Beispiel, kein österreichisches Unternehmen).", "Quelle": "https://www.jaloucity.de/unternehmen/werbung.html", "Website": "https://www.jaloucity.de/"}, {"Kategorie": "Sonnenschutz innen (Plissees/Jalousien)", "Firma": "Schlotterer Sonnenschutz Systeme GmbH (Oberösterreich)", "Warum": "Österreichs eigener Marktführer für Sonnenschutzsysteme ('Made in Austria') mit großem Händler-/Partnernetzwerk und entsprechend hoher Markenbekanntheit – als österreichischer Anker-Fall enthalten, auch wenn der Fokus eher auf außenliegendem statt reinem Innen-Sonnenschutz liegt.", "Quelle": "https://www.schlotterer.com/de", "Website": "https://www.schlotterer.com/de"}]}, {"kategorie": "Versicherungsmakler", "auftragswert": "400–1.500€ (durchschnittliche Jahresprämie pro vermittelter Sach-/KFZ-Polizze, als Bemessungsgrundlage der laufenden Bestandsprovision)", "auftragswert_kontext": "Typische Jahresprämien für KFZ- und Haushaltsversicherungen in Österreich liegen bei ca. 400-1.500€; bei Krankenzusatzversicherungen wird die einmalige Abschlussprovision oft mit rund 7 Monatsprämien bemessen. Da die Provision direkt an der Jahresprämie hängt, wird diese hier als 'Auftragswert' verwendet, nicht ein separater Rechnungsbetrag an den Kunden (der Kunde zahlt keine direkte Maklergebühr, die Provision kommt vom Versicherer).", "marge": "10-25%", "marge_kontext": "Laut Branchenquellen (trustyfinance.de, wiemakler.de) erhalten Versicherungsmakler bei Sach- und KFZ-Versicherungen meist keine nennenswerte Abschlussprovision, dafür aber eine laufende Bestandsprovision von 10-25% des Jahresbeitrags; bei KFZ-Polizzen liegt sie eher bei 7-9%. Genaue, öffentlich belegte Sätze für Österreich variieren stark je Gesellschaft/Sparte und werden von Maklern meist als Geschäftsgeheimnis behandelt.", "gewinn": "40–375€", "gewinn_hinweis": "berechnet aus Auftragswert 400–1.500€ (Jahresprämie) × Marge 10–25% (Bestandsprovision) (grobe Schätzung, erste genannte Preisspanne); da der 'Auftragswert' hier bereits die Bemessungsgrundlage der Provision ist, entspricht der berechnete 'Gewinn' direkt der jährlichen Bestandsprovisionseinnahme des Maklers pro Polizze, nicht einem zusätzlichen Deckungsbeitrag.", "konfidenz": "niedrig", "vorbilder": []}, {"kategorie": "Finanzberater", "auftragswert": "500–2.000€ (Honorar pro Beratungsmandat bei Honorarberatung); alternativ 1-4% Abschlussprovision auf vermitteltes Anlagevolumen im Provisionsmodell", "auftragswert_kontext": "In Österreich dominiert bei Finanzberatung noch das Provisionsmodell (Vertrieb von Fonds, Versicherungen, Bausparverträgen), bei dem die Vergütung im Produkt versteckt ist und kaum öffentlich beziffert wird. Die noch junge Honorarberatung verlangt laut fynup.at im Schnitt rund 500€ pro Beratungsmandat (bzw. Stundensätze 70-130€); als Näherung für ein umfassenderes Mandat wird eine Spanne von 500-2.000€ angesetzt.", "marge": "60-80%", "marge_kontext": "Da 'Auftragswert' hier bereits das Honorar/die Provision selbst ist (personalintensive Beratungsdienstleistung mit sehr geringem Wareneinsatz), wird die Marge als Rohertragsanteil nach Abzug direkter Kosten grob geschätzt; keine österreichspezifische Quelle zur Kostenstruktur einzelner Finanzberater gefunden.", "gewinn": "300–1.600€", "gewinn_hinweis": "berechnet aus Auftragswert 500–2.000€ (Honorar pro Mandat) × Marge 60–80% (geschätzter Rohertragsanteil) (grobe Schätzung, erste genannte Preisspanne); Auftragswert ist hier bereits die Vergütung selbst, nicht eine externe Bemessungsgrundlage.", "konfidenz": "niedrig", "vorbilder": []}, {"kategorie": "Steuerberater", "auftragswert": "1.500–2.600€ (Jahreshonorar Einzelunternehmen, laufende Betreuung); 4.200–7.700€ (Jahreshonorar kleine GmbH)", "auftragswert_kontext": "Laut mehreren österreichischen Steuerberater-Preisübersichten (deine-steuerberater.at, meetadam.io, Heschik-Honorarübersicht Jänner 2025) liegen die geschätzten Jahreskosten für laufende Betreuung (Buchhaltung, Lohnverrechnung, Jahresabschluss, Steuererklärungen) bei einem Einzelunternehmen bei ca. 1.500-2.600€ netto, bei einer kleinen GmbH bei 4.200-7.700€ netto; Stundensätze reichen von 55-100€ (Buchhaltung) bis 225-360€ (Spezialberatung). Seit Aufhebung der verbindlichen Honorargrundsätze 2007 sind Honorare frei verhandelbar.", "marge": "35-50%", "marge_kontext": "Laut Branchenpublikation vwt.at (Kanzleientwicklung) sollte die Umsatzrendite bei kleineren Kanzleien (Umsatz bis 300.000€) bei 50-75% liegen, bei mittleren Kanzleien (300.000-1.000.000€ Umsatz) bei 35-50%; als konservativere Schätzung für ein typisches KMU-Mandat wird 35-50% angesetzt. Keine Quelle für Marge auf Einzelmandat-Ebene gefunden, Kanzlei-Gesamtrendite als Näherung verwendet.", "gewinn": "525–1.300€", "gewinn_hinweis": "berechnet aus Auftragswert 1.500–2.600€ (Jahreshonorar Einzelunternehmen) × Marge 35–50% (grobe Schätzung, erste genannte Preisspanne, bezogen auf ein Einzelunternehmer-Mandat pro Jahr)", "konfidenz": "niedrig", "vorbilder": []}, {"kategorie": "Anwälte", "auftragswert": "1.500–4.000€ (typisches außergerichtliches Mandat, netto, exkl. USt./Barauslagen)", "auftragswert_kontext": "Österreichische Rechtsanwälte verrechnen außergerichtlich meist nach Stundensatz (üblich 150-350€/Std. netto laut RAK Wien Kosten-ABC, Partner in Spezialgebieten bis 400-700€/Std.) oder Pauschale. Beispielwerte: unbestrittene Scheidung inkl. Beratungen und Antrag ca. 2.500-3.500€ netto, Vertragserrichtung 1,5-3% des Vertragswerts, Erstberatung ca. 150-180€ pauschal.", "marge": "25-40%", "marge_kontext": "Keine anwaltsspezifische Margen-/Rohertragsquelle gefunden; als Näherung allgemeine Kanzlei-Kostenstruktur (Personal, Miete, Haftpflichtversicherung, Kammerbeiträge) verwendet, wie sie bei anderen freien Berufen mit stundenbasiertem Geschäftsmodell üblich ist.", "gewinn": "375–1.600€", "gewinn_hinweis": "berechnet aus Auftragswert 1.500–4.000€ × Marge 25–40% (grobe Schätzung, erste genannte Preisspanne)", "konfidenz": "niedrig", "vorbilder": [{"Kategorie": "Anwälte", "Firma": "Pichler Rechtsanwalt GmbH (Wien/Dornbirn, Wirtschaftsrecht-Kanzlei)", "Warum": "Wirtschaftsrechtskanzlei, laut JUVE Magazine unter den besten Wirtschaftskanzleien Westösterreichs gelistet. Eine dokumentierte Case Study einer österreichischen Google-Ads-Agentur zeigt für diese Kanzlei eine Senkung der Online-Werbekosten um 51% bei gleichzeitiger Steigerung der Mandanten-Anfragen um 126% – ein konkretes, belegtes Beispiel für Performance-Marketing-Erfolg im regulierten österreichischen Anwaltsmarkt.", "Quelle": "https://adwordsagentur.at/google-adwords-fur-anwaelte-und-kanzleien/", "Website": "https://www.anwaltskanzlei-pichler.at/"}]}, {"kategorie": "Notare", "auftragswert": "3.000–7.000€ (Honorar für Errichtung eines Immobilienkaufvertrags bei Kaufpreis 200.000–350.000€, zzgl. USt. und Barauslagen)", "auftragswert_kontext": "Die häufigste größere Notarleistung ist die Kaufvertragserrichtung bei Immobilientransaktionen; laut mehreren Ratgeberportalen (infina.at, kredit-fuchs.at) liegen reine Notarkosten bei ca. 1,5-2% des Kaufpreises (Beispiel 300.000€ → ca. 6.000€ inkl. USt.). Beglaubigungen/kleinere Urkunden sind im Notariatstarifgesetz (NTG, §18, §25) gestaffelt nach Bemessungsgrundlage geregelt und liegen meist im niedrigen zwei- bis dreistelligen Bereich; ein Testament kostet bei einem Vermögen von 100.000-300.000€ üblicherweise 350-900€ inkl. ÖZTR-Eintragung.", "marge": "30-45%", "marge_kontext": "Keine notarspezifische Margenquelle gefunden; Näherungswert analog zu anderen honorarbasierten freien Berufen mit überschaubarem Sachaufwand (Personal, Kanzleiraum, Haftpflicht) angesetzt.", "gewinn": "900–3.150€", "gewinn_hinweis": "berechnet aus Auftragswert 3.000–7.000€ × Marge 30–45% (grobe Schätzung, erste genannte Preisspanne)", "konfidenz": "niedrig", "vorbilder": []}, {"kategorie": "Wirtschaftsprüfer", "auftragswert": "5.000–20.000€ (Prüfungshonorar für gesetzliche Jahresabschlussprüfung einer mittelgroßen GmbH, netto)", "auftragswert_kontext": "Honorare werden in Österreich individuell nach Stundenaufwand und Risikoeinschätzung vereinbart (kein einheitlicher Gebührenrahmen wie bei Steuerberatern, Stundensätze ab ca. 95€ netto). Belastbare österreichspezifische Euro-Beispiele waren öffentlich kaum auffindbar, daher wird als Näherung eine branchenübliche Orientierungsgröße für mittelständische GmbH-Abschlussprüfungen herangezogen (mittlerer vierstelliger bis niedriger fünfstelliger Bereich) – ausdrücklich mit Vorbehalt, da Prüfungshonorare in Österreich oft als Verhandlungssache/Betriebsgeheimnis gehandhabt werden.", "marge": "20-30%", "marge_kontext": "Keine belastbare Quelle für wirtschaftsprüferspezifische Margen gefunden; grobe Schätzung auf Basis allgemeiner Rohertragsspannen bei stundenbasierten Prüfungs-/Beratungsdienstleistungen nach Abzug von Personal- und Haftungskosten.", "gewinn": "1.000–6.000€", "gewinn_hinweis": "berechnet aus Auftragswert 5.000–20.000€ × Marge 20–30% (grobe Schätzung, erste genannte Preisspanne)", "konfidenz": "niedrig", "vorbilder": []}, {"kategorie": "Unternehmensberater", "auftragswert": "5.200–15.600€ pro Beratungsprojekt (typisches KMU-Mandat, ca. 5-15 Beratertage à WKO-Richttagessatz)", "auftragswert_kontext": "Der Fachverband Unternehmensberatung und Informationstechnologie der WKO empfiehlt (unverbindlich) einen Kalkulations-Stundensatz von 130€/Std., entsprechend ca. 1.040€/Manntag. Ein typisches KMU-Beratungsprojekt (Strategie-, Organisations- oder Digitalisierungsprojekt) umfasst grob 5-15 Beratertage, woraus sich ca. 5.200-15.600€ pro Mandat ergeben – dies ist eine eigene grobe Herleitung, keine offizielle Projektgrößen-Statistik, da Projektumfänge stark variieren (Einzelcoaching bis M   const v = (k || "").toLowerCase();

  return "bconf-niedrig";
}

  "gerasdorf bei wien": "Gerasdorf",
  "strasshof an der nordbahn": "Strasshof",
  "groß-enzersdorf": "Großenzersdorf",
};
function normalizeGebiet(raw) {
  if (!raw) return null;
  const stripped = raw.replace(/\s*\([^)]*\)\s*$/, "").trim();
  if (AREA_REACH_BY_GEBIET[stripped]) return stripped;
  const alias = GEBIET_ALIAS[stripped.toLowerCase()] || GEBIET_ALIAS[raw.toLowerCase()];
  if (alias && AREA_REACH_BY_GEBIET[alias]) return alias;
  return null;
}

function openDossier(item) {
  currentDossierItem = item;
  const overlay = document.getElementById("dossier-overlay");
  overlay.classList.remove("pmode");
  overlay.classList.add("open");
  document.getElementById("dossier-title-bar").textContent = item.name;
  document.getElementById("dossier-content").innerHTML = `<div style="padding:50px 20px;text-align:center;color:#6b8494;">Lade Dossier …</div>`;
  const proceed = (dossier) => { currentDossierData = dossier || emptyDossier(); renderDossier(); };
  if (fbReady && fbDb) {
    fbDb.ref("leads_dossier/" + item.id).once("value")
      .then(snap => proceed(snap.val()))
      .catch(() => proceed(null));
  } else {
    proceed(null);
  }

  document.getElementById("dossier-overlay").classList.remove("open", "pmode");
  currentDossierItem = null;
